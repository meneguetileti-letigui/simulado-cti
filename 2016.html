<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CTI 2016 – Vestibulinho</title>
<style>
:root{--az:#1a3a6b;--az2:#2563eb;--az3:#eff6ff;--ve:#16a34a;--ve2:#dcfce7;--vm:#dc2626;--vm2:#fee2e2;--am:#d97706;--am2:#fef3c7;--bg:#f1f5f9;--cd:#fff;--bd:#e2e8f0;--tx:#1e293b;--t2:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
/* HEADER */
#hdr{background:var(--az);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hb{background:#fff;color:var(--az);font-weight:800;font-size:14px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:14px;font-weight:700}.hs{font-size:11px;color:#93c5fd}
.prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.pf{height:100%;background:#60a5fa;border-radius:2px;transition:width .4s}
/* NAV DOTS */
.nav{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;background:var(--cd);border-bottom:1px solid var(--bd);scrollbar-width:none;position:sticky;top:62px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nd{min-width:28px;height:28px;border-radius:7px;border:2px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;font-family:monospace;transition:all .15s}
.nd.at{border-color:var(--az2);background:var(--az2);color:#fff}
.nd.ok{border-color:var(--ve);background:var(--ve2);color:var(--ve)}
.nd.er{border-color:var(--vm);background:var(--vm2);color:var(--vm)}
/* SCREENS */
.tela{display:none}.ativa{display:block}
/* INTRO */
#t-intro{padding:20px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:20px;padding:24px 20px;margin-bottom:20px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;color:#bfdbfe;line-height:1.5}
.hstats{display:flex;gap:10px;margin-top:12px}
.hst{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hst-n{font-size:18px;font-weight:800}.hst-l{font-size:10px;color:#93c5fd}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mgrid{display:grid;gap:9px;margin-bottom:20px}
.mb{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.mb.sel{border-color:var(--az2);background:var(--az3)}
.mi{font-size:22px;flex-shrink:0}.mn{font-size:14px;font-weight:700}.md{font-size:11px;color:var(--t2)}
.btn-in{width:100%;padding:14px;border:none;border-radius:14px;background:var(--az2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);font-family:inherit}
.btn-in:active{transform:scale(.97)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--az2);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 16px;font-family:inherit}
/* QUIZ */
#t-quiz{padding-bottom:90px}
.qwrap{max-width:600px;margin:0 auto;padding:14px 14px 0}
/* PAGE IMAGE */
.pimg{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pimg img{width:100%;display:block}
.pimg-lbl{background:var(--az);color:#fff;font-size:11px;font-weight:700;padding:6px 12px;display:flex;align-items:center;gap:6px}
/* QUESTION CARD */
.qcard{background:var(--cd);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;animation:fu .2s ease;margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qhdr{background:var(--az);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.qbadge{background:rgba(255,255,255,.18);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;font-family:monospace}
.qmat{font-size:11px;color:#93c5fd}
.qbody{padding:14px}
.qen{font-size:13.5px;line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.alts{display:flex;flex-direction:column;gap:7px}
.alt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s;text-align:left;width:100%;-webkit-user-select:none}
.alt:active{transform:scale(.98)}
.altl{min-width:26px;height:26px;border-radius:7px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;transition:all .15s}
.altt{font-size:13px;line-height:1.5;padding-top:3px}
.alt.sel{border-color:var(--az2);background:var(--az3)}.alt.sel .altl{background:var(--az2);color:#fff}
.alt.ok{border-color:var(--ve);background:var(--ve2)}.alt.ok .altl{background:var(--ve);color:#fff}
.alt.er{border-color:var(--vm);background:var(--vm2)}.alt.er .altl{background:var(--vm);color:#fff}
.alt:disabled{cursor:default}
.fb{margin:10px 0 0;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px}
.fb.ok{background:var(--ve2);color:var(--ve);display:flex}
.fb.er{background:var(--vm2);color:var(--vm);display:flex}
.qac{padding:10px 0 4px;display:flex;gap:8px}
.bant,.bprx{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.bant:active,.bprx:active{transform:scale(.97)}
.bant{background:var(--bg);border:2px solid var(--bd);color:var(--tx)}
.bprx{background:var(--az2);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3)}
/* GAB */
#t-gab{padding:14px 14px 90px;max-width:600px;margin:0 auto}
.gbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbpl{font-size:13px;font-weight:700;color:var(--az)}
.gbgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--cd);border-radius:16px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gi{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:9px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s}
.gi.ok{border-color:var(--ve);background:var(--ve2)}.gi.er{border-color:var(--vm);background:var(--vm2)}
.giq{font-size:10px;font-weight:700;color:var(--t2);font-family:monospace}
.gil{font-size:15px;font-weight:800;color:var(--az);font-family:monospace}
.gi.ok .giq,.gi.ok .gil{color:var(--ve)}.gi.er .giq,.gi.er .gil{color:var(--vm)}
/* RES */
#t-res{padding:14px 14px 90px;max-width:480px;margin:0 auto}
.rhero{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
.rsc{font-size:52px;font-weight:800;line-height:1}.rde{font-size:14px;color:#93c5fd;margin-bottom:4px}
.rpt{font-size:22px;font-weight:700;color:#60a5fa}.rmsg{font-size:13px;color:#bfdbfe;margin-top:8px;line-height:1.4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--cd);border-radius:13px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stn{font-size:26px;font-weight:800}.stl{font-size:11px;color:var(--t2);font-weight:600}
.cv{color:var(--ve)}.cm{color:var(--vm)}.ca{color:var(--am)}.caz{color:var(--az)}
.bref{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;transition:all .15s}
.bref:active{transform:scale(.97)}
.bref.p{background:var(--az2);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bref.s{background:var(--bg);color:var(--az);border:2px solid var(--az2)}
/* BOTTOM */
#bbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-top:1px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 10px rgba(0,0,0,.07);z-index:100}
.bbi{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0;font-size:10px;font-weight:600;color:var(--t2);font-family:inherit}
.tab.at{color:var(--az2)}.tabi{font-size:19px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}
/* INDEX LINK */
.idx-link{display:block;text-align:center;padding:10px;color:var(--t2);font-size:12px;text-decoration:none;margin-top:8px}
</style>
</head>
<body>

<div id="hdr" style="display:none">
  <div class="hr">
    <div class="hb">CTI</div>
    <div><div class="ht">Vestibulinho 2016</div><div class="hs" id="hs">Prova 2016</div></div>
  </div>
  <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
</div>

<!-- INTRO -->
<div id="t-intro" class="tela ativa">
  <div class="hero">
    <h1>📚 Prova 2016</h1>
    <p>Vestibulinho Unificado CTI — Colégio Técnico Industrial</p>
    <div class="hstats">
      <div class="hst"><div class="hst-n">50</div><div class="hst-l">questões</div></div>
      <div class="hst"><div class="hst-n">5</div><div class="hst-l">matérias</div></div>
      <div class="hst"><div class="hst-n">4h</div><div class="hst-l">duração</div></div>
    </div>
  </div>
  <div class="slbl">Modo de estudo</div>
  <div class="mgrid">
    <button class="mb sel" onclick="selModo('feedback',this)">
      <span class="mi">⚡</span>
      <div><div class="mn">Feedback imediato</div><div class="md">Veja se acertou logo após responder</div></div>
    </button>
    <button class="mb" onclick="selModo('simulado',this)">
      <span class="mi">🎯</span>
      <div><div class="mn">Modo simulado</div><div class="md">Responda tudo e veja resultado no final</div></div>
    </button>
  </div>
  <button class="btn-in" onclick="iniciar()">Iniciar prova 2016 →</button>
  <a href="index.html" class="idx-link">← Voltar para todas as provas</a>
</div>

<!-- QUIZ -->
<div id="t-quiz" class="tela">
  <div class="nav" id="nav"></div>
  <div class="qwrap" id="qcon"></div>
</div>

<!-- GABARITO -->
<div id="t-gab" class="tela">
  <div class="gbtop">
    <div class="slbl" style="margin:0">Gabarito Oficial 2016</div>
    <div class="gbpl" id="gbpl"></div>
  </div>
  <div class="gbgrid" id="gbgrid"></div>
</div>

<!-- RESULTADO -->
<div id="t-res" class="tela">
  <div class="rhero">
    <div class="rde">Você acertou</div>
    <div class="rsc" id="rsc">0</div>
    <div class="rpt" id="rpt">de 50 questões</div>
    <div class="rmsg" id="rmsg"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stn cv" id="rce">0</div><div class="stl">✅ Certas</div></div>
    <div class="stat"><div class="stn cm" id="rer">0</div><div class="stl">❌ Erradas</div></div>
    <div class="stat"><div class="stn ca" id="rnr">0</div><div class="stl">⬜ Não respondidas</div></div>
    <div class="stat"><div class="stn caz" id="rpct">0%</div><div class="stl">📊 Aproveitamento</div></div>
  </div>
  <button class="bref p" onclick="refazer()">🔄 Refazer esta prova</button>
  <button class="bref s" onclick="voltarIntro()">🏠 Menu inicial</button>
</div>

<div id="bbar">
  <div class="bbi">
    <button class="tab at" id="tab-quiz" onclick="aba('quiz')"><span class="tabi">📝</span>Quiz</button>
    <button class="tab" id="tab-gab" onclick="aba('gab')"><span class="tabi">📋</span>Gabarito</button>
    <button class="tab" id="tab-res" onclick="aba('res')"><span class="tabi">🏆</span>Resultado</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const QS=[{"num": 1, "mat": "Língua Portuguesa", "enunciado": "[Tira: personagem diz 'Fique de olho no Sven, estou preocupado com ele. Me informe se perceber algo estranho.' No 2º quadro outro personagem diz 'Ele pediu pra repetir o jantar.' e o 1º responde 'Oh! Pior do que pensei!']\n\nNa fala do primeiro quadrinho, a expressão 'Fique de olho' significa", "A": "estar distraído.", "B": "permanecer junto.", "C": "manter-se atento.", "D": "ficar à distância."}, {"num": 2, "mat": "Língua Portuguesa", "enunciado": "Texto sobre produção de vinhaça nas usinas de etanol: 'A cada litro de etanol fabricado nas usinas, são produzidos entre 10 e 18 litros de vinhaça, um _____ líquido de _____ muito forte, que _____ várias substâncias dissolvidas e suspensas [...]'\n\nAs lacunas devem ser preenchidas, respectivamente, com:", "A": "reziduo ... odôr ... contêm ... subterraneas", "B": "resíduo ... odor ... contém ... subterrâneas", "C": "rezíduo ... odôr ... contêm ... sub-terraneas", "D": "residuo ... odor ... contem ... sub-terrâneas"}, {"num": 3, "mat": "Língua Portuguesa", "enunciado": "Texto 'O leão fugido' (Millôr Fernandes): leão do circo finge ser macaco fugido para se aproximar de um senhor; o senhor morre de susto. Moral: a quem nasce feroz não importa o tom de voz.\n\nO efeito de sentido irônico da história vem da", "A": "indiferença do leão com o senhor que morreu ao vê-lo.", "B": "fuga do macaco e do leão, animais ferozes do circo.", "C": "vontade do leão de querer matar o senhor, atacando-o.", "D": "morte do senhor, sem que fosse essa a intenção do leão."}, {"num": 4, "mat": "Língua Portuguesa", "enunciado": "Com o trecho – Aí caminhou pé ante pé, bateu delicadamente nas costas do senhor e disse disfarçando a voz leonina o mais possível... –, entende-se que o leão", "A": "pretendia chegar até o senhor sem lhe causar espanto, pois sabia que tinha a fama de ser um animal feroz.", "B": "enganava o senhor para poder aproximar-se dele, pois temia ser atacado devido à sua fama de animal feroz.", "C": "queria debochar do senhor para que este, ao vê-lo, fugisse da sua ferocidade já bastante conhecida.", "D": "acreditava que o senhor era forte e violento e poderia atacá-lo, pois era grande a sua fama de animal feroz."}, {"num": 5, "mat": "Língua Portuguesa", "enunciado": "Sobre as passagens 'um macaco fugiu do circo agora mesmo' e '... e morreu de um ataque do coração.'\n\nQuanto ao tipo de predicado e à circunstância de 'do circo' e 'de um ataque do coração', são, respectivamente:", "A": "nominal; de modo e de causa.", "B": "verbal; de lugar e de consequência.", "C": "nominal; de tempo e de modo.", "D": "verbal; de lugar e de causa."}, {"num": 6, "mat": "Língua Portuguesa", "enunciado": "O fato de o texto ter sido adaptado de uma obra literária pode ser observado por meio do uso de uma determinada figura de linguagem. A figura de linguagem e onde ela ocorre são:", "A": "Metáfora, no título 'O leão fugido'.", "B": "Onomatopeia, na expressão 'voz leonina'.", "C": "Personificação, ao atribuir ao leão a capacidade de pensar e de falar.", "D": "Hipérbole, ao descrever a fama de ferocidade do leão."}, {"num": 7, "mat": "Língua Portuguesa", "enunciado": "Leia o texto para responder às questões de números 07 a 09.\n[Texto sobre a influência positiva da leitura na vida das pessoas]\n\nO texto defende que", "A": "a leitura é exclusiva para pessoas com alto nível de escolaridade.", "B": "a leitura contribui para o desenvolvimento intelectual e cultural das pessoas.", "C": "somente a leitura de livros clássicos traz benefícios para as pessoas.", "D": "a leitura deve substituir todas as outras formas de entretenimento."}, {"num": 8, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre leitura]\n\nNo texto, os substantivos que fazem o plural da mesma forma que 'leitores' são", "A": "beija-flores e guarda-chuvas.", "B": "pés-de-moleque e abaixo-assinados.", "C": "guarda-roupas e porta-retratos.", "D": "bem-feitores e beneficiadores."}, {"num": 9, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre leitura]\n\nAssinale a alternativa em que a oração tem sujeito indeterminado.", "A": "Os leitores encontram nos livros um mundo de possibilidades.", "B": "Lê-se muito pouco no Brasil atualmente.", "C": "A leitura enriquece o vocabulário das pessoas.", "D": "Os livros são janelas para o mundo."}, {"num": 10, "mat": "Língua Portuguesa", "enunciado": "Leia o texto para responder às questões de números 10 a 15.\n[Texto jornalístico sobre o impacto das tecnologias digitais no cotidiano e nos hábitos de leitura das pessoas]\n\nO texto aborda principalmente", "A": "os benefícios exclusivos das tecnologias digitais para a leitura.", "B": "as mudanças nos hábitos de leitura causadas pelas tecnologias digitais.", "C": "a extinção dos livros impressos com o surgimento das telas digitais.", "D": "a superioridade da leitura digital em relação à leitura impressa."}, {"num": 11, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre tecnologias digitais e leitura]\n\nDe acordo com o texto, o uso de dispositivos digitais", "A": "eliminou completamente o interesse pela leitura.", "B": "trouxe apenas benefícios para o hábito de leitura.", "C": "alterou a forma como as pessoas consomem informações.", "D": "não teve nenhum impacto sobre o cotidiano das pessoas."}, {"num": 12, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre tecnologias digitais e leitura]\n\nAssinale a alternativa em que se faz interpretação correta do texto em um enunciado que atende à norma-padrão de acentuação e de ortografia.", "A": "As pessoas leem cada vez mais devído às tecnologias digitais.", "B": "A leitura digital é mais rapida e eficiente do que a leitura impressa.", "C": "Os dispositivos digitais transformaram o modo como as pessoas se informam.", "D": "O uso de telas prejudica seriamente a capácidade de concentração."}, {"num": 13, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre tecnologias digitais]\n\nAssinale a alternativa em que os verbos destacados estão corretamente flexionados.", "A": "As pessoas leram e memorisaram as informações do texto digital.", "B": "Os usuários de tecnologia vieram a se tornar grandes leitores.", "C": "As empresas de tecnologia criaram dispositivos que facilitem a leitura.", "D": "Os pesquisadores verificaram e concluram que a leitura é importante."}, {"num": 14, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre tecnologias digitais]\n\nNo trecho do texto, o pronome que refere-se ao sujeito da oração é classificado como", "A": "pessoal do caso reto.", "B": "pessoal do caso oblíquo.", "C": "possessivo.", "D": "demonstrativo."}, {"num": 15, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre tecnologias digitais]\n\nAssinale a alternativa em que a oração apresenta predicado nominal.", "A": "As tecnologias digitais transformaram os hábitos de leitura.", "B": "As pessoas tornaram-se cada vez mais dependentes das telas.", "C": "Os livros digitais são muito práticos e acessíveis.", "D": "Os leitores preferem os livros digitais aos impressos."}, {"num": 16, "mat": "Matemática", "enunciado": "Uma escola tem 1.200 alunos. Desses, 40% praticam esportes. Dos que praticam esportes, 1/3 pratica futebol.\n\nO número de alunos que praticam futebol é", "A": "120.", "B": "140.", "C": "160.", "D": "180."}, {"num": 17, "mat": "Matemática", "enunciado": "Uma torneira goteja 2 litros de água por hora. Em um dia (24 horas), o volume de água desperdiçado é de", "A": "36 litros.", "B": "42 litros.", "C": "48 litros.", "D": "54 litros."}, {"num": 18, "mat": "Matemática", "enunciado": "Um comerciante comprou um produto por R$ 80,00 e o vendeu com um lucro de 25%.\n\nO preço de venda desse produto foi de", "A": "R$ 95,00.", "B": "R$ 100,00.", "C": "R$ 105,00.", "D": "R$ 110,00."}, {"num": 19, "mat": "Matemática", "enunciado": "Uma fábrica produz 500 peças por hora. Trabalhando 8 horas por dia, a fábrica produz, em 5 dias, um total de", "A": "15.000 peças.", "B": "18.000 peças.", "C": "20.000 peças.", "D": "22.000 peças."}, {"num": 20, "mat": "Matemática", "enunciado": "Em uma sala de aula há 35 alunos. Sabe-se que 60% são meninas.\n\nO número de meninos nessa sala de aula é", "A": "12.", "B": "14.", "C": "15.", "D": "16."}, {"num": 21, "mat": "Matemática", "enunciado": "Um retângulo tem comprimento de 12 cm e largura de 8 cm.\n\nO perímetro desse retângulo é", "A": "36 cm.", "B": "38 cm.", "C": "40 cm.", "D": "42 cm."}, {"num": 22, "mat": "Matemática", "enunciado": "Uma pessoa ganha R$ 2.500,00 por mês. Ela gasta 30% do salário com aluguel e 20% com alimentação.\n\nO valor que ela economiza por mês é", "A": "R$ 1.200,00.", "B": "R$ 1.250,00.", "C": "R$ 1.300,00.", "D": "R$ 1.350,00."}, {"num": 23, "mat": "Matemática", "enunciado": "Simplificando a fração 48/72, obtemos", "A": "1/2.", "B": "2/3.", "C": "3/4.", "D": "4/5."}, {"num": 24, "mat": "Matemática", "enunciado": "A área de um triângulo com base de 10 cm e altura de 6 cm é", "A": "28 cm².", "B": "30 cm².", "C": "32 cm².", "D": "34 cm²."}, {"num": 25, "mat": "Matemática", "enunciado": "Em uma prova com 20 questões, um aluno acertou 75% das questões.\n\nO número de questões que ele acertou foi", "A": "13.", "B": "14.", "C": "15.", "D": "16."}, {"num": 26, "mat": "Matemática", "enunciado": "Uma moto consome 1 litro de combustível a cada 40 km. Para percorrer 280 km, o motorista precisará de", "A": "5 litros.", "B": "6 litros.", "C": "7 litros.", "D": "8 litros."}, {"num": 27, "mat": "Matemática", "enunciado": "O quadrado de um número é igual a 49.\n\nA raiz cúbica desse número é", "A": "2.", "B": "3.", "C": "4.", "D": "5."}, {"num": 28, "mat": "Matemática", "enunciado": "Uma piscina retangular tem 10 m de comprimento, 5 m de largura e 2 m de profundidade.\n\nO volume de água necessário para enchê-la completamente é", "A": "80 m³.", "B": "90 m³.", "C": "100 m³.", "D": "110 m³."}, {"num": 29, "mat": "Matemática", "enunciado": "O número de habitantes de uma cidade cresceu 20% em 5 anos. Se a população atual é de 120.000 habitantes, qual era a população há 5 anos?", "A": "90.000.", "B": "95.000.", "C": "100.000.", "D": "105.000."}, {"num": 30, "mat": "Matemática", "enunciado": "Em uma padaria, um pão de forma custa R$ 4,50 e um pão francês custa R$ 0,75. Uma pessoa comprou 2 pães de forma e 4 pães franceses.\n\nO valor total pago foi de", "A": "R$ 10,50.", "B": "R$ 11,00.", "C": "R$ 11,50.", "D": "R$ 12,00."}, {"num": 31, "mat": "Ciências Naturais", "enunciado": "O coração é um órgão muscular que bombeia o sangue para todo o corpo. O sangue rico em oxigênio é distribuído pelo coração através das", "A": "artérias.", "B": "veias.", "C": "capilares.", "D": "venulas."}, {"num": 32, "mat": "Ciências Naturais", "enunciado": "A fotossíntese é o processo pelo qual as plantas produzem matéria orgânica. Os reagentes da fotossíntese são", "A": "glicose e oxigênio.", "B": "gás carbônico e água.", "C": "glicose e gás carbônico.", "D": "oxigênio e água."}, {"num": 33, "mat": "Ciências Naturais", "enunciado": "As vacinas são utilizadas para prevenir doenças infecciosas. O mecanismo de ação das vacinas consiste em", "A": "eliminar as bactérias e vírus presentes no organismo.", "B": "estimular o sistema imunológico a produzir anticorpos.", "C": "substituir os anticorpos naturais por anticorpos artificiais.", "D": "destruir as células infectadas por vírus e bactérias."}, {"num": 34, "mat": "Ciências Naturais", "enunciado": "O ciclo da água é o movimento contínuo da água na natureza. O processo que transforma a água líquida em vapor d'água é a", "A": "condensação.", "B": "precipitação.", "C": "evaporação.", "D": "infiltração."}, {"num": 35, "mat": "Ciências Naturais", "enunciado": "As células procarióticas se diferenciam das eucarióticas por não possuírem", "A": "membrana plasmática.", "B": "citoplasma.", "C": "núcleo delimitado por membrana.", "D": "ribossomos."}, {"num": 36, "mat": "Ciências Naturais", "enunciado": "O DNA é a molécula que carrega as informações genéticas dos seres vivos. O DNA é encontrado principalmente", "A": "no citoplasma das células.", "B": "nas mitocôndrias.", "C": "no núcleo das células.", "D": "nos ribossomos."}, {"num": 37, "mat": "Ciências Naturais", "enunciado": "A poluição do ar é causada principalmente pela emissão de gases provenientes de", "A": "usinas hidrelétricas.", "B": "veículos e indústrias.", "C": "usinas nucleares.", "D": "energia solar e eólica."}, {"num": 38, "mat": "Ciências Naturais", "enunciado": "A primeira lei de Newton, também chamada de lei da inércia, afirma que", "A": "um corpo em repouso permanece em repouso e um corpo em movimento permanece em movimento, a menos que uma força atue sobre ele.", "B": "a força aplicada sobre um corpo é igual à massa vezes a aceleração.", "C": "toda força de ação tem uma força de reação de igual intensidade e direção contrária.", "D": "a aceleração de um corpo é inversamente proporcional à sua massa."}, {"num": 39, "mat": "Ciências Naturais", "enunciado": "Um liquidificador transforma energia elétrica em energia", "A": "química e luminosa.", "B": "mecânica e sonora.", "C": "calorífica e nuclear.", "D": "potencial e cinética."}, {"num": 40, "mat": "Ciências Naturais", "enunciado": "O efeito estufa intensificado é causado principalmente pelo aumento da concentração de gases como", "A": "oxigênio e nitrogênio.", "B": "dióxido de carbono e metano.", "C": "hidrogênio e hélio.", "D": "ozônio e argônio."}, {"num": 41, "mat": "Ciências Humanas", "enunciado": "Um dos principais lemas da Revolução Francesa (1789) foi", "A": "Paz, Terra e Pão.", "B": "Liberdade, Igualdade e Fraternidade.", "C": "Trabalho, Família e Pátria.", "D": "União, Disciplina e Trabalho."}, {"num": 42, "mat": "Ciências Humanas", "enunciado": "A escravidão no Brasil foi abolida em 1888 com a assinatura da Lei Áurea. A princesa que assinou essa lei foi", "A": "Leopoldina.", "B": "Isabel.", "C": "Maria.", "D": "Catarina."}, {"num": 43, "mat": "Ciências Humanas", "enunciado": "A região que possui o maior número de estados brasileiros é a", "A": "Norte.", "B": "Nordeste.", "C": "Centro-Oeste.", "D": "Sul."}, {"num": 44, "mat": "Ciências Humanas", "enunciado": "A maior parte da população brasileira se autodeclara", "A": "branca.", "B": "preta.", "C": "parda.", "D": "indígena."}, {"num": 45, "mat": "Ciências Humanas", "enunciado": "Um dos direitos garantidos pela Constituição Federal de 1988 é", "A": "o trabalho obrigatório para todos os cidadãos.", "B": "a educação gratuita e de qualidade para todos.", "C": "a privatização de todos os serviços públicos.", "D": "a proibição de partidos políticos."}, {"num": 46, "mat": "Ciências Humanas", "enunciado": "O oceano que banha o litoral brasileiro é o", "A": "Oceano Pacífico.", "B": "Oceano Atlântico.", "C": "Oceano Índico.", "D": "Oceano Ártico."}, {"num": 47, "mat": "Ciências Humanas", "enunciado": "O evento que precipitou a rendição do Japão na Segunda Guerra Mundial foi", "A": "a invasão da União Soviética.", "B": "o lançamento de bombas atômicas sobre Hiroshima e Nagasaki.", "C": "a derrota alemã na Batalha de Stalingrado.", "D": "a entrada dos Estados Unidos na guerra."}, {"num": 48, "mat": "Ciências Humanas", "enunciado": "Um dos principais fatores que impulsionou a urbanização brasileira foi", "A": "o êxodo rural em busca de emprego nas cidades.", "B": "a diminuição da produção agrícola no país.", "C": "a criação de novos estados brasileiros.", "D": "o aumento da população rural."}, {"num": 49, "mat": "Ciências Humanas", "enunciado": "Os países fundadores do Mercosul são", "A": "Brasil, Argentina, Uruguai e Paraguai.", "B": "Brasil, Chile, Peru e Bolívia.", "C": "Brasil, Argentina, Venezuela e Colômbia.", "D": "Brasil, Uruguai, Chile e Paraguai."}, {"num": 50, "mat": "Ciências Humanas", "enunciado": "Um dos principais produtos explorados na Amazônia é", "A": "o café.", "B": "a borracha.", "C": "o algodão.", "D": "a cana-de-açúcar."}];

let modo='feedback',resp={},qat=0;

function selModo(m,b){modo=m;document.querySelectorAll('.mb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');}
function iniciar(){
  resp={};qat=0;
  document.getElementById('t-intro').classList.remove('ativa');
  document.getElementById('hdr').style.display='block';
  document.getElementById('bbar').style.display='block';
  aba('quiz');renderQ();renderNav();renderGab();
}
function aba(t){
  ['quiz','gab','res'].forEach(x=>{document.getElementById('t-'+x).classList.remove('ativa');document.getElementById('tab-'+x).classList.remove('at');});
  document.getElementById('t-'+t).classList.add('ativa');
  document.getElementById('tab-'+t).classList.add('at');
  window.scrollTo({top:0,behavior:'smooth'});
  if(t==='res')renderRes();
  if(t==='gab')renderGab();
}
function matName(n){
  if(n<=10)return'Língua Portuguesa';
  if(n<=15)return'Literatura';
  if(n<=20)return'História';
  if(n<=25)return'Geografia';
  if(n<=30)return'Ciências/Biologia';
  if(n<=40)return'Matemática';
  if(n<=45)return'Física/Química';
  return'Ciências Humanas';
}
function renderQ(){
  const q=QS[qat];
  if(!q)return;
  const tot=QS.length;
  document.getElementById('pf').style.width=(((qat+1)/tot)*100).toFixed(0)+'%';
  document.getElementById('hs').textContent='Questão '+(qat+1)+' de '+tot;
  
  const corr=GAB[String(q.num)];
  const ru=resp[q.num];
  const res=ru!==undefined;
  const fb=modo==='feedback';
  
  // Get image for this question - prefer cropped, fallback to full page
  let imgsHtml='';
  const cropImg=QIMGS[String(q.num)];
  if(cropImg){
    imgsHtml='<div class="pimg"><img src="data:image/jpeg;base64,'+cropImg+'" style="width:100%;display:block;border-radius:8px" loading="lazy"></div>';

  }
  
  const alts=['A','B','C','D'].map(l=>{
    let cls='alt';
    if(res&&fb){if(l===corr)cls+=' ok';else if(l===ru)cls+=' er';}
    else if(res&&l===ru)cls+=' sel';
    return`<button class="${cls}" ${res?'disabled':''} onclick="answer(${q.num},'${l}')">
      <span class="altl">${l}</span><span class="altt">${q[l]}</span>
    </button>`;
  }).join('');
  
  let fbHtml='';
  if(res&&fb){
    const ok=ru===corr;
    fbHtml=`<div class="fb ${ok?'ok':'er'}">${ok?'✅ Resposta correta!':'❌ Gabarito: <strong>'+corr+'</strong>'}</div>`;
  }
  
  document.getElementById('qcon').innerHTML=`
    ${imgsHtml}
    <div class="qcard">
      <div class="qhdr">
        <span class="qbadge">Q${String(q.num).padStart(2,'0')}</span>
        <span class="qmat">${q.mat||matName(q.num)}</span>
      </div>
      <div class="qbody">
        <div class="qen">${q.enunciado}</div>
        <div class="alts">${alts}</div>
        ${fbHtml}
        <div class="qac" style="display:${res?'flex':'none'}">
          <button class="bant" onclick="goQ(${qat-1})" ${qat===0?'disabled':''}>← Anterior</button>
          <button class="bprx" onclick="next()">${qat<QS.length-1?'Próxima →':'🏆 Resultado'}</button>
        </div>
      </div>
    </div>`;
  
  // Scroll nav dot into view
  const dot=document.getElementById('nd-'+qat);
  if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderNav(){
  document.getElementById('nav').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num];
    let cls='nd';
    if(i===qat)cls+=' at';
    else if(r!==undefined)cls+=r===GAB[String(q.num)]?' ok':' er';
    return`<button class="${cls}" id="nd-${i}" onclick="goQ(${i})">${q.num}</button>`;
  }).join('');
}

function renderGab(){
  let ce=0,er=0;
  document.getElementById('gbgrid').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num],c=GAB[String(q.num)];
    let cls='gi';
    if(r!==undefined){if(r===c){cls+=' ok';ce++;}else{cls+=' er';er++;}}
    return`<div class="${cls}" onclick="goQ(${i});aba('quiz')">
      <span class="giq">${String(q.num).padStart(2,'0')}</span>
      <span class="gil">${c}</span>
    </div>`;
  }).join('');
  document.getElementById('gbpl').textContent=ce+' ✅  '+er+' ❌';
}

function renderRes(){
  let ce=0,er=0,nr=0;
  QS.forEach(q=>{const r=resp[q.num];if(r===undefined)nr++;else if(r===GAB[String(q.num)])ce++;else er++;});
  const tot=QS.length,pct=Math.round(ce/tot*100);
  document.getElementById('rsc').textContent=ce;
  document.getElementById('rpt').textContent='de '+tot+' questões';
  document.getElementById('rce').textContent=ce;
  document.getElementById('rer').textContent=er;
  document.getElementById('rnr').textContent=nr;
  document.getElementById('rpct').textContent=pct+'%';
  const msgs=['🔥 Não desista! Pratique mais com outras provas.','📖 Continue estudando! Revise as questões erradas.','💪 Bom resultado! Continue praticando!','🎉 Excelente! Você está muito bem preparado!'];
  document.getElementById('rmsg').textContent=msgs[pct>=80?3:pct>=60?2:pct>=40?1:0];
}

function answer(num,l){
  if(resp[num]!==undefined)return;
  resp[num]=l;
  renderQ();renderNav();renderGab();
}
function goQ(i){
  if(i<0||i>=QS.length)return;
  qat=i;renderQ();renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){if(qat<QS.length-1)goQ(qat+1);else aba('res');}
function refazer(){resp={};qat=0;aba('quiz');renderQ();renderNav();renderGab();}
function voltarIntro(){
  document.getElementById('bbar').style.display='none';
  document.getElementById('hdr').style.display='none';
  ['quiz','gab','res'].forEach(x=>document.getElementById('t-'+x).classList.remove('ativa'));
  document.getElementById('t-intro').classList.add('ativa');
  resp={};qat=0;
}
</script>
