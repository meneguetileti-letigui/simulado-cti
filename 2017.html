<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CTI 2017 – Vestibulinho</title>
<style>
:root{--az:#1a3a6b;--az2:#2563eb;--az3:#eff6ff;--ve:#16a34a;--ve2:#dcfce7;--vm:#dc2626;--vm2:#fee2e2;--am:#d97706;--am2:#fef3c7;--bg:#f1f5f9;--cd:#fff;--bd:#e2e8f0;--tx:#1e293b;--t2:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
/* HEADER */
#hdr{background:var(--az);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hb{background:#fff;color:var(--az);font-weight:800;font-size:14px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:14px;font-weight:700}.hs{font-size:11px;color:#93c5fd}
.prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.pf{height:100%;background:#60a5fa;border-radius:2px;transition:width .4s}
/* NAV DOTS */
.nav{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;background:var(--cd);border-bottom:1px solid var(--bd);scrollbar-width:none;position:sticky;top:62px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nd{min-width:28px;height:28px;border-radius:7px;border:2px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;font-family:monospace;transition:all .15s}
.nd.at{border-color:var(--az2);background:var(--az2);color:#fff}
.nd.ok{border-color:var(--ve);background:var(--ve2);color:var(--ve)}
.nd.er{border-color:var(--vm);background:var(--vm2);color:var(--vm)}
/* SCREENS */
.tela{display:none}.ativa{display:block}
/* INTRO */
#t-intro{padding:20px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:20px;padding:24px 20px;margin-bottom:20px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;color:#bfdbfe;line-height:1.5}
.hstats{display:flex;gap:10px;margin-top:12px}
.hst{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hst-n{font-size:18px;font-weight:800}.hst-l{font-size:10px;color:#93c5fd}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mgrid{display:grid;gap:9px;margin-bottom:20px}
.mb{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.mb.sel{border-color:var(--az2);background:var(--az3)}
.mi{font-size:22px;flex-shrink:0}.mn{font-size:14px;font-weight:700}.md{font-size:11px;color:var(--t2)}
.btn-in{width:100%;padding:14px;border:none;border-radius:14px;background:var(--az2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);font-family:inherit}
.btn-in:active{transform:scale(.97)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--az2);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 16px;font-family:inherit}
/* QUIZ */
#t-quiz{padding-bottom:90px}
.qwrap{max-width:600px;margin:0 auto;padding:14px 14px 0}
/* PAGE IMAGE */
.pimg{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pimg img{width:100%;display:block}
.pimg-lbl{background:var(--az);color:#fff;font-size:11px;font-weight:700;padding:6px 12px;display:flex;align-items:center;gap:6px}
/* QUESTION CARD */
.qcard{background:var(--cd);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;animation:fu .2s ease;margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qhdr{background:var(--az);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.qbadge{background:rgba(255,255,255,.18);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;font-family:monospace}
.qmat{font-size:11px;color:#93c5fd}
.qbody{padding:14px}
.qen{font-size:13.5px;line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.alts{display:flex;flex-direction:column;gap:7px}
.alt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s;text-align:left;width:100%;-webkit-user-select:none}
.alt:active{transform:scale(.98)}
.altl{min-width:26px;height:26px;border-radius:7px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;transition:all .15s}
.altt{font-size:13px;line-height:1.5;padding-top:3px}
.alt.sel{border-color:var(--az2);background:var(--az3)}.alt.sel .altl{background:var(--az2);color:#fff}
.alt.ok{border-color:var(--ve);background:var(--ve2)}.alt.ok .altl{background:var(--ve);color:#fff}
.alt.er{border-color:var(--vm);background:var(--vm2)}.alt.er .altl{background:var(--vm);color:#fff}
.alt:disabled{cursor:default}
.fb{margin:10px 0 0;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px}
.fb.ok{background:var(--ve2);color:var(--ve);display:flex}
.fb.er{background:var(--vm2);color:var(--vm);display:flex}
.qac{padding:10px 0 4px;display:flex;gap:8px}
.bant,.bprx{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.bant:active,.bprx:active{transform:scale(.97)}
.bant{background:var(--bg);border:2px solid var(--bd);color:var(--tx)}
.bprx{background:var(--az2);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3)}
/* GAB */
#t-gab{padding:14px 14px 90px;max-width:600px;margin:0 auto}
.gbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbpl{font-size:13px;font-weight:700;color:var(--az)}
.gbgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--cd);border-radius:16px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gi{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:9px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s}
.gi.ok{border-color:var(--ve);background:var(--ve2)}.gi.er{border-color:var(--vm);background:var(--vm2)}
.giq{font-size:10px;font-weight:700;color:var(--t2);font-family:monospace}
.gil{font-size:15px;font-weight:800;color:var(--az);font-family:monospace}
.gi.ok .giq,.gi.ok .gil{color:var(--ve)}.gi.er .giq,.gi.er .gil{color:var(--vm)}
/* RES */
#t-res{padding:14px 14px 90px;max-width:480px;margin:0 auto}
.rhero{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
.rsc{font-size:52px;font-weight:800;line-height:1}.rde{font-size:14px;color:#93c5fd;margin-bottom:4px}
.rpt{font-size:22px;font-weight:700;color:#60a5fa}.rmsg{font-size:13px;color:#bfdbfe;margin-top:8px;line-height:1.4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--cd);border-radius:13px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stn{font-size:26px;font-weight:800}.stl{font-size:11px;color:var(--t2);font-weight:600}
.cv{color:var(--ve)}.cm{color:var(--vm)}.ca{color:var(--am)}.caz{color:var(--az)}
.bref{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;transition:all .15s}
.bref:active{transform:scale(.97)}
.bref.p{background:var(--az2);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bref.s{background:var(--bg);color:var(--az);border:2px solid var(--az2)}
/* BOTTOM */
#bbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-top:1px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 10px rgba(0,0,0,.07);z-index:100}
.bbi{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0;font-size:10px;font-weight:600;color:var(--t2);font-family:inherit}
.tab.at{color:var(--az2)}.tabi{font-size:19px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}
/* INDEX LINK */
.idx-link{display:block;text-align:center;padding:10px;color:var(--t2);font-size:12px;text-decoration:none;margin-top:8px}
</style>
</head>
<body>

<div id="hdr" style="display:none">
  <div class="hr">
    <div class="hb">CTI</div>
    <div><div class="ht">Vestibulinho 2017</div><div class="hs" id="hs">Prova 2017</div></div>
  </div>
  <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
</div>

<!-- INTRO -->
<div id="t-intro" class="tela ativa">
  <div class="hero">
    <h1>📚 Prova 2017</h1>
    <p>Vestibulinho Unificado CTI — Colégio Técnico Industrial</p>
    <div class="hstats">
      <div class="hst"><div class="hst-n">50</div><div class="hst-l">questões</div></div>
      <div class="hst"><div class="hst-n">5</div><div class="hst-l">matérias</div></div>
      <div class="hst"><div class="hst-n">4h</div><div class="hst-l">duração</div></div>
    </div>
  </div>
  <div class="slbl">Modo de estudo</div>
  <div class="mgrid">
    <button class="mb sel" onclick="selModo('feedback',this)">
      <span class="mi">⚡</span>
      <div><div class="mn">Feedback imediato</div><div class="md">Veja se acertou logo após responder</div></div>
    </button>
    <button class="mb" onclick="selModo('simulado',this)">
      <span class="mi">🎯</span>
      <div><div class="mn">Modo simulado</div><div class="md">Responda tudo e veja resultado no final</div></div>
    </button>
  </div>
  <button class="btn-in" onclick="iniciar()">Iniciar prova 2017 →</button>
  <a href="index.html" class="idx-link">← Voltar para todas as provas</a>
</div>

<!-- QUIZ -->
<div id="t-quiz" class="tela">
  <div class="nav" id="nav"></div>
  <div class="qwrap" id="qcon"></div>
</div>

<!-- GABARITO -->
<div id="t-gab" class="tela">
  <div class="gbtop">
    <div class="slbl" style="margin:0">Gabarito Oficial 2017</div>
    <div class="gbpl" id="gbpl"></div>
  </div>
  <div class="gbgrid" id="gbgrid"></div>
</div>

<!-- RESULTADO -->
<div id="t-res" class="tela">
  <div class="rhero">
    <div class="rde">Você acertou</div>
    <div class="rsc" id="rsc">0</div>
    <div class="rpt" id="rpt">de 50 questões</div>
    <div class="rmsg" id="rmsg"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stn cv" id="rce">0</div><div class="stl">✅ Certas</div></div>
    <div class="stat"><div class="stn cm" id="rer">0</div><div class="stl">❌ Erradas</div></div>
    <div class="stat"><div class="stn ca" id="rnr">0</div><div class="stl">⬜ Não respondidas</div></div>
    <div class="stat"><div class="stn caz" id="rpct">0%</div><div class="stl">📊 Aproveitamento</div></div>
  </div>
  <button class="bref p" onclick="refazer()">🔄 Refazer esta prova</button>
  <button class="bref s" onclick="voltarIntro()">🏠 Menu inicial</button>
</div>

<div id="bbar">
  <div class="bbi">
    <button class="tab at" id="tab-quiz" onclick="aba('quiz')"><span class="tabi">📝</span>Quiz</button>
    <button class="tab" id="tab-gab" onclick="aba('gab')"><span class="tabi">📋</span>Gabarito</button>
    <button class="tab" id="tab-res" onclick="aba('res')"><span class="tabi">🏆</span>Resultado</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const QS=[{"num": 1, "mat": "Língua Portuguesa", "enunciado": "Texto 'Ser bom em matemática é hereditário': estudo da Universidade de Pittsburgh concluiu que é possível prever o desempenho matemático dos filhos olhando para o talento dos pais.\n\nAs informações do texto permitem concluir que", "A": "o conhecimento matemático já nasce com a criança e não se desenvolve ao longo dos anos.", "B": "as habilidades de entender números e fazer cálculos são comprovadamente transmitidas de pais para filhos pela genética.", "C": "a aptidão matemática dos filhos pode ser uma herança dos pais, embora a origem genética da matemática não tenha sido provada.", "D": "o interesse da criança pela matemática é herdado dos pais e não tem relação com o senso numérico."}, {"num": 2, "mat": "Língua Portuguesa", "enunciado": "Um provérbio cuja mensagem se relaciona com o conteúdo do texto é:", "A": "Casa de ferreiro, espeto de pau.", "B": "Depois da tempestade, vem a bonança.", "C": "Deus ajuda quem cedo madruga.", "D": "Filho de peixe, peixinho é."}, {"num": 3, "mat": "Língua Portuguesa", "enunciado": "O verbo 'tender' nas passagens do texto tem sentido equivalente a", "A": "ter propensão a fazer algo.", "B": "insistir para realizar algo.", "C": "repetir algo à exaustão.", "D": "sentir-se incomodado com algo."}, {"num": 4, "mat": "Língua Portuguesa", "enunciado": "Preservando-se o sentido original, a expressão 'sobre a hereditariedade da matemática' está corretamente substituída, de acordo com a norma-padrão, por:", "A": "à respeito da", "B": "com relação à", "C": "à cerca da", "D": "com vistas à"}, {"num": 5, "mat": "Língua Portuguesa", "enunciado": "A partir da _____ realizada na Universidade de Pittsburgh, os cientistas _____ resultados que ainda precisam ser _____ com cautela, mas já _____ tirar algumas conclusões.\n\nAssinale a alternativa que preenche, correta e respectivamente, as lacunas.", "A": "experiência ... obtiveram ... analisados ... puderam", "B": "experiência ... obtiverão ... analisados ... poderão", "C": "experiencia ... obtiverão ... analisados ... puderão", "D": "experiencia ... obtiveram ... analizados ... poderam"}, {"num": 6, "mat": "Língua Portuguesa", "enunciado": "Leia o texto para responder às questões de números 06 a 09.\n[Texto sobre a importância de verificar informações e buscar diferentes fontes antes de acreditar e compartilhar notícias]\n\nO texto aborda principalmente", "A": "a necessidade de verificar a veracidade das informações antes de compartilhá-las.", "B": "a importância de confiar sempre nas redes sociais como fonte de informação.", "C": "os malefícios do uso excessivo da internet por adolescentes.", "D": "a obrigação legal de checar as fontes das notícias."}, {"num": 7, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre verificação de informações]\n\nNa tira apresentada no texto, o comportamento da personagem sugere que ela", "A": "verifica a veracidade das informações antes de compartilhá-las.", "B": "compartilha a notícia sem verificar sua veracidade.", "C": "ignora completamente as informações da notícia.", "D": "acredita cegamente nas informações divulgadas."}, {"num": 8, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre verificação de informações]\n\nA palavra que NÃO apresenta erro de grafia é", "A": "enviezado.", "B": "propraganda.", "C": "notícia.", "D": "infomarção."}, {"num": 9, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre verificação de informações]\n\nAssinale a alternativa em que o emprego do acento indicativo da crase está em conformidade com a norma-padrão.", "A": "Devemos estar atentos à quais sites acessamos.", "B": "É importante buscar informações à partir de fontes confiáveis.", "C": "As pessoas devem recorrer às fontes primárias de informação.", "D": "As informações devem ser verificadas à exaustão."}, {"num": 10, "mat": "Língua Portuguesa", "enunciado": "Leia o texto para responder às questões de números 10 e 11.\n[Tira cômica sobre dois personagens discutindo se devem ou não agir de determinada forma]\n\nNa tira, o efeito de humor ocorre porque", "A": "os personagens concordam plenamente sobre o que fazer.", "B": "um dos personagens age de forma contrária ao que dizia.", "C": "os dois personagens ficam com medo e fogem.", "D": "um dos personagens não entende a situação."}, {"num": 11, "mat": "Língua Portuguesa", "enunciado": "[Tira cômica]\n\nO predicado da frase apresentada na tira é classificado como", "A": "verbal, com verbo transitivo direto.", "B": "nominal, com verbo de ligação.", "C": "verbal, com verbo intransitivo.", "D": "verbo-nominal, com verbo de ligação e verbo principal."}, {"num": 12, "mat": "Língua Portuguesa", "enunciado": "Leia o texto para responder às questões de números 12 a 15.\n[Texto sobre a importância da leitura na formação intelectual e cultural das pessoas]\n\nO texto tem como objetivo principal", "A": "desestimular o uso de dispositivos eletrônicos.", "B": "mostrar que a leitura contribui para o desenvolvimento intelectual e cultural.", "C": "apresentar os melhores livros para ler em cada fase da vida.", "D": "defender que a leitura é uma atividade exclusiva para estudantes."}, {"num": 13, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre leitura]\n\nDe acordo com o texto, a leitura é importante porque", "A": "permite que as pessoas memorizem todos os fatos da história.", "B": "contribui para o desenvolvimento do vocabulário e do senso crítico.", "C": "é a única forma de obter conhecimento sobre o mundo.", "D": "garante o sucesso profissional e financeiro das pessoas."}, {"num": 14, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre leitura]\n\nNo trecho do texto, o pronome 'ela' refere-se a", "A": "a escola.", "B": "a televisão.", "C": "a leitura.", "D": "a tecnologia."}, {"num": 15, "mat": "Língua Portuguesa", "enunciado": "[Texto sobre leitura]\n\nAssinale a alternativa em que a oração apresenta predicado verbal.", "A": "Os livros são fontes inesgotáveis de conhecimento.", "B": "A leitura é fundamental para o desenvolvimento humano.", "C": "As crianças leram muitos livros ao longo do ano.", "D": "O texto literário é uma forma de arte."}, {"num": 16, "mat": "Matemática", "enunciado": "Um marceneiro construiu uma mesa e comprou 3 latas de tinta de 0,9 litro cada. Utilizou 2/3 do total de tinta comprada.\n\nO volume de tinta que sobrou foi de", "A": "0,6 litro.", "B": "0,7 litro.", "C": "0,8 litro.", "D": "0,9 litro."}, {"num": 17, "mat": "Matemática", "enunciado": "Uma professora tem 28 alunos em sua turma. Na última prova, 3/7 dos alunos tiraram nota acima de 7,0. Dos que não tiraram nota acima de 7,0, metade tirou nota entre 5,0 e 7,0.\n\nO número de alunos que tiraram nota abaixo de 5,0 foi", "A": "6.", "B": "7.", "C": "8.", "D": "9."}, {"num": 18, "mat": "Matemática", "enunciado": "Uma torneira enche um reservatório em 4 horas. Outra, com capacidade maior, encheria o mesmo reservatório em 3 horas. Trabalhando juntas, encheriam o reservatório em", "A": "1 hora e 12 minutos.", "B": "1 hora e 24 minutos.", "C": "1 hora e 36 minutos.", "D": "1 hora e 48 minutos."}, {"num": 19, "mat": "Matemática", "enunciado": "Em uma escola, o número de meninas corresponde a 3/5 do número de meninos. Sabendo-se que há 240 alunos nessa escola, o número de meninas é", "A": "80.", "B": "90.", "C": "95.", "D": "100."}, {"num": 20, "mat": "Matemática", "enunciado": "Uma loja vendeu 120 pares de sapatos em janeiro. Em fevereiro, vendeu 20% a mais que em janeiro. Em março, vendeu 10% a menos que em fevereiro.\n\nO número de pares vendidos em março foi", "A": "129.", "B": "130.", "C": "144.", "D": "158."}, {"num": 21, "mat": "Matemática", "enunciado": "P = 5x² – 3x + 2 e Q = 2x² + 4x – 1. O valor de P – Q para x = 1 é", "A": "–1.", "B": "0.", "C": "1.", "D": "2."}, {"num": 22, "mat": "Matemática", "enunciado": "Um tanque retangular tem 3 m de comprimento, 2 m de largura e 1,5 m de altura. Sabe-se que 1/4 desse tanque já está com água.\n\nO volume de água necessário para enchê-lo completamente é", "A": "6,75 m³.", "B": "7,00 m³.", "C": "7,25 m³.", "D": "7,50 m³."}, {"num": 23, "mat": "Matemática", "enunciado": "A média aritmética das idades de 4 pessoas é 30 anos. Se uma 5ª pessoa com 40 anos for incluída no grupo, a nova média aritmética das idades será de", "A": "30 anos.", "B": "31 anos.", "C": "32 anos.", "D": "33 anos."}, {"num": 24, "mat": "Matemática", "enunciado": "Em uma turma com 40 alunos, 25% são reprovados. Dos aprovados, 60% recebem menção 'A'.\n\nO número de alunos aprovados que recebem menção 'A' é", "A": "15.", "B": "16.", "C": "17.", "D": "18."}, {"num": 25, "mat": "Matemática", "enunciado": "Uma pessoa tem R$ 5.400,00 e quer investir em dois fundos A e B. Ela investiu 2/3 do total no fundo A.\n\nO valor investido no fundo B foi de", "A": "R$ 1.200,00.", "B": "R$ 1.600,00.", "C": "R$ 1.800,00.", "D": "R$ 2.000,00."}, {"num": 26, "mat": "Matemática", "enunciado": "Uma empresa tem 120 funcionários. 40% são mulheres e 60% são homens. Entre os homens, 1/4 tem nível superior.\n\nO número de homens com nível superior é", "A": "16.", "B": "18.", "C": "20.", "D": "22."}, {"num": 27, "mat": "Matemática", "enunciado": "Em um triângulo retângulo, os catetos medem 6 cm e 8 cm.\n\nO valor da hipotenusa é", "A": "9 cm.", "B": "10 cm.", "C": "11 cm.", "D": "12 cm."}, {"num": 28, "mat": "Matemática", "enunciado": "Um retângulo tem perímetro de 36 cm e sua largura é 1/3 do seu comprimento.\n\nA área desse retângulo é", "A": "54 cm².", "B": "62 cm².", "C": "72 cm².", "D": "81 cm²."}, {"num": 29, "mat": "Matemática", "enunciado": "A soma dos ângulos internos de um polígono convexo é 1.440°.\n\nO número de lados desse polígono é", "A": "9.", "B": "10.", "C": "11.", "D": "12."}, {"num": 30, "mat": "Matemática", "enunciado": "Uma bola é lançada verticalmente e percorre, a cada segundo, 20 metros a menos que no segundo anterior. Nos primeiros 2 segundos, percorreu 120 metros.\n\nNos 3 primeiros segundos, a bola percorreu", "A": "160 m.", "B": "170 m.", "C": "180 m.", "D": "190 m."}, {"num": 31, "mat": "Ciências Naturais", "enunciado": "Sobre os seres vivos, é correto afirmar que", "A": "os fungos são seres autotróficos e produtores de oxigênio.", "B": "as bactérias são organismos eucariotas e unicelulares.", "C": "os vírus são acelulares e parasitas obrigatórios de células vivas.", "D": "as algas são organismos procariontes e realizam fotossíntese."}, {"num": 32, "mat": "Ciências Naturais", "enunciado": "A fotossíntese é o processo pelo qual as plantas produzem seu próprio alimento. Os produtos finais da fotossíntese são", "A": "gás carbônico e água.", "B": "glicose e oxigênio.", "C": "gás carbônico e glicose.", "D": "oxigênio e água."}, {"num": 33, "mat": "Ciências Naturais", "enunciado": "O sistema circulatório humano é composto por coração, vasos sanguíneos e sangue. O sangue venoso, rico em CO₂, segue do coração para os pulmões. Esse trajeto é conhecido como circulação", "A": "sistêmica.", "B": "pulmonar.", "C": "linfática.", "D": "colateral."}, {"num": 34, "mat": "Ciências Naturais", "enunciado": "As rochas sedimentares se formam a partir da deposição e compactação de sedimentos. Um exemplo de rocha sedimentar é", "A": "o granito.", "B": "o basalto.", "C": "a ardósia.", "D": "o calcário."}, {"num": 35, "mat": "Ciências Naturais", "enunciado": "O efeito estufa é um fenômeno natural que mantém a temperatura da Terra em níveis adequados para a vida. O principal gás responsável pelo efeito estufa intensificado é", "A": "o oxigênio (O₂).", "B": "o nitrogênio (N₂).", "C": "o dióxido de carbono (CO₂).", "D": "o ozônio (O₃)."}, {"num": 36, "mat": "Ciências Naturais", "enunciado": "A célula é a unidade básica da vida. As células animais se diferenciam das células vegetais por não possuírem", "A": "mitocôndrias.", "B": "ribossomos.", "C": "membrana plasmática.", "D": "parede celular e cloroplastos."}, {"num": 37, "mat": "Ciências Naturais", "enunciado": "O Sistema Solar é composto pelo Sol e pelos corpos celestes que orbitam ao seu redor. O planeta mais próximo do Sol é", "A": "Vênus.", "B": "Marte.", "C": "Mercúrio.", "D": "Terra."}, {"num": 38, "mat": "Ciências Naturais", "enunciado": "A cadeia alimentar representa a transferência de energia entre os seres vivos. O ser vivo que ocupa o primeiro nível trófico é chamado de", "A": "consumidor primário.", "B": "consumidor secundário.", "C": "produtor.", "D": "decompositor."}, {"num": 39, "mat": "Ciências Naturais", "enunciado": "Uma substância pura tem composição química definida e propriedades físicas e químicas constantes. É exemplo de substância pura", "A": "o ar atmosférico.", "B": "a água do mar.", "C": "o bronze.", "D": "o ouro."}, {"num": 40, "mat": "Ciências Naturais", "enunciado": "A lei da conservação da massa (Lavoisier) afirma que em uma reação química fechada", "A": "a massa dos reagentes é sempre menor que a massa dos produtos.", "B": "a massa dos reagentes é sempre maior que a massa dos produtos.", "C": "a soma das massas dos reagentes é igual à soma das massas dos produtos.", "D": "a massa dos produtos é independente da massa dos reagentes."}, {"num": 41, "mat": "Ciências Humanas", "enunciado": "A Revolução Industrial iniciou-se na Inglaterra no século XVIII. Uma das principais consequências foi", "A": "a diminuição da desigualdade social.", "B": "o crescimento do trabalho artesanal.", "C": "o êxodo rural e o crescimento das cidades.", "D": "a redução do comércio internacional."}, {"num": 42, "mat": "Ciências Humanas", "enunciado": "O Iluminismo foi um movimento intelectual do século XVIII que valorizava a razão e a ciência. Um dos principais filósofos iluministas foi", "A": "Karl Marx.", "B": "Jean-Jacques Rousseau.", "C": "Napoleão Bonaparte.", "D": "Luís XIV."}, {"num": 43, "mat": "Ciências Humanas", "enunciado": "A Proclamação da República no Brasil ocorreu em 1889. Um dos fatores que contribuiu para o fim do Império foi", "A": "a expansão do café para novas regiões.", "B": "o apoio da Igreja Católica ao imperador.", "C": "a abolição da escravidão e a perda do apoio dos fazendeiros.", "D": "o fortalecimento do Partido Republicano entre a população urbana."}, {"num": 44, "mat": "Ciências Humanas", "enunciado": "O Brasil possui uma grande extensão territorial e apresenta diferentes tipos de clima. O clima predominante na maior parte do território brasileiro é o", "A": "tropical.", "B": "equatorial.", "C": "semiárido.", "D": "subtropical."}, {"num": 45, "mat": "Ciências Humanas", "enunciado": "A globalização é um processo de integração econômica, cultural e política entre os países. Uma consequência negativa da globalização é", "A": "o aumento da troca de informações entre os países.", "B": "o crescimento do comércio internacional.", "C": "o aumento das desigualdades sociais entre os países.", "D": "a maior integração cultural entre os povos."}, {"num": 46, "mat": "Ciências Humanas", "enunciado": "O Brasil é um país de grande diversidade étnica e cultural. A miscigenação étnica do povo brasileiro é resultado principalmente da", "A": "imigração europeia no século XIX.", "B": "mistura entre indígenas, africanos e europeus.", "C": "influência exclusiva dos povos africanos.", "D": "colonização portuguesa e espanhola."}, {"num": 47, "mat": "Ciências Humanas", "enunciado": "A Guerra Fria foi um período de tensão política e militar entre os Estados Unidos e a União Soviética. Esse período foi marcado principalmente pela", "A": "disputa territorial direta entre as duas superpotências.", "B": "corrida armamentista e espacial entre as superpotências.", "C": "colaboração econômica entre os países capitalistas e socialistas.", "D": "unificação política dos países europeus sob liderança norte-americana."}, {"num": 48, "mat": "Ciências Humanas", "enunciado": "A Primeira Guerra Mundial (1914-1918) teve como estopim", "A": "a Revolução Russa de 1917.", "B": "a invasão da Polônia pela Alemanha.", "C": "o assassinato do arquiduque Francisco Ferdinando.", "D": "a queda da Bolsa de Valores de Nova York."}, {"num": 49, "mat": "Ciências Humanas", "enunciado": "O processo de industrialização brasileiro se intensificou durante o governo de", "A": "Dom Pedro II.", "B": "Getúlio Vargas.", "C": "Juscelino Kubitschek.", "D": "Fernando Henrique Cardoso."}, {"num": 50, "mat": "Ciências Humanas", "enunciado": "A Amazônia é o maior bioma brasileiro e abriga a maior biodiversidade do planeta. Um dos principais problemas ambientais que afeta a Amazônia é", "A": "a desertificação causada pela escassez de chuvas.", "B": "o desmatamento para a expansão da agropecuária.", "C": "a poluição dos rios pelo descarte de lixo urbano.", "D": "a erosão do solo causada pelo excesso de chuvas."}];

let modo='feedback',resp={},qat=0;

function selModo(m,b){modo=m;document.querySelectorAll('.mb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');}
function iniciar(){
  resp={};qat=0;
  document.getElementById('t-intro').classList.remove('ativa');
  document.getElementById('hdr').style.display='block';
  document.getElementById('bbar').style.display='block';
  aba('quiz');renderQ();renderNav();renderGab();
}
function aba(t){
  ['quiz','gab','res'].forEach(x=>{document.getElementById('t-'+x).classList.remove('ativa');document.getElementById('tab-'+x).classList.remove('at');});
  document.getElementById('t-'+t).classList.add('ativa');
  document.getElementById('tab-'+t).classList.add('at');
  window.scrollTo({top:0,behavior:'smooth'});
  if(t==='res')renderRes();
  if(t==='gab')renderGab();
}
function matName(n){
  if(n<=10)return'Língua Portuguesa';
  if(n<=15)return'Literatura';
  if(n<=20)return'História';
  if(n<=25)return'Geografia';
  if(n<=30)return'Ciências/Biologia';
  if(n<=40)return'Matemática';
  if(n<=45)return'Física/Química';
  return'Ciências Humanas';
}
function renderQ(){
  const q=QS[qat];
  if(!q)return;
  const tot=QS.length;
  document.getElementById('pf').style.width=(((qat+1)/tot)*100).toFixed(0)+'%';
  document.getElementById('hs').textContent='Questão '+(qat+1)+' de '+tot;
  
  const corr=GAB[String(q.num)];
  const ru=resp[q.num];
  const res=ru!==undefined;
  const fb=modo==='feedback';
  
  // Get image for this question - prefer cropped, fallback to full page
  let imgsHtml='';
  const cropImg=QIMGS[String(q.num)];
  if(cropImg){
    imgsHtml='<div class="pimg"><img src="data:image/jpeg;base64,'+cropImg+'" style="width:100%;display:block;border-radius:8px" loading="lazy"></div>';

  }
  
  const alts=['A','B','C','D'].map(l=>{
    let cls='alt';
    if(res&&fb){if(l===corr)cls+=' ok';else if(l===ru)cls+=' er';}
    else if(res&&l===ru)cls+=' sel';
    return`<button class="${cls}" ${res?'disabled':''} onclick="answer(${q.num},'${l}')">
      <span class="altl">${l}</span><span class="altt">${q[l]}</span>
    </button>`;
  }).join('');
  
  let fbHtml='';
  if(res&&fb){
    const ok=ru===corr;
    fbHtml=`<div class="fb ${ok?'ok':'er'}">${ok?'✅ Resposta correta!':'❌ Gabarito: <strong>'+corr+'</strong>'}</div>`;
  }
  
  document.getElementById('qcon').innerHTML=`
    ${imgsHtml}
    <div class="qcard">
      <div class="qhdr">
        <span class="qbadge">Q${String(q.num).padStart(2,'0')}</span>
        <span class="qmat">${q.mat||matName(q.num)}</span>
      </div>
      <div class="qbody">
        <div class="qen">${q.enunciado}</div>
        <div class="alts">${alts}</div>
        ${fbHtml}
        <div class="qac" style="display:${res?'flex':'none'}">
          <button class="bant" onclick="goQ(${qat-1})" ${qat===0?'disabled':''}>← Anterior</button>
          <button class="bprx" onclick="next()">${qat<QS.length-1?'Próxima →':'🏆 Resultado'}</button>
        </div>
      </div>
    </div>`;
  
  // Scroll nav dot into view
  const dot=document.getElementById('nd-'+qat);
  if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderNav(){
  document.getElementById('nav').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num];
    let cls='nd';
    if(i===qat)cls+=' at';
    else if(r!==undefined)cls+=r===GAB[String(q.num)]?' ok':' er';
    return`<button class="${cls}" id="nd-${i}" onclick="goQ(${i})">${q.num}</button>`;
  }).join('');
}

function renderGab(){
  let ce=0,er=0;
  document.getElementById('gbgrid').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num],c=GAB[String(q.num)];
    let cls='gi';
    if(r!==undefined){if(r===c){cls+=' ok';ce++;}else{cls+=' er';er++;}}
    return`<div class="${cls}" onclick="goQ(${i});aba('quiz')">
      <span class="giq">${String(q.num).padStart(2,'0')}</span>
      <span class="gil">${c}</span>
    </div>`;
  }).join('');
  document.getElementById('gbpl').textContent=ce+' ✅  '+er+' ❌';
}

function renderRes(){
  let ce=0,er=0,nr=0;
  QS.forEach(q=>{const r=resp[q.num];if(r===undefined)nr++;else if(r===GAB[String(q.num)])ce++;else er++;});
  const tot=QS.length,pct=Math.round(ce/tot*100);
  document.getElementById('rsc').textContent=ce;
  document.getElementById('rpt').textContent='de '+tot+' questões';
  document.getElementById('rce').textContent=ce;
  document.getElementById('rer').textContent=er;
  document.getElementById('rnr').textContent=nr;
  document.getElementById('rpct').textContent=pct+'%';
  const msgs=['🔥 Não desista! Pratique mais com outras provas.','📖 Continue estudando! Revise as questões erradas.','💪 Bom resultado! Continue praticando!','🎉 Excelente! Você está muito bem preparado!'];
  document.getElementById('rmsg').textContent=msgs[pct>=80?3:pct>=60?2:pct>=40?1:0];
}

function answer(num,l){
  if(resp[num]!==undefined)return;
  resp[num]=l;
  renderQ();renderNav();renderGab();
}
function goQ(i){
  if(i<0||i>=QS.length)return;
  qat=i;renderQ();renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){if(qat<QS.length-1)goQ(qat+1);else aba('res');}
function refazer(){resp={};qat=0;aba('quiz');renderQ();renderNav();renderGab();}
function voltarIntro(){
  document.getElementById('bbar').style.display='none';
  document.getElementById('hdr').style.display='none';
  ['quiz','gab','res'].forEach(x=>document.getElementById('t-'+x).classList.remove('ativa'));
  document.getElementById('t-intro').classList.add('ativa');
  resp={};qat=0;
}
</script>
</body>
