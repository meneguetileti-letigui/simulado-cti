<head>

<title>CTI 2018 – Vestibulinho</title>
<style>
:root{--az:#1a3a6b;--az2:#2563eb;--az3:#eff6ff;--ve:#16a34a;--ve2:#dcfce7;--vm:#dc2626;--vm2:#fee2e2;--bg:#f1f5f9;--cd:#fff;--bd:#e2e8f0;--tx:#1e293b;--t2:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
#hdr{background:var(--az);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hb{background:#fff;color:var(--az);font-weight:800;font-size:14px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:14px;font-weight:700}.hs{font-size:11px;color:#93c5fd}
.prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.pf{height:100%;background:#60a5fa;border-radius:2px;transition:width .4s}
.nav{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;background:var(--cd);border-bottom:1px solid var(--bd);scrollbar-width:none;position:sticky;top:62px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nd{min-width:28px;height:28px;border-radius:7px;border:2px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;font-family:monospace;transition:all .15s}
.nd.at{border-color:var(--az2);background:var(--az2);color:#fff}
.nd.ok{border-color:var(--ve);background:var(--ve2);color:var(--ve)}
.nd.er{border-color:var(--vm);background:var(--vm2);color:var(--vm)}
.tela{display:none}.ativa{display:block}
#t-intro{padding:20px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:20px;padding:24px 20px;margin-bottom:20px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;color:#bfdbfe;line-height:1.5}
.hstats{display:flex;gap:10px;margin-top:12px}
.hst{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hst-n{font-size:18px;font-weight:800}.hst-l{font-size:10px;color:#93c5fd}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mgrid{display:grid;gap:9px;margin-bottom:20px}
.mb{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.mb.sel{border-color:var(--az2);background:var(--az3)}
.mi{font-size:22px;flex-shrink:0}.mn{font-size:14px;font-weight:700}.md{font-size:11px;color:var(--t2)}
.btn-in{width:100%;padding:14px;border:none;border-radius:14px;background:var(--az2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);font-family:inherit}
.btn-in:active{transform:scale(.97)}
.idx-link{display:block;text-align:center;padding:10px;color:var(--t2);font-size:12px;text-decoration:none;margin-top:8px}
#t-quiz{padding-bottom:90px}
.qwrap{max-width:600px;margin:0 auto;padding:14px 14px 0}
.pimg{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pimg-lbl{background:var(--az);color:#fff;font-size:11px;font-weight:700;padding:6px 12px}
.qcard{background:var(--cd);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;animation:fu .2s ease;margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qhdr{background:var(--az);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.qbadge{background:rgba(255,255,255,.18);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;font-family:monospace}
.qmat{font-size:11px;color:#93c5fd}
.qbody{padding:14px}
.qen{font-size:13.5px;line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.alts{display:flex;flex-direction:column;gap:7px}
.alt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s;text-align:left;width:100%;-webkit-user-select:none}
.alt:active{transform:scale(.98)}
.altl{min-width:26px;height:26px;border-radius:7px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;transition:all .15s}
.altt{font-size:13px;line-height:1.5;padding-top:3px}
.alt.sel{border-color:var(--az2);background:var(--az3)}.alt.sel .altl{background:var(--az2);color:#fff}
.alt.ok{border-color:var(--ve);background:var(--ve2)}.alt.ok .altl{background:var(--ve);color:#fff}
.alt.er{border-color:var(--vm);background:var(--vm2)}.alt.er .altl{background:var(--vm);color:#fff}
.alt:disabled{cursor:default}
.fb{margin:10px 0 0;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px}
.fb.ok{background:var(--ve2);color:var(--ve);display:flex}
.fb.er{background:var(--vm2);color:var(--vm);display:flex}
.qac{padding:10px 0 4px;display:flex;gap:8px}
.bant,.bprx{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.bant:active,.bprx:active{transform:scale(.97)}
.bant{background:var(--bg);border:2px solid var(--bd);color:var(--tx)}
.bprx{background:var(--az2);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3)}
#t-gab{padding:14px 14px 90px;max-width:600px;margin:0 auto}
.gbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbpl{font-size:13px;font-weight:700;color:var(--az)}
.gbgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--cd);border-radius:16px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gi{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:9px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s}
.gi.ok{border-color:var(--ve);background:var(--ve2)}.gi.er{border-color:var(--vm);background:var(--vm2)}
.giq{font-size:10px;font-weight:700;color:var(--t2);font-family:monospace}
.gil{font-size:15px;font-weight:800;color:var(--az);font-family:monospace}
.gi.ok .giq,.gi.ok .gil{color:var(--ve)}.gi.er .giq,.gi.er .gil{color:var(--vm)}
#t-res{padding:14px 14px 90px;max-width:480px;margin:0 auto}
.rhero{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
.rsc{font-size:52px;font-weight:800;line-height:1}.rde{font-size:14px;color:#93c5fd;margin-bottom:4px}
.rpt{font-size:22px;font-weight:700;color:#60a5fa}.rmsg{font-size:13px;color:#bfdbfe;margin-top:8px;line-height:1.4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--cd);border-radius:13px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stn{font-size:26px;font-weight:800}.stl{font-size:11px;color:var(--t2);font-weight:600}
.cv{color:var(--ve)}.cm{color:var(--vm)}.ca{color:#d97706}.caz{color:var(--az)}
.bref{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;transition:all .15s}
.bref:active{transform:scale(.97)}
.bref.p{background:var(--az2);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bref.s{background:var(--bg);color:var(--az);border:2px solid var(--az2)}
#bbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-top:1px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 10px rgba(0,0,0,.07);z-index:100}
.bbi{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0;font-size:10px;font-weight:600;color:var(--t2);font-family:inherit}
.tab.at{color:var(--az2)}.tabi{font-size:19px}
</style>
</head>
<body>
<div id="hdr" style="display:none">
  <div class="hr"><div class="hb">CTI</div><div><div class="ht">Vestibulinho 2018</div><div class="hs" id="hs">Prova 2018</div></div></div>

</div>
<div id="t-gab" class="tela">

</div>

  </div>
  <button class="bref p" onclick="refazer()">🔄 Refazer esta prova</button>
  <button class="bref s" onclick="voltarIntro()">🏠 Menu inicial</button>
</div>

"B": "... colore o maior órgão do nosso corpo.", "C": "Quanto mais morena a pele, mais protegida ela é...", "D": "... os raios ultravioleta são importantes para a síntese de vitamina D..."}, {"num": 5, "mat": "Língua Portuguesa", "enunciado": "O acento indicativo de crase está empregado corretamente na frase:", "A": "Os raios UV contribuem para dar força à nossos ossos.", "B": "Exposição moderada à radiação solar pode ser saudável.", "C": "O uso de protetor solar é recomendável à qualquer pessoa.", "D": "Sol em excesso expõe o organismo à uma série de problemas."}, {"num": 6, "mat": "Língua Portuguesa", "enunciado": "A cor da pele não indica diferença _____. Por dentro, os seres humanos _____ órgãos exatamente iguais e funcionando da mesma maneira, independentemente da cor de cada um. O fato é que todos somos membros de uma única _____: Homo sapiens.\n\nAssinale a alternativa que preenche, correta e respectivamente, as lacunas.", "A": "genética ... têm ... espécie", "B": "genética ... tem ... especie", "C": "genetica ... tem ... espécie", "D": "genetica ... têm ... espece"}, {"num": 7, "mat": "Língua Portuguesa", "enunciado": "[Tira Níquel Náusea: bicho-preguiça estava jogando xadrez com a lesma quando a tartaruga chegou. Segundo quadro: 'Conheça você também...' com livro 'Histórias do Ócio']\n\nNa frase do primeiro quadrinho, a expressão verbal estava jogando indica que a ação de jogar", "A": "tinha sido concluída antes de a tartaruga chegar.", "B": "estava em curso no momento em que a tartaruga chegou.", "C": "teve início no instante em que a tartaruga chegou.", "D": "foi interrompida logo depois de a tartaruga chegar."}, {"num": 8, "mat": "Língua Portuguesa", "enunciado": "A forma verbal em – Conheça você também... – expressa uma", "A": "recomendação.", "B": "reprimenda.", "C": "ordem.", "D": "constatação."}, {"num": 9, "mat": "Língua Portuguesa", "enunciado": "Fábula 'O gato e a barata' (Millôr Fernandes): baratinha bêbada sobe pelo copo de vinho. Pede ao gato que a salve. O gato promete não comê-la, vira o copo, e quando a barata escapa e ri por ter enganado o gato, ele pergunta se ela acredita na promessa de uma barata velha e bêbada.\n\nCom o descumprimento de sua promessa, a baratinha revelou", "A": "ter a coragem de enfrentar as garras do gato.", "B": "desconhecer quais eram as intenções do gato.", "C": "ser mais esperta que o gato que a salvou.", "D": "estar mais forte fisicamente que o gato."}, {"num": 10, "mat": "Língua Portuguesa", "enunciado": "Na oração – ... o álcool lhe subiu logo a este. (1º parágrafo) –, o pronome em destaque refere-se ao", "A": "copo quase cheio de vinho.", "B": "vinho que a baratinha estava lambiscando.", "C": "cérebro da baratinha.", "D": "gato que sorria da aflição da baratinha."}, {"num": 11, "mat": "Língua Portuguesa", "enunciado": "Uma moral adequada para a fábula é:", "A": "A mentira não leva a nada.", "B": "O ato generoso é recompensado.", "C": "O corajoso não precisa de ajuda.", "D": "Quem ri por último ri melhor."}, {"num": 12, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que o trecho destacado expressa uma consequência da informação que o antecede.", "A": "A baratinha velha subiu pelo pé do copo quase cheio de vinho... (1º parágrafo)", "B": "... deixo você me engolir inteirinha, como você gosta. (2º parágrafo)", "C": "– Me saaalva! – implorou a baratinha. (2º parágrafo)", "D": "O gato virou o copo com uma patada, o líquido escorreu... (3º parágrafo)"}, {"num": 13, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa cujo predicado da oração, formulado com verbo de ligação, indica o estado da barata.", "A": "... bebeu mais vinho... (1º parágrafo)", "B": "... ficou mais tonta... (1º parágrafo)", "C": "... e já quase morria... (1º parágrafo)", "D": "... ria então a barata... (4º parágrafo)"}, {"num": 14, "mat": "Língua Portuguesa", "enunciado": "[Charge: pai aponta para lixo enorme e diz ao filho: 'Meu filho, um dia tudo isto será seu!']\n(Emidio. lixoanormal.blogspot.com.br, 14.12.2015)\n\nA fala do pai permite concluir que o filho", "A": "usufruirá uma vida confortável no futuro, garantida por seus familiares.", "B": "terá de lidar, no futuro, com um problema negligenciado no presente.", "C": "deve obedecer aos mais velhos para ser bem-sucedido no futuro.", "D": "herdará recursos suficientes para ter uma vida próspera no futuro."}, {"num": 15, "mat": "Língua Portuguesa", "enunciado": "A oração – Meu filho, um dia tudo isto será seu! – tem sujeito", "A": "simples: tudo isto.", "B": "simples: Meu filho.", "C": "indeterminado: um dia.", "D": "inexistente."}, {"num": 16, "mat": "Matemática", "enunciado": "A soma de dois números naturais m e n, sendo m > n, é igual a 131. Dividindo-se o maior pelo menor, obtém-se quociente 7 e resto 3. Desse modo, (m + √n) é igual a", "A": "76.", "B": "87.", "C": "98.", "D": "119."}, {"num": 17, "mat": "Matemática", "enunciado": "Ulisses conseguiu vender seu carro pelo valor anunciado, que era R$ 4.200,00 a mais que o valor que havia pago na compra. Se tivesse vendido com um desconto de 8% sobre o valor anunciado, o valor da venda seria exatamente igual ao que pagou para comprá-lo.\n\nUlisses comprou esse carro por", "A": "R$ 39.400,00.", "B": "R$ 46.200,00.", "C": "R$ 48.300,00.", "D": "R$ 52.500,00."}, {"num": 18, "mat": "Matemática", "enunciado": "Em uma escola, 15 pontos de iluminação foram instalados em linha reta, num corredor de 18 m. Cada ponto está a uma distância de x cm dos pontos imediatamente anterior e sucessor, e o primeiro e o último estão a distâncias iguais de x + 20 cm do início e do final do corredor.\n\nA distância entre o segundo e o penúltimo ponto é, em metros,", "A": "15,6.", "B": "14,4.", "C": "13,2.", "D": "12,8."}, {"num": 19, "mat": "Matemática", "enunciado": "Vânia pretende comprar uma televisão cujo preço é P reais. Deverá pagar 20% à vista na compra, e o restante em uma parcela única, 4 meses após a data da compra, acrescida de juros simples de 30% ao ano. Se irá pagar R$ 240,00 de juros, o preço P é", "A": "R$ 3.000,00.", "B": "R$ 2.800,00.", "C": "R$ 2.600,00.", "D": "R$ 2.400,00."}, {"num": 20, "mat": "Matemática", "enunciado": "Em uma empresa, cinco máquinas iguais produzem um lote de certa peça em 9 horas de funcionamento simultâneo e ininterrupto. Nas mesmas condições, quatro das mesmas máquinas fariam o mesmo serviço em", "A": "11 horas e 25 minutos.", "B": "11 horas e 15 minutos.", "C": "10 horas e 30 minutos.", "D": "10 horas e 20 minutos."}, {"num": 21, "mat": "Matemática", "enunciado": "Em uma loja, dois produtos têm preços unitários iguais a x e y, cuja soma é igual a R$ 69,00. Com os descontos dados, esses preços passam a ser iguais a 2/3 x e 3/4 y, cuja soma é igual a R$ 48,00.\n\nNessas condições, x é igual a", "A": "R$ 18,00.", "B": "R$ 24,00.", "C": "R$ 30,00.", "D": "R$ 45,00."}, {"num": 22, "mat": "Matemática", "enunciado": "[Figura: Quadrado (lado 2x) ao lado de retângulo (largura x, altura 10). Área total = 800 cm²]\n\nSe a área total da figura é igual a 800 cm², então a área do retângulo azul é, em cm², igual a", "A": "410.", "B": "400.", "C": "320.", "D": "300."}, {"num": 23, "mat": "Matemática", "enunciado": "[Figuras: Canteiro A com área 4x²+16x+16 e canteiro B com área 4x²+8x+4]\n\nSendo q1 o binômio que representa o lado do canteiro A, e q2 o binômio que representa o lado do canteiro B, então a fração q1/q2, na sua forma simplificada, é igual a", "A": "2x/(x+1)", "B": "(x+2)/x", "C": "2x/(x+1)", "D": "(x+2)/(x+1)"}, {"num": 24, "mat": "Matemática", "enunciado": "[Figura: Cartaz retangular ABCD dividido em 5 regiões quadradas Q e 2 regiões retangulares R. Área de Q4 = 144 cm², área de R1 = 1200 cm²]\n\nO perímetro do cartaz retangular ABCD é, em centímetros, igual a", "A": "266.", "B": "254.", "C": "248.", "D": "242."}, {"num": 25, "mat": "Matemática", "enunciado": "Dois números, a e b, são tais que a + b = 8 e a² + b² = 34. O valor de a·b é", "A": "16.", "B": "15.", "C": "12.", "D": "10."}, {"num": 26, "mat": "Matemática", "enunciado": "[Figura: Triângulo DFC inscrito em retângulo ABCD. DC = (3x+3) cm, BC = (3x-1) cm. Perímetro do retângulo ABCD = 40 cm]\n\nA área do triângulo DFC é, em cm², igual a", "A": "96.", "B": "54.", "C": "48.", "D": "36."}, {"num": 27, "mat": "Matemática", "enunciado": "[Reta numérica com pontos M, N, P, Q, R: posições -1, c, 0, a, b, 1]\n\nO número resultante da operação [(c+a):(b-c)]² está situado, nessa reta numérica, entre os pontos representados pelas letras", "A": "M e N.", "B": "N e P.", "C": "P e Q.", "D": "Q e R."}, {"num": 28, "mat": "Matemática", "enunciado": "O valor numérico da expressão algébrica (x²+2xy+y²)–(x²–2xy+y²), para x+y=8 e x–y=–2, é", "A": "64.", "B": "60.", "C": "20.", "D": "16."}, {"num": 29, "mat": "Matemática", "enunciado": "Um triângulo ABC tem lados que medem 7 cm, 10 cm e 13 cm, e um triângulo DEF tem lados cujas medidas, em centímetros, são iguais a x, 2x e 9. Se os triângulos ABC e DEF têm perímetros iguais, então o valor de x é, em centímetros, igual a", "A": "10.", "B": "8.", "C": "7.", "D": "6."}, {"num": 30, "mat": "Matemática", "enunciado": "O responsável por uma cantina escolar prepara certo refresco usando sempre a mesma receita. Sabendo que utiliza 2,25 litros de suco para 18 litros de água, se ele utilizar 2,75 litros de suco, a quantidade de refresco preparada será igual, em litros, a", "A": "24,75.", "B": "24.", "C": "22,25.", "D": "22."}, {"num": 31, "mat": "Ciências Naturais", "enunciado": "[Figura: Ilustração do rompimento do reservatório de Mariana-MG, mostrando a lama se espalhando de Fundão até o Rio Galaxo do Norte]\n\nA empresa de mineração responsável defende que o material é inerte, não tóxico. Entretanto, a lama turva a água dos rios e", "A": "reage com a água, criando subprodutos atóxicos.", "B": "reduz a entrada de luz, diminuindo a fotossíntese e, portanto, o oxigênio dissolvido.", "C": "provoca o desenvolvimento de bactérias aeróbicas.", "D": "aumenta o número de microalgas que consomem o oxigênio."}, {"num": 32, "mat": "Ciências Naturais", "enunciado": "[Gráfico de barras: Taxa Anual de Desmatamento na Amazônia Legal de 1988 a 2015, com pico em 1995 (~29000 km²/ano) e redução até 2015]\n\nApesar da tendência de redução nos últimos anos, o desmatamento afeta diretamente o Ciclo do Carbono porque as árvores", "A": "são os maiores reservatórios de carbono do planeta.", "B": "regulam a quantidade de oxigênio atmosférico.", "C": "liberam o carbono para a atmosfera quando destruídas.", "D": "regulam o escoamento superficial das precipitações."}, {"num": 33, "mat": "Ciências Naturais", "enunciado": "[Foto: Anfíbios da família Dendrobatidae — sapinhos ponta de flecha com colorido marcante]\n\nEssas espécies apresentam uma pele rica em substâncias farmacologicamente ativas que as tornam venenosas, indicando", "A": "a necessidade de serem extintas da natureza.", "B": "que são presas atrativas para predadores.", "C": "um eficiente mecanismo de camuflagem.", "D": "um rico potencial para descoberta de novos medicamentos."}, {"num": 34, "mat": "Ciências Naturais", "enunciado": "Após analisar o hemograma de um paciente, o médico receita um medicamento que irá inibir a síntese da parede celular do organismo patogênico que está provocando a infecção. Assim, o medicamento receitado pelo médico refere-se a um", "A": "antibiótico.", "B": "retroviral.", "C": "anti-histamínico.", "D": "antitérmico."}, {"num": 35, "mat": "Ciências Naturais", "enunciado": "[Figura: Diagrama de fluxo de energia em ecossistema — entrada de energia, ingestão, assimilação, produção, crescimento/armazenamento/reprodução, biomassa, respiração, excreção]\n\nA partir da figura, a quantidade de energia disponível para o próximo nível trófico corresponde à produtividade", "A": "primária bruta.", "B": "secundária.", "C": "primária líquida.", "D": "secundária líquida."}, {"num": 36, "mat": "Ciências Naturais", "enunciado": "[Gráfico: Levantamento da opinião favorável de universitários sobre o uso de drogas por área (Biológicas, Humanas, Exatas). Álcool tem maior aprovação geral]\n\nPor meio do gráfico, verifica-se que", "A": "os alunos de biológicas são os que menos aprovam o uso de drogas.", "B": "a aprovação dos alunos é maior para drogas lícitas.", "C": "metade dos alunos de humanas aprovam o uso de maconha.", "D": "os alunos de exatas são os que mais aprovam o uso de drogas, exceto o tabaco."}, {"num": 37, "mat": "Ciências Naturais", "enunciado": "Usinas termoelétricas que utilizam a queima de combustíveis fósseis para gerar energia podem utilizar o carvão que, ao ser queimado, libera dióxido de enxofre na atmosfera, podendo formar", "A": "chuva ácida, devido à sua reação com a água.", "B": "eutrofização, reagindo com o nitrogênio atmosférico.", "C": "ozônio troposférico, reagindo com o oxigênio atmosférico.", "D": "nuvens de gases tóxicos à base de ácido nítrico."}, {"num": 38, "mat": "Ciências Naturais", "enunciado": "[Figuras A, B e C: três tipos de pneus com diferentes áreas de contato com o solo — A tem mais contato, B tem contato médio, C tem menos contato]\n\nOs pneus que produzem uma compactação do solo da menor para a maior intensidade são os do tipo", "A": "B, A e C.", "B": "A, C e B.", "C": "C, B e A.", "D": "A, B e C."}, {"num": 39, "mat": "Ciências Naturais", "enunciado": "[Figura: Reservatório térmico de aquecedor solar com torneira de boia, ladrão, entrada de água fria, saída de água quente para chuveiro, e dois drenos (1 e 2)]\n\nO redutor de turbulência no interior do reservatório é necessário para", "A": "diminuir a velocidade da água fria.", "B": "diminuir a transferência de calor por irradiação.", "C": "diminuir o efeito das correntes de convecção.", "D": "evitar a transferência de calor por condução."}, {"num": 40, "mat": "Ciências Naturais", "enunciado": "[Figura: Aterro sanitário com drenos, cobertura diária, camada com manta de PVC e argila, seta indicando um dreno específico]\n\nA figura indicada pela seta representa um dreno de", "A": "chorume que, ao ser queimado, pode gerar energia.", "B": "gás metano que, ao ser queimado, pode gerar energia.", "C": "gás oxigênio, altamente combustível.", "D": "gás ozônio, proveniente da decomposição dos resíduos."}, {"num": 41, "mat": "Ciências Naturais", "enunciado": "[Figura: Homem empurrando carrinho com caixas. F=10,8 N, m=4,0 Kg, Fatrito=1,8 N]\n\nDado que a 2ª Lei de Newton estabelece que a Força externa aplicada a um corpo é igual ao produto da aceleração pela sua massa, e sabendo-se que a aceleração do carrinho é 1,5 m/s², que a massa da caixa maior é 4,0 Kg, é correto afirmar que a massa da caixa menor é, em Kg, igual a", "A": "1,8", "B": "2,0", "C": "3,0", "D": "5,0"}, {"num": 42, "mat": "Ciências Naturais", "enunciado": "[Gráfico: Posição X (m) em função do tempo t (min) de um automóvel — reta crescente de 100m em t=1,5min até ~650m em t=9,0min]\n\nA velocidade média aproximada desse automóvel, em metros por segundo, entre os instantes t=1,5 min e t=9,0 min é de", "A": "0,88", "B": "1,16", "C": "1,33", "D": "1,55"}, {"num": 43, "mat": "Ciências Naturais", "enunciado": "O petróleo é submetido a um fracionamento para separação de seus componentes por meio da técnica de destilação fracionada, que se baseia nos diferentes", "A": "pesos dos componentes.", "B": "pontos de fusão dos componentes.", "C": "pontos de sublimação dos componentes.", "D": "pontos de ebulição dos componentes."}, {"num": 44, "mat": "Ciências Naturais", "enunciado": "Uma pessoa sobe uma ladeira íngreme de bicicleta, esforçando-se ao máximo para manter sua velocidade constante. Desse modo, é correto afirmar que a sua", "A": "energia cinética está aumentando.", "B": "energia potencial gravitacional está diminuindo.", "C": "energia potencial gravitacional está aumentando.", "D": "energia cinética está diminuindo."}, {"num": 45, "mat": "Ciências Naturais", "enunciado": "[Foto: Ovo fresco submerso em copo de água. Ao se adicionar sal, o ovo passa a flutuar na superfície]\n\nEsse fenômeno ocorre porque", "A": "o ovo diminui sua densidade.", "B": "o sal reduz a densidade da solução.", "C": "o ovo aumenta sua densidade.", "D": "o sal aumenta a densidade da solução."}, {"num": 46, "mat": "Ciências Humanas", "enunciado": "[Mapa: Localização do Bioma X — áreas destacadas na África subsaariana e em pequenas regiões da América do Sul e Ásia]\n\nAs áreas destacadas no mapa caracterizam-se pela presença de", "A": "matas e florestas latifoliadas cuja presença é garantida por climas quentes e chuvas abundantes nos meses de verão.", "B": "cerrados e savanas que cobrem terras com climas que apresentam duas estações distintas: uma chuvosa e outra seca.", "C": "campos e estepes que refletem as condições climáticas semiáridas provocadas pela continentalidade.", "D": "florestas tropicais e mata de cocais típicas de climas que apresentam forte amplitude térmica entre o verão e o inverno."}, {"num": 47, "mat": "Ciências Humanas", "enunciado": "[Gráfico de barras: Pessoas com fome no mundo (milhões) — 2000: ~840, 2004: ~900, 2010: ~830, 2016: ~800]\n\nA leitura do gráfico e os conhecimentos sobre a população mundial permitem afirmar que", "A": "o flagelo da fome está gradativamente desaparecendo, principalmente devido à expansão do processo de globalização.", "B": "a fome é um fenômeno que, desde o início do século XXI, tem-se limitado aos países superpopulosos da Ásia.", "C": "a sensível redução da fome está relacionada ao aumento da produção de alimentos, principalmente dos transgênicos.", "D": "a fome voltou a crescer entre 2010 e 2016, devido a fatores tais como os conflitos em vários países, principalmente nos pobres."}, {"num": 48, "mat": "Ciências Humanas", "enunciado": "[Gráfico de linha: Taxas de natalidade e mortalidade no Brasil por mil habitantes — de 1950 a 2010. Natalidade cai de ~44 para ~17, mortalidade cai de ~20 para ~7]\n\nAssinale a alternativa que interpreta corretamente o gráfico.", "A": "As taxas de natalidade e de mortalidade apresentaram quedas com mesma intensidade.", "B": "A taxa de mortalidade apresentou redução mais acentuada que a taxa de natalidade.", "C": "A queda da taxa de natalidade é o principal fator de redução do crescimento vegetativo.", "D": "O declínio da taxa de mortalidade tem pequena interferência sobre o crescimento vegetativo."}, {"num": 49, "mat": "Ciências Humanas", "enunciado": "O rápido crescimento industrial da Alemanha após a formação do Estado nacional alemão, em 1871, ameaçava a supremacia econômica mundial da Grã-Bretanha e criava uma intensa disputa imperialista entre as nações. A França nutria um sentimento de revanche por ter perdido as regiões da Alsácia-Lorena para a Alemanha, na Guerra Franco-Prussiana, em 1870.\n\nEssas tensões", "A": "desencadearam as lutas de libertação das colônias europeias na África e Ásia.", "B": "culminaram no rompimento do equilíbrio europeu com a Primeira Guerra Mundial.", "C": "provocaram a ascensão do nazismo em resposta à crise da economia alemã.", "D": "reforçaram a rivalidade entre franceses e ingleses na Segunda Guerra Mundial."}, {"num": 50, "mat": "Ciências Humanas", "enunciado": "Em novembro de 1937, Getúlio Vargas outorgou uma Constituição e implantou no Brasil o chamado 'Estado Novo'. Em uma cerimônia cívica, o presidente participou da queima das bandeiras estaduais e do hasteamento da bandeira nacional. Esta foi uma das inúmeras imagens divulgadas até 1945, quando Getúlio Vargas foi deposto.\n[Imagem: bandeira do Brasil com rosto de Getúlio Vargas]\n\nÉ correto afirmar que a cerimônia e a imagem reforçavam", "A": "o caráter popular do governo, com a ideia de que o presidente protegia os mais pobres.", "B": "a autonomia dos estados brasileiros, de acordo com o federalismo que ainda vigorava.", "C": "a autoridade central, personificada na figura do próprio presidente que unificava o país.", "D": "o poder dos coronéis, por meio do 'voto de cabresto' que a nova Constituição manteve."}];

let modo='feedback',resp={},qat=0;
function selModo(m,b){modo=m;document.querySelectorAll('.mb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');}
function iniciar(){resp={};qat=0;document.getElementById('t-intro').classList.remove('ativa');document.getElementById('hdr').style.display='block';document.getElementById('bbar').style.display='block';aba('quiz');renderQ();renderNav();renderGab();}
function aba(t){['quiz','gab','res'].forEach(x=>{document.getElementById('t-'+x).classList.remove('ativa');document.getElementById('tab-'+x).classList.remove('at');});document.getElementById('t-'+t).classList.add('ativa');document.getElementById('tab-'+t).classList.add('at');window.scrollTo({top:0,behavior:'smooth'});if(t==='res')renderRes();if(t==='gab')renderGab();}
function matName(n){if(n<=10)return'Língua Portuguesa';if(n<=15)return'Literatura';if(n<=20)return'História';if(n<=25)return'Geografia';if(n<=30)return'Ciências/Biologia';if(n<=40)return'Matemática';if(n<=45)return'Física/Química';return'Ciências Humanas';}
function renderQ(){
  const q=QS[qat];if(!q)return;
  document.getElementById('pf').style.width=(((qat+1)/QS.length)*100).toFixed(0)+'%';
  document.getElementById('hs').textContent='Questão '+(qat+1)+' de '+QS.length;
  const corr=GAB[String(q.num)],ru=resp[q.num],res=ru!==undefined,fb=modo==='feedback';
  const cropImg=QIMGS[String(q.num)];
  let imgsHtml='';
  if(cropImg){imgsHtml='<div class="pimg"><img src="data:image/jpeg;base64,'+cropImg+'" style="width:100%;display:block;border-radius:8px" loading="lazy"></div>';}
  }
  const alts=['A','B','C','D'].map(l=>{let cls='alt';if(res&&fb){if(l===corr)cls+=' ok';else if(l===ru)cls+=' er';}else if(res&&l===ru)cls+=' sel';return`<button class="${cls}" ${res?'disabled':''} onclick="answer(${q.num},'${l}')"><span class="altl">${l}</span><span class="altt">${q[l]}</span></button>`;}).join('');
  let fbHtml='';if(res&&fb){const ok=ru===corr;fbHtml=`<div class="fb ${ok?'ok':'er'}">${ok?'✅ Resposta correta!':'❌ Gabarito: <strong>'+corr+'</strong>'}</div>`;}
  document.getElementById('qcon').innerHTML=`${imgsHtml}<div class="qcard"><div class="qhdr"><span class="qbadge">Q${String(q.num).padStart(2,'0')}</span><span class="qmat">${q.mat||matName(q.num)}</span></div><div class="qbody"><div class="qen">${q.enunciado}</div><div class="alts">${alts}</div>${fbHtml}<div class="qac" style="display:${res?'flex':'none'}"><button class="bant" onclick="goQ(${qat-1})" ${qat===0?'disabled':''}>← Anterior</button><button class="bprx" onclick="next()">${qat<QS.length-1?'Próxima →':'🏆 Resultado'}</button></div></div></div>`;
  const dot=document.getElementById('nd-'+qat);if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function renderNav(){document.getElementById('nav').innerHTML=QS.map((q,i)=>{const r=resp[q.num];let cls='nd';if(i===qat)cls+=' at';else if(r!==undefined)cls+=r===GAB[String(q.num)]?' ok':' er';return`<button class="${cls}" id="nd-${i}" onclick="goQ(${i})">${q.num}</button>`;}).join('');}
function renderGab(){let ce=0,er=0;document.getElementById('gbgrid').innerHTML=QS.map((q,i)=>{const r=resp[q.num],c=GAB[String(q.num)];let cls='gi';if(r!==undefined){if(r===c){cls+=' ok';ce++;}else{cls+=' er';er++;}}return`<div class="${cls}" onclick="goQ(${i});aba('quiz')"><span class="giq">${String(q.num).padStart(2,'0')}</span><span class="gil">${c}</span></div>`;}).join('');document.getElementById('gbpl').textContent=ce+' ✅  '+er+' ❌';}
function renderRes(){let ce=0,er=0,nr=0;QS.forEach(q=>{const r=resp[q.num];if(r===undefined)nr++;else if(r===GAB[String(q.num)])ce++;else er++;});const tot=QS.length,pct=Math.round(ce/tot*100);document.getElementById('rsc').textContent=ce;document.getElementById('rpt').textContent='de '+tot+' questões';document.getElementById('rce').textContent=ce;document.getElementById('rer').textContent=er;document.getElementById('rnr').textContent=nr;document.getElementById('rpct').textContent=pct+'%';const msgs=['🔥 Não desista! Pratique mais com outras provas.','📖 Continue estudando! Revise as questões erradas.','💪 Bom resultado! Continue praticando!','🎉 Excelente! Você está muito bem preparado!'];document.getElementById('rmsg').textContent=msgs[pct>=80?3:pct>=60?2:pct>=40?1:0];}
function answer(num,l){if(resp[num]!==undefined)return;resp[num]=l;renderQ();renderNav();renderGab();}
function goQ(i){if(i<0||i>=QS.length)return;qat=i;renderQ();renderNav();window.scrollTo({top:0,behavior:'smooth'});}
function next(){if(qat<QS.length-1)goQ(qat+1);else aba('res');}
function refazer(){resp={};qat=0;aba('quiz');renderQ();renderNav();renderGab();}
function voltarIntro(){document.getElementById('bbar').style.display='none';document.getElementById('hdr').style.display='none';['quiz','gab','res'].forEach(x=>document.getElementById('t-'+x).classList.remove('ativa'));document.getElementById('t-intro').classList.add('ativa');resp={};qat=0;}
</script>
</body>
