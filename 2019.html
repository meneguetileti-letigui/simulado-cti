<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CTI 2019 – Vestibulinho</title>
<style>
:root{--az:#1a3a6b;--az2:#2563eb;--az3:#eff6ff;--ve:#16a34a;--ve2:#dcfce7;--vm:#dc2626;--vm2:#fee2e2;--bg:#f1f5f9;--cd:#fff;--bd:#e2e8f0;--tx:#1e293b;--t2:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
#hdr{background:var(--az);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hb{background:#fff;color:var(--az);font-weight:800;font-size:14px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:14px;font-weight:700}.hs{font-size:11px;color:#93c5fd}
.prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.pf{height:100%;background:#60a5fa;border-radius:2px;transition:width .4s}
.nav{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;background:var(--cd);border-bottom:1px solid var(--bd);scrollbar-width:none;position:sticky;top:62px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nd{min-width:28px;height:28px;border-radius:7px;border:2px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;font-family:monospace;transition:all .15s}
.nd.at{border-color:var(--az2);background:var(--az2);color:#fff}
.nd.ok{border-color:var(--ve);background:var(--ve2);color:var(--ve)}
.nd.er{border-color:var(--vm);background:var(--vm2);color:var(--vm)}
.tela{display:none}.ativa{display:block}
#t-intro{padding:20px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:20px;padding:24px 20px;margin-bottom:20px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;color:#bfdbfe;line-height:1.5}
.hstats{display:flex;gap:10px;margin-top:12px}
.hst{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hst-n{font-size:18px;font-weight:800}.hst-l{font-size:10px;color:#93c5fd}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mgrid{display:grid;gap:9px;margin-bottom:20px}
.mb{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.mb.sel{border-color:var(--az2);background:var(--az3)}
.mi{font-size:22px;flex-shrink:0}.mn{font-size:14px;font-weight:700}.md{font-size:11px;color:var(--t2)}
.btn-in{width:100%;padding:14px;border:none;border-radius:14px;background:var(--az2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);font-family:inherit}
.btn-in:active{transform:scale(.97)}
.idx-link{display:block;text-align:center;padding:10px;color:var(--t2);font-size:12px;text-decoration:none;margin-top:8px}
#t-quiz{padding-bottom:90px}
.qwrap{max-width:600px;margin:0 auto;padding:14px 14px 0}
.pimg{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pimg-lbl{background:var(--az);color:#fff;font-size:11px;font-weight:700;padding:6px 12px}
.qcard{background:var(--cd);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;animation:fu .2s ease;margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qhdr{background:var(--az);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.qbadge{background:rgba(255,255,255,.18);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;font-family:monospace}
.qmat{font-size:11px;color:#93c5fd}
.qbody{padding:14px}
.qen{font-size:13.5px;line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.alts{display:flex;flex-direction:column;gap:7px}
.alt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s;text-align:left;width:100%;-webkit-user-select:none}
.alt:active{transform:scale(.98)}
.altl{min-width:26px;height:26px;border-radius:7px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;transition:all .15s}
.altt{font-size:13px;line-height:1.5;padding-top:3px}
.alt.sel{border-color:var(--az2);background:var(--az3)}.alt.sel .altl{background:var(--az2);color:#fff}
.alt.ok{border-color:var(--ve);background:var(--ve2)}.alt.ok .altl{background:var(--ve);color:#fff}
.alt.er{border-color:var(--vm);background:var(--vm2)}.alt.er .altl{background:var(--vm);color:#fff}
.alt:disabled{cursor:default}
.fb{margin:10px 0 0;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px}
.fb.ok{background:var(--ve2);color:var(--ve);display:flex}
.fb.er{background:var(--vm2);color:var(--vm);display:flex}
.qac{padding:10px 0 4px;display:flex;gap:8px}
.bant,.bprx{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.bant:active,.bprx:active{transform:scale(.97)}
.bant{background:var(--bg);border:2px solid var(--bd);color:var(--tx)}
.bprx{background:var(--az2);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3)}
#t-gab{padding:14px 14px 90px;max-width:600px;margin:0 auto}
.gbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbpl{font-size:13px;font-weight:700;color:var(--az)}
.gbgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--cd);border-radius:16px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gi{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:9px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s}
.gi.ok{border-color:var(--ve);background:var(--ve2)}.gi.er{border-color:var(--vm);background:var(--vm2)}
.giq{font-size:10px;font-weight:700;color:var(--t2);font-family:monospace}
.gil{font-size:15px;font-weight:800;color:var(--az);font-family:monospace}
.gi.ok .giq,.gi.ok .gil{color:var(--ve)}.gi.er .giq,.gi.er .gil{color:var(--vm)}
#t-res{padding:14px 14px 90px;max-width:480px;margin:0 auto}
.rhero{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
.rsc{font-size:52px;font-weight:800;line-height:1}.rde{font-size:14px;color:#93c5fd;margin-bottom:4px}
.rpt{font-size:22px;font-weight:700;color:#60a5fa}.rmsg{font-size:13px;color:#bfdbfe;margin-top:8px;line-height:1.4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--cd);border-radius:13px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stn{font-size:26px;font-weight:800}.stl{font-size:11px;color:var(--t2);font-weight:600}
.cv{color:var(--ve)}.cm{color:var(--vm)}.ca{color:#d97706}.caz{color:var(--az)}
.bref{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;transition:all .15s}
.bref:active{transform:scale(.97)}
.bref.p{background:var(--az2);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bref.s{background:var(--bg);color:var(--az);border:2px solid var(--az2)}
#bbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-top:1px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 10px rgba(0,0,0,.07);z-index:100}
.bbi{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0;font-size:10px;font-weight:600;color:var(--t2);font-family:inherit}
.tab.at{color:var(--az2)}.tabi{font-size:19px}
</style>
</head>
<body>
<div id="hdr" style="display:none">
  <div class="hr"><div class="hb">CTI</div><div><div class="ht">Vestibulinho 2019</div><div class="hs" id="hs">Prova 2019</div></div></div>

</div>

</div>
<div id="t-gab" class="tela">

</div>

  </div>
  <button class="bref p" onclick="refazer()">🔄 Refazer esta prova</button>
  <button class="bref s" onclick="voltarIntro()">🏠 Menu inicial</button>
</div>
<div id="bbar"><div class="bbi">

</div></div>
<script>
const QS=[{"num": 1, "mat": "Língua Portuguesa", "enunciado": "Texto 'Vai um café grátis, em troca dos seus dados pessoais?' (revistagalileu.globo.com): a rede Shiru Cafe oferece café grátis para universitários em troca de dados pessoais para empresas patrocinadoras.\n\nUma frase condizente com as informações do texto e escrita em conformidade com a norma-padrão da língua portuguesa é:", "A": "A Shiru Cafe especializou-se em servir cafés, chás, sucos e wi-fi sem custo aos clientes recém-contratados pelas empresas com as quais a rede tem parceria.", "B": "Os frequentadores do Shiru Cafe recebem bebidas gratuítas no momento em que seus dados pessoais são divulgados pelo estabelecimento.", "C": "A Shiru Cafe coleta dados pessoais de alunos de algumas universidades, em troca de bebidas de graça, para fornecer esses dados a empresas patrocinadoras da rede.", "D": "Os estudantes e professores universitários que tomam bebida grátis e acessam a rede wi-fi no Shiru Cafe têm seus dados pessoais divulgados a terceiros."}, {"num": 2, "mat": "Língua Portuguesa", "enunciado": "No último parágrafo do texto, expõem-se", "A": "opiniões que divergem entre si sobre o que foi dito da rede Shiru Cafe.", "B": "comentários sem relação com o que se informou sobre a rede Shiru Cafe.", "C": "pontos de vista concordantes acerca de aspectos positivos da rede Shiru Cafe.", "D": "ideias que se anulam mutuamente ao criticar a iniciativa da rede Shiru Cafe."}, {"num": 3, "mat": "Língua Portuguesa", "enunciado": "Um sinônimo para a palavra indiscriminado (5º parágrafo) é:", "A": "idealista.", "B": "irregular.", "C": "inevitável.", "D": "infalível."}, {"num": 4, "mat": "Língua Portuguesa", "enunciado": "Considerando o contexto, o vocábulo aqueles, no quinto parágrafo – 'Finalmente, há aqueles que...' –, refere-se a", "A": "estudantes da Universidade Brown.", "B": "clientes das 28 lojas da Shiru Cafe.", "C": "funcionários da Shiru Cafe e entusiastas dessa novidade.", "D": "frequentadores das diferentes universidades em que a Shiru Cafe atua."}, {"num": 5, "mat": "Língua Portuguesa", "enunciado": "O vocábulo que introduz o agente da ação está destacado em:", "A": "... o sonho virou realidade com a rede Shiru Café... (1º parágrafo)", "B": "... os estudantes devem concordar em compartilhar seus dados pessoais... (2º parágrafo)", "C": "... o objetivo todo é conectar os estudantes a possíveis empregadores. (4º parágrafo)", "D": "... dados pessoais estão sendo coletados a todo instante por diferentes companhias... (5º parágrafo)"}, {"num": 6, "mat": "Língua Portuguesa", "enunciado": "Uma construção própria de uma variante popular da língua portuguesa encontra sua reescrita conforme a norma-padrão em:", "A": "... o sonho virou realidade com a rede Shiru Cafe. / ... o sonho transformou-se a realidade com a rede Shiru Cafe.", "B": "... o tamanho de empresa que estaria interessado em trabalhar. / ... o tamanho de empresa em que estaria interessado em trabalhar.", "C": "... pessoas não filiadas a uma escola não são bem-vindas no Shiru... / ... pessoas não filiadas a uma escola não são benquista no Shiru...", "D": "... gerou algumas controvérsias entre os estudantes. / ... gerou algumas controvérsias de entre os estudantes."}, {"num": 7, "mat": "Língua Portuguesa", "enunciado": "A concordância está em conformidade com a norma-padrão em:", "A": "A oferta de bebidas gratuitas atraem vários estudantes para o Shiru Cafe.", "B": "Tomar bebidas sem precisar pagar por elas interessam a muitos estudantes.", "C": "O aluno que quiser receber a bebida de graça respondem a algumas perguntas.", "D": "Os frequentadores do Shiru Cafe dispõem de wi-fi de graça dentro da loja."}, {"num": 8, "mat": "Língua Portuguesa", "enunciado": "[Cartaz: 'Começou a 2ª Temporada de Vacinação Contra o HPV — Meninas de 9 a 14 anos | Meninos de 11 a 14 anos']\n(portalarquivos2.saude.gov.br)\n\nPredomina no cartaz as seguintes funções da linguagem:", "A": "metalinguística e fática.", "B": "emotiva e apelativa.", "C": "referencial e fática.", "D": "referencial e apelativa."}, {"num": 9, "mat": "Língua Portuguesa", "enunciado": "Leia o poema 'Só para si', de Mario Quintana:\nDona Cômoda tem três gavetas. E um ar confortável de senhora rica. Nas gavetas guarda coisas de outros tempos, só para si. Foi sempre assim, dona Cômoda: gorda, fechada, egoísta.\n\nNesse texto, a descrição de uma cômoda é feita por meio do uso", "A": "da antítese.", "B": "da personificação.", "C": "do pleonasmo.", "D": "do eufemismo."}, {"num": 10, "mat": "Língua Portuguesa", "enunciado": "Considere as orações:\n1. Nas gavetas guarda coisas de outros tempos, só para si.\n2. Foi sempre assim, dona Cômoda: gorda, fechada, egoísta.\n\nAssinale a alternativa correta:", "A": "Em 1, o sujeito é indeterminado e o predicado é verbal; em 2, o sujeito é oculto e o predicado é verbo-nominal.", "B": "Em 1, o sujeito é oculto e o predicado é verbal; em 2, o sujeito é simples e o predicado é nominal.", "C": "Em 1, o sujeito é indeterminado e o predicado é verbo-nominal; em 2, o sujeito é simples e o predicado é nominal.", "D": "Em 1, o sujeito é oculto e o predicado é verbal; em 2, o sujeito é indeterminado e o predicado é nominal."}, {"num": 11, "mat": "Língua Portuguesa", "enunciado": "[Cartum: Pessoa em livraria. Balão 'Este livro deve ser muito bom'. Outro balão: 'Por favor, me vê 5!']\n(Adão Iturrusgarai. A vida como ela é. www.folha.uol.com.br, 23.01.2018)\n\nO cartum apresenta uma", "A": "sátira bem-humorada do comportamento consumista.", "B": "crítica indignada contra os estudos acerca dos hábitos consumistas.", "C": "reflexão melancólica sobre a origem do consumismo.", "D": "explicação do impacto do consumismo sobre a desigualdade."}, {"num": 12, "mat": "Língua Portuguesa", "enunciado": "Leia o poema 'Ou isto ou aquilo', de Cecília Meireles:\nOu se tem chuva e não se tem sol / ou se tem sol e não se tem chuva! / Ou se calça a luva e não se põe o anel, / ou se põe o anel e não se calça a luva! / Quem sobe nos ares não fica no chão, / quem fica no chão não sobe nos ares. / É uma grande pena que não se possa / estar ao mesmo tempo em dois lugares! / Ou guardo o dinheiro e não compro o doce, / ou compro o doce e gasto o dinheiro. / Ou isto ou aquilo: ou isto ou aquilo... / e vivo escolhendo o dia inteiro! / Não sei se brinco, não sei se estudo, / se saio correndo ou fico tranquilo. / Mas não consegui entender ainda / qual é o melhor: se é isto ou aquilo.\n\nO conteúdo do poema está resumido em", "A": "Ou se tem chuva e não se tem sol / ou se tem sol e não se tem chuva!", "B": "Quem sobe nos ares não fica no chão, / quem fica no chão não sobe nos ares.", "C": "Ou isto ou aquilo: ou isto ou aquilo... / e vivo escolhendo o dia inteiro!", "D": "Não sei se brinco, não sei se estudo, / se saio correndo ou fico tranquilo."}, {"num": 13, "mat": "Língua Portuguesa", "enunciado": "O vocábulo 'ou' estabelece, no poema, relação de", "A": "adição.", "B": "causa.", "C": "exclusão.", "D": "proporção."}, {"num": 14, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que todos os verbos estão empregados em conformidade com a norma-padrão da língua.", "A": "Muitas situações nos mantém indecisos, porque tendemos a querer tudo de uma só vez.", "B": "Não seria ótimo se nós podéssemos estar em mais de um lugar ao mesmo tempo?", "C": "Se dizermos que é fácil decidir entre economizar ou gastar talvez estejamos enganados.", "D": "É improvável que fiquemos plenamente satisfeitos ao escolher só uma diversão entre tantas."}, {"num": 15, "mat": "Língua Portuguesa", "enunciado": "O sinal indicativo de crase está empregado corretamente em", "A": "Prefiro brincar à estudar, embora estudar também possa ser divertido.", "B": "Ele chegou à conclusão de que era melhor buscar um segundo parecer.", "C": "Nem sempre é simples chegar à uma decisão que todos aprovem.", "D": "É sempre bom pedir conselho à alguma pessoa mais experiente."}, {"num": 16, "mat": "Matemática", "enunciado": "[Figura: Fita com quadrados coloridos em sequência: vermelho, azul, verde, amarelo, vermelho... Cada quadrado tem 3 cm de lado. Total: 3,69 m]\n\nSabendo que o quadrado inicial é vermelho e cada quadrado tem 3 cm de lado, o número de quadrados verdes nessa fita é", "A": "29.", "B": "30.", "C": "31.", "D": "32."}, {"num": 17, "mat": "Matemática", "enunciado": "Na divisão de um número natural n por x, obtém-se quociente 7 e resto 3. Na divisão desse mesmo número natural n por 10, obtém-se quociente 5 e resto y. Se y = x + 1, então o valor de n é", "A": "45.", "B": "48.", "C": "53.", "D": "59."}, {"num": 18, "mat": "Matemática", "enunciado": "André comprou uma casa por um determinado valor. Como entrada, ele deu R$ 60 mil em dinheiro e mais um terreno, cujo valor representou 1/5 do valor da casa. Sabendo-se que o valor total da entrada foi igual a 1/3 do valor da compra, é correto afirmar que o valor da compra da casa foi de", "A": "R$ 300 mil", "B": "R$ 375 mil.", "C": "R$ 425 mil.", "D": "R$ 450 mil."}, {"num": 19, "mat": "Matemática", "enunciado": "Em uma empresa, 10 máquinas iguais, trabalhando de forma simultânea e ininterrupta, produziram um lote de certa peça em 8 dias. Para a produção de um segundo lote idêntico, foi possível utilizar somente 4 das mesmas máquinas, trabalhando de forma simultânea e ininterrupta. O segundo lote foi concluído em", "A": "20 dias.", "B": "18 dias.", "C": "16 dias.", "D": "14 dias."}, {"num": 20, "mat": "Matemática", "enunciado": "Em uma negociação para a venda de grande quantidade de certo produto, a empresa ofereceu dois descontos sucessivos de 20% e 30% sobre o preço unitário P. Os dois descontos dados a esse cliente equivalem a um desconto único, dado sobre P, de", "A": "40%.", "B": "44%", "C": "50%.", "D": "56%."}, {"num": 21, "mat": "Matemática", "enunciado": "[Tabela: Consumidor A comprou 4 unidades de X e 2 de Y pagando R$ 90,00; consumidor B comprou 7 de X e 2 de Y; consumidor C comprou 9 de X e 2 de Y pagando R$ 155,00]\n\nDe acordo com as informações dadas, o valor total que o consumidor B pagou nessa compra foi", "A": "R$ 118,00.", "B": "R$ 122,00.", "C": "R$ 129,00.", "D": "R$ 135,00."}, {"num": 22, "mat": "Matemática", "enunciado": "Um certo capital, cujo valor em reais é representado por x, foi aplicado durante 16 meses e o montante recebido pelo investidor ao final da aplicação foi igual a 1,18x. A taxa anual de juros simples dessa aplicação foi de", "A": "12%", "B": "13,5%.", "C": "15%.", "D": "16,5%."}, {"num": 23, "mat": "Matemática", "enunciado": "No depósito de uma livraria há pacotes P, com 8 unidades de certo livro em cada um, e pacotes Q, com 5 unidades desse mesmo livro em cada um, num total de 70 pacotes e 470 livros. A quantidade de livros contida em todos os pacotes P é igual a", "A": "150.", "B": "200.", "C": "240.", "D": "320."}, {"num": 24, "mat": "Matemática", "enunciado": "Um projeto para uma residência determina que a área construída deverá ocupar 3/5 da área total do terreno, que tem formato de um quadrilátero regular. Da área restante, 1/4 será ocupado por uma piscina, e ainda sobrarão 120 m² para outros fins. A medida do lado desse terreno é", "A": "20 m.", "B": "22 m.", "C": "24 m.", "D": "26 m."}, {"num": 25, "mat": "Matemática", "enunciado": "[Figura: Espelho quadrado de área 6400 cm² contornado por moldura de largura constante x. Perímetro do conjunto L = 440 cm]\n\nA medida da largura da moldura é igual a", "A": "15 cm.", "B": "12 cm.", "C": "10 cm.", "D": "8 cm."}, {"num": 26, "mat": "Matemática", "enunciado": "[Figura: Trapézio retângulo ABCD com AE bissetriz do ângulo agudo DAB. Ângulo DAE = ângulo EAB = 3x, ângulo AEB = x, ângulo α = AÊB]\n\nA medida do ângulo AÊB, indicado por α na figura, é", "A": "68°.", "B": "64°.", "C": "54°.", "D": "48°."}, {"num": 27, "mat": "Matemática", "enunciado": "[Figura: Retângulo ABCD (80m × 60m) formado por seis retângulos congruentes. Linha vermelha do ponto A até o ponto C pelo caminho interno]\n\nPara fazer o percurso indicado na figura, Tiago percorreu um total de", "A": "280 m.", "B": "290 m.", "C": "300 m.", "D": "320 m."}, {"num": 28, "mat": "Matemática", "enunciado": "Após simplificada corretamente, a fração algébrica (3x²–3y²)/(3x²–6xy+3y²), sendo x≠0 e y≠0, será representada, na sua forma mais simples, por", "A": "x/(x–y)", "B": "(x+y)/(x–y)", "C": "(x–y)/(x+y)", "D": "x+y"}, {"num": 29, "mat": "Matemática", "enunciado": "Mariana sabe que (2x+y)² – 6xy – (x–y)² = 300. A partir desse conhecimento, concluiu que o valor positivo de x é", "A": "8.", "B": "10.", "C": "12.", "D": "15."}, {"num": 30, "mat": "Matemática", "enunciado": "[Figura: Folha retangular com região pintada em azul. A folha tem dimensões a×a e a×b, a região azul está no centro]\n\nA área da região pintada em azul é corretamente representada pelo polinômio", "A": "a(a–b)", "B": "(a–b)", "C": "a²–b²", "D": "a²+b²"}, {"num": 31, "mat": "Ciências Naturais", "enunciado": "[Figura: Gráfico radar de resistência de 3 bactérias a 8 tipos de antibióticos (escala 1 a 6)]\n\nDe acordo com essa classificação, é correto afirmar que a bactéria", "A": "B é a mais resistente à Ampicilina.", "B": "C é a menos resistente à Tetraciclina.", "C": "A é a menos resistente à Piperaciclina.", "D": "B é a mais resistente à Cefoperazona."}, {"num": 32, "mat": "Ciências Naturais", "enunciado": "Em 2017, aproximadamente 6634 km² de floresta foram desmatados no Brasil, reduzindo a capacidade de sequestro de carbono realizado por ela. O desmatamento da floresta compromete o mecanismo de regulação", "A": "do efeito estufa, provocado pelo acúmulo de carbono na atmosfera, uma vez que a floresta é capaz de fixar carbono.", "B": "da camada de ozônio, pois seu desmatamento promove a liberação na atmosfera de dióxido de carbono.", "C": "da eutrofização das águas, decorrente da dissolução nos rios do excesso de dióxido de carbono.", "D": "dos resíduos sólidos, decorrentes da liberação do dióxido de carbono devido aos desmatamentos por queimadas."}, {"num": 33, "mat": "Ciências Naturais", "enunciado": "O cigarro, as bebidas alcoólicas e os remédios para reduzir o apetite e a ansiedade são drogas classificadas como lícitas, isto é, as leis não proíbem seu uso pelos adultos. Já a cocaína, a maconha e o crack são drogas ilícitas. As drogas lícitas", "A": "podem causar danos ao organismo e dependência do seu uso pelas pessoas.", "B": "podem ser usadas pelas pessoas sem nenhum prejuízo para seus organismos.", "C": "são aquelas vendidas exclusivamente em farmácias e com receitas médicas.", "D": "são substâncias que não alteram o comportamento do indivíduo."}, {"num": 34, "mat": "Ciências Naturais", "enunciado": "A mecanização da colheita de cana-de-açúcar diminui a emissão de gases de efeito estufa na atmosfera devido à", "A": "maior permanência da planta no solo, fazendo com que ela fixe mais carbono em seu caule.", "B": "dispensa da realização de queimadas em diversas situações, reduzindo os gases de efeito estufa e material particulado.", "C": "substituição dos combustíveis fósseis por biocombustíveis das máquinas que trabalham na colheita.", "D": "capacidade do maquinário evitar processos erosivos que aumentam a produção de material particulado."}, {"num": 35, "mat": "Ciências Naturais", "enunciado": "Os métodos contraceptivos humanos como a pílula anticoncepcional, a vasectomia e o dispositivo intrauterino não medicado (DIU) impedem, respectivamente,", "A": "a ovulação, o encontro do espermatozoide com o óvulo e a implantação do zigoto no útero.", "B": "o encontro do espermatozoide com o óvulo, a fixação do zigoto no útero e a ovulação.", "C": "a fixação do óvulo no útero, a produção de espermatozoide e a produção de óvulos.", "D": "o encontro do espermatozoide com o óvulo, a produção de sêmen e a fixação do óvulo no útero."}, {"num": 36, "mat": "Ciências Naturais", "enunciado": "[Gráfico: variação de DBO e oxigênio dissolvido em curso d'água após lançamento pontual de matéria orgânica — zonas de águas limpas, degradação, decomposição ativa, recuperação e águas limpas]\n\nSabendo que DBO é a Demanda Bioquímica de Oxigênio e corresponde à quantidade de gás oxigênio necessária para a decomposição da matéria orgânica, após o lançamento ocorre", "A": "uma manutenção da quantidade de matéria orgânica lançada no curso d'água ao longo do tempo.", "B": "uma diminuição das bactérias aeróbicas que decompõem a matéria orgânica, consumindo o gás oxigênio.", "C": "uma diminuição na demanda de gás oxigênio dissolvido para decompor a matéria orgânica.", "D": "um aumento pela demanda de gás oxigênio dissolvido para decompor a matéria orgânica."}, {"num": 37, "mat": "Ciências Naturais", "enunciado": "[Figura: Evolução no tamanho dos aerogeradores utilizados na geração de energia elétrica — de 15m de diâmetro em 1985 até 126m em 2010]\n\nEmbora a energia eólica seja considerada uma das mais limpas, a instalação de parques eólicos provoca impactos ambientais", "A": "atmosféricos na geração de gases do efeito estufa.", "B": "na camada de ozônio devido à diminuição da velocidade dos ventos.", "C": "visuais e sonoros devido às dimensões e ao ruído das turbinas.", "D": "no solo e nas aves devido às dimensões das hélices das turbinas."}, {"num": 38, "mat": "Ciências Naturais", "enunciado": "Um dos principais problemas relacionados à agricultura convencional refere-se à perda de solos agricultáveis devido à erosão laminar, que corresponde à remoção das camadas superficiais do solo, empobrecendo-o gradualmente.\n\nEsse problema pode ser mitigado por meio", "A": "da execução de curvas de nível e controle do escoamento superficial promovido pelas chuvas.", "B": "do aumento da concentração de compostos, como nitrogênio, fósforo e potássio pela adubação direta.", "C": "da construção de barreiras físicas como cercas vivas, evitando a erosão eólica e a erosão pluvial.", "D": "da rotação de culturas, permitindo que em épocas de chuvas o solo fique exposto."}, {"num": 39, "mat": "Ciências Naturais", "enunciado": "[Foto: Balão cheio de água no instante em que é perfurado — o fluido permanece por um instante no formato do balão]\n\nÉ possível notar que o fluido permanece pelo menos por um instante, no mesmo formato do balão. Esse fato pode ser justificado por meio do", "A": "princípio termodinâmico.", "B": "princípio da inércia.", "C": "atrito do balão com a água.", "D": "princípio da ação e reação."}, {"num": 40, "mat": "Ciências Naturais", "enunciado": "[Figura: Torre de destilação fracionada do petróleo — de baixo para cima: resíduo/alcatrão, fuel, óleos lubrificantes, diesel, querosene, gasolina, nafta, gases]\n\nO fluxo ascendente na torre de destilação indica", "A": "o aumento do peso específico dos elementos.", "B": "a diminuição da temperatura do ponto de fusão.", "C": "temperaturas decrescentes do ponto de ebulição.", "D": "temperaturas crescentes do ponto de ebulição."}, {"num": 41, "mat": "Ciências Naturais", "enunciado": "No Brasil, a Política Nacional de Resíduos Sólidos busca diminuir a geração de resíduos, adotando princípios de redução, reutilização e reciclagem. Porém, por questões técnicas, nem todos os materiais podem passar pelo processo de reciclagem.\n\nDesse modo, os materiais que não são recicláveis correspondem a", "A": "garrafas de vidro, folhas de caderno e pilhas.", "B": "papel carbono, latas de alumínio e madeira.", "C": "pneus, caixas de papelão e espelhos de vidro.", "D": "remédios, espelhos de vidro e guardanapos usados."}, {"num": 42, "mat": "Ciências Naturais", "enunciado": "[Figura: Copo com 1 litro de água (15,00 cm de nível — situação A) e com uma estrela maciça de prata dentro (18,00 cm de nível — situação B)]\n\nA massa de um centímetro cúbico de prata é 10,5 g. A massa dessa estrela é", "A": "1 050 g.", "B": "1 500 g.", "C": "1 800 g.", "D": "2 100 g."}, {"num": 43, "mat": "Ciências Naturais", "enunciado": "[Gráfico: altura h (cm) de partícula de sujeira na água em função do tempo t (s), de 135 cm em t=0 até 0 cm em t=119s]\n\nA velocidade média de sedimentação, em módulo, dessa partícula em milímetros por segundo entre os instantes 42 e 112 segundos é de", "A": "9,37.", "B": "10,71.", "C": "11,34.", "D": "15,00."}, {"num": 44, "mat": "Ciências Naturais", "enunciado": "[Figura: Bomba parafuso de Arquimedes — grande parafuso helicoide inclinado que gira movendo fluido para a extremidade oposta]\n\nA água ao passar pela bomba recebe energia", "A": "térmica do movimento de rotação do parafuso, o que aumenta sua energia potencial.", "B": "potencial do movimento do parafuso, o que permite aumentar sua energia cinética.", "C": "cinética do movimento de rotação do parafuso, o que permite aumentar sua energia potencial.", "D": "proveniente da pressão atmosférica do movimento, o que eleva sua energia potencial."}, {"num": 45, "mat": "Ciências Naturais", "enunciado": "O Programa Conjunto das Nações Unidas sobre HIV/AIDS (UNIAIDS) estima que existam em 2017 aproximadamente 36,9 milhões de pessoas infectadas com o vírus da imunodeficiência humana (HIV) em todo o planeta.\n\nEsse vírus ataca o sistema imunológico (principalmente os linfócitos T CD4+), responsável por defender o organismo de doenças. A respeito da AIDS, é correto afirmar que", "A": "para preveni-la, deve-se evitar compartilhar talheres e roupas íntimas com pessoas portadoras da doença.", "B": "pacientes com essa doença podem manifestar infecções secundárias em função da debilidade do sistema imunológico.", "C": "os coquetéis antiretrovirais ao destruir a parede celular dos vírus, diminuem a possibilidade de transmissão da doença.", "D": "o tempo entre a infecção, ou seja, contato com o vírus e a manifestação da doença, é igual entre os humanos."}, {"num": 46, "mat": "Ciências Humanas", "enunciado": "[Mapa: Tráfego Marítimo e as Trocas Mundiais — mostrando fluxos comerciais intensos entre EUA, União Europeia, China e Ásia, com trocas secundárias com América Latina, África e Oriente Médio]\n\nA leitura da imagem e os conhecimentos a respeito do contexto econômico mundial permitem afirmar que", "A": "com a mundialização da economia desapareceram as fronteiras e os protecionismos e as trocas comerciais se tornaram livres.", "B": "sob o aspecto geopolítico, o comércio mundial tem promovido a ascensão econômica das áreas periféricas.", "C": "o predomínio das atividades comerciais das grandes potências ressalta as diferenças econômicas observadas no mundo atual.", "D": "as desigualdades econômicas entre as regiões do mundo devem ser superadas pela valorização comercial das commodities."}, {"num": 47, "mat": "Ciências Humanas", "enunciado": "[Gráfico de barras duplas: Crescimento da população mundial (1950-2017) por continente. Ásia tem maior população em ambos os anos]\n\nA leitura do gráfico e os conhecimentos sobre a dinâmica demográfica mundial permitem afirmar que, entre 1950 e 2017,", "A": "as áreas mais urbanizadas do mundo apresentaram forte crescimento demográfico.", "B": "os continentes onde há forte emigração foram os que apresentaram pequeno crescimento demográfico.", "C": "as regiões menos populosas foram as que apresentaram maior crescimento demográfico.", "D": "os continentes com grande concentração de países subdesenvolvidos apresentaram maior crescimento demográfico."}, {"num": 48, "mat": "Ciências Humanas", "enunciado": "[Mapa: Brasil — Domínios Morfoclimáticos, com 4 regiões numeradas]\n\nAssinale a alternativa que identifica corretamente um dos domínios morfoclimáticos e as respectivas atividades econômicas predominantes.", "A": "1 – cerrado – considerado como área de forte expressão agrícola, abriga inúmeras agroindústrias muito produtivas.", "B": "2 – caatinga – em franca expansão das atividades industrias devido à extração mineral e à implantação de usinas eólicas.", "C": "3 – mares de morros – apresenta importantes atividades agropecuárias modernas que se destacam pelas técnicas conservacionistas.", "D": "4 – araucária – mantém-se preservado porque as atividades industriais instaladas utilizam matérias primas importadas de outros domínios."}, {"num": 49, "mat": "Ciências Humanas", "enunciado": "[Imagem: Gravura francesa do século XVIII mostrando nobres sobre trabalhadores. Art. 1º da Declaração dos Direitos do Homem: 'Os homens nascem e são livres e iguais em direitos.']\n\nÉ correto afirmar que", "A": "a imagem confirmava o artigo da declaração, que consagrava o princípio da igualdade diante da lei.", "B": "a filosofia iluminista criticava os ideais expressos no artigo da declaração e a situação mostrada na imagem.", "C": "o artigo da declaração opunha-se à imagem, que ilustrava os privilégios de nascimento na sociedade.", "D": "a imagem e o artigo da declaração baseavam-se no racionalismo e no socialismo dominantes na época."}, {"num": 50, "mat": "Ciências Humanas", "enunciado": "'Cinquenta anos em cinco' foi slogan de Juscelino Kubitschek desde o início da campanha eleitoral. Logo após tomar posse, o presidente reuniu o ministério para apresentar seu Plano de Metas. Com o incentivo governamental, entre 1956 e 1961, entraram no Brasil cerca de 2,18 bilhões de dólares e 95% dessa verba foi aplicada a iniciativas estabelecidas no Plano de Metas.\n\nConclui-se que esse processo de desenvolvimento econômico", "A": "contou com a participação do capital estrangeiro e consolidou o setor secundário.", "B": "dinamizou a agricultura de subsistência e diminuiu as diferenças entre as regiões do país.", "C": "priorizou as empresas nacionais e melhorou a distribuição de renda nas áreas rurais.", "D": "destinou os investimentos sobretudo à área social e ampliou o mercado consumidor."}];

let modo='feedback',resp={},qat=0;
function selModo(m,b){modo=m;document.querySelectorAll('.mb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');}
function iniciar(){resp={};qat=0;document.getElementById('t-intro').classList.remove('ativa');document.getElementById('hdr').style.display='block';document.getElementById('bbar').style.display='block';aba('quiz');renderQ();renderNav();renderGab();}
function aba(t){['quiz','gab','res'].forEach(x=>{document.getElementById('t-'+x).classList.remove('ativa');document.getElementById('tab-'+x).classList.remove('at');});document.getElementById('t-'+t).classList.add('ativa');document.getElementById('tab-'+t).classList.add('at');window.scrollTo({top:0,behavior:'smooth'});if(t==='res')renderRes();if(t==='gab')renderGab();}
function matName(n){if(n<=10)return'Língua Portuguesa';if(n<=15)return'Literatura';if(n<=20)return'História';if(n<=25)return'Geografia';if(n<=30)return'Ciências/Biologia';if(n<=40)return'Matemática';if(n<=45)return'Física/Química';return'Ciências Humanas';}
function renderQ(){
  const q=QS[qat];if(!q)return;
  document.getElementById('pf').style.width=(((qat+1)/QS.length)*100).toFixed(0)+'%';
  document.getElementById('hs').textContent='Questão '+(qat+1)+' de '+QS.length;
  const corr=GAB[String(q.num)],ru=resp[q.num],res=ru!==undefined,fb=modo==='feedback';
  const cropImg=QIMGS[String(q.num)];
  let imgsHtml='';
  if(cropImg){imgsHtml='<div class="pimg"><img src="data:image/jpeg;base64,'+cropImg+'" style="width:100%;display:block;border-radius:8px" loading="lazy"></div>';}
  }
  const alts=['A','B','C','D'].map(l=>{let cls='alt';if(res&&fb){if(l===corr)cls+=' ok';else if(l===ru)cls+=' er';}else if(res&&l===ru)cls+=' sel';return`<button class="${cls}" ${res?'disabled':''} onclick="answer(${q.num},'${l}')"><span class="altl">${l}</span><span class="altt">${q[l]}</span></button>`;}).join('');
  let fbHtml='';if(res&&fb){const ok=ru===corr;fbHtml=`<div class="fb ${ok?'ok':'er'}">${ok?'✅ Resposta correta!':'❌ Gabarito: <strong>'+corr+'</strong>'}</div>`;}
  document.getElementById('qcon').innerHTML=`${imgsHtml}<div class="qcard"><div class="qhdr"><span class="qbadge">Q${String(q.num).padStart(2,'0')}</span><span class="qmat">${q.mat||matName(q.num)}</span></div><div class="qbody"><div class="qen">${q.enunciado}</div><div class="alts">${alts}</div>${fbHtml}<div class="qac" style="display:${res?'flex':'none'}"><button class="bant" onclick="goQ(${qat-1})" ${qat===0?'disabled':''}>← Anterior</button><button class="bprx" onclick="next()">${qat<QS.length-1?'Próxima →':'🏆 Resultado'}</button></div></div></div>`;
  const dot=document.getElementById('nd-'+qat);if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function renderNav(){document.getElementById('nav').innerHTML=QS.map((q,i)=>{const r=resp[q.num];let cls='nd';if(i===qat)cls+=' at';else if(r!==undefined)cls+=r===GAB[String(q.num)]?' ok':' er';return`<button class="${cls}" id="nd-${i}" onclick="goQ(${i})">${q.num}</button>`;}).join('');}
function renderGab(){let ce=0,er=0;document.getElementById('gbgrid').innerHTML=QS.map((q,i)=>{const r=resp[q.num],c=GAB[String(q.num)];let cls='gi';if(r!==undefined){if(r===c){cls+=' ok';ce++;}else{cls+=' er';er++;}}return`<div class="${cls}" onclick="goQ(${i});aba('quiz')"><span class="giq">${String(q.num).padStart(2,'0')}</span><span class="gil">${c}</span></div>`;}).join('');document.getElementById('gbpl').textContent=ce+' ✅  '+er+' ❌';}
function renderRes(){let ce=0,er=0,nr=0;QS.forEach(q=>{const r=resp[q.num];if(r===undefined)nr++;else if(r===GAB[String(q.num)])ce++;else er++;});const tot=QS.length,pct=Math.round(ce/tot*100);document.getElementById('rsc').textContent=ce;document.getElementById('rpt').textContent='de '+tot+' questões';document.getElementById('rce').textContent=ce;document.getElementById('rer').textContent=er;document.getElementById('rnr').textContent=nr;document.getElementById('rpct').textContent=pct+'%';const msgs=['🔥 Não desista! Pratique mais com outras provas.','📖 Continue estudando! Revise as questões erradas.','💪 Bom resultado! Continue praticando!','🎉 Excelente! Você está muito bem preparado!'];document.getElementById('rmsg').textContent=msgs[pct>=80?3:pct>=60?2:pct>=40?1:0];}
function answer(num,l){if(resp[num]!==undefined)return;resp[num]=l;renderQ();renderNav();renderGab();}
function goQ(i){if(i<0||i>=QS.length)return;qat=i;renderQ();renderNav();window.scrollTo({top:0,behavior:'smooth'});}
function next(){if(qat<QS.length-1)goQ(qat+1);else aba('res');}
function refazer(){resp={};qat=0;aba('quiz');renderQ();renderNav();renderGab();}
function voltarIntro(){document.getElementById('bbar').style.display='none';document.getElementById('hdr').style.display='none';['quiz','gab','res'].forEach(x=>document.getElementById('t-'+x).classList.remove('ativa'));document.getElementById('t-intro').classList.add('ativa');resp={};qat=0;}
</script>
