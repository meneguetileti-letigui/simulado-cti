<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CTI 2020 – Vestibulinho</title>
<style>
:root{--az:#1a3a6b;--az2:#2563eb;--az3:#eff6ff;--ve:#16a34a;--ve2:#dcfce7;--vm:#dc2626;--vm2:#fee2e2;--am:#d97706;--am2:#fef3c7;--bg:#f1f5f9;--cd:#fff;--bd:#e2e8f0;--tx:#1e293b;--t2:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
/* HEADER */
#hdr{background:var(--az);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hb{background:#fff;color:var(--az);font-weight:800;font-size:14px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:14px;font-weight:700}.hs{font-size:11px;color:#93c5fd}
.prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.pf{height:100%;background:#60a5fa;border-radius:2px;transition:width .4s}
/* NAV DOTS */
.nav{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;background:var(--cd);border-bottom:1px solid var(--bd);scrollbar-width:none;position:sticky;top:62px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nd{min-width:28px;height:28px;border-radius:7px;border:2px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;font-family:monospace;transition:all .15s}
.nd.at{border-color:var(--az2);background:var(--az2);color:#fff}
.nd.ok{border-color:var(--ve);background:var(--ve2);color:var(--ve)}
.nd.er{border-color:var(--vm);background:var(--vm2);color:var(--vm)}
/* SCREENS */
.tela{display:none}.ativa{display:block}
/* INTRO */
#t-intro{padding:20px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:20px;padding:24px 20px;margin-bottom:20px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;color:#bfdbfe;line-height:1.5}
.hstats{display:flex;gap:10px;margin-top:12px}
.hst{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hst-n{font-size:18px;font-weight:800}.hst-l{font-size:10px;color:#93c5fd}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mgrid{display:grid;gap:9px;margin-bottom:20px}
.mb{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.mb.sel{border-color:var(--az2);background:var(--az3)}
.mi{font-size:22px;flex-shrink:0}.mn{font-size:14px;font-weight:700}.md{font-size:11px;color:var(--t2)}
.btn-in{width:100%;padding:14px;border:none;border-radius:14px;background:var(--az2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);font-family:inherit}
.btn-in:active{transform:scale(.97)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--az2);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 16px;font-family:inherit}
/* QUIZ */
#t-quiz{padding-bottom:90px}
.qwrap{max-width:600px;margin:0 auto;padding:14px 14px 0}
/* PAGE IMAGE */
.pimg{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pimg img{width:100%;display:block}
.pimg-lbl{background:var(--az);color:#fff;font-size:11px;font-weight:700;padding:6px 12px;display:flex;align-items:center;gap:6px}
/* QUESTION CARD */
.qcard{background:var(--cd);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;animation:fu .2s ease;margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qhdr{background:var(--az);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.qbadge{background:rgba(255,255,255,.18);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;font-family:monospace}
.qmat{font-size:11px;color:#93c5fd}
.qbody{padding:14px}
.qen{font-size:13.5px;line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.alts{display:flex;flex-direction:column;gap:7px}
.alt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s;text-align:left;width:100%;-webkit-user-select:none}
.alt:active{transform:scale(.98)}
.altl{min-width:26px;height:26px;border-radius:7px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;transition:all .15s}
.altt{font-size:13px;line-height:1.5;padding-top:3px}
.alt.sel{border-color:var(--az2);background:var(--az3)}.alt.sel .altl{background:var(--az2);color:#fff}
.alt.ok{border-color:var(--ve);background:var(--ve2)}.alt.ok .altl{background:var(--ve);color:#fff}
.alt.er{border-color:var(--vm);background:var(--vm2)}.alt.er .altl{background:var(--vm);color:#fff}
.alt:disabled{cursor:default}
.fb{margin:10px 0 0;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px}
.fb.ok{background:var(--ve2);color:var(--ve);display:flex}
.fb.er{background:var(--vm2);color:var(--vm);display:flex}
.qac{padding:10px 0 4px;display:flex;gap:8px}
.bant,.bprx{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.bant:active,.bprx:active{transform:scale(.97)}
.bant{background:var(--bg);border:2px solid var(--bd);color:var(--tx)}
.bprx{background:var(--az2);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3)}
/* GAB */
#t-gab{padding:14px 14px 90px;max-width:600px;margin:0 auto}
.gbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbpl{font-size:13px;font-weight:700;color:var(--az)}
.gbgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--cd);border-radius:16px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gi{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:9px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s}
.gi.ok{border-color:var(--ve);background:var(--ve2)}.gi.er{border-color:var(--vm);background:var(--vm2)}
.giq{font-size:10px;font-weight:700;color:var(--t2);font-family:monospace}
.gil{font-size:15px;font-weight:800;color:var(--az);font-family:monospace}
.gi.ok .giq,.gi.ok .gil{color:var(--ve)}.gi.er .giq,.gi.er .gil{color:var(--vm)}
/* RES */
#t-res{padding:14px 14px 90px;max-width:480px;margin:0 auto}
.rhero{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
.rsc{font-size:52px;font-weight:800;line-height:1}.rde{font-size:14px;color:#93c5fd;margin-bottom:4px}
.rpt{font-size:22px;font-weight:700;color:#60a5fa}.rmsg{font-size:13px;color:#bfdbfe;margin-top:8px;line-height:1.4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--cd);border-radius:13px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stn{font-size:26px;font-weight:800}.stl{font-size:11px;color:var(--t2);font-weight:600}
.cv{color:var(--ve)}.cm{color:var(--vm)}.ca{color:var(--am)}.caz{color:var(--az)}
.bref{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;transition:all .15s}
.bref:active{transform:scale(.97)}
.bref.p{background:var(--az2);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bref.s{background:var(--bg);color:var(--az);border:2px solid var(--az2)}
/* BOTTOM */
#bbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-top:1px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 10px rgba(0,0,0,.07);z-index:100}
.bbi{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0;font-size:10px;font-weight:600;color:var(--t2);font-family:inherit}
.tab.at{color:var(--az2)}.tabi{font-size:19px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}
/* INDEX LINK */
.idx-link{display:block;text-align:center;padding:10px;color:var(--t2);font-size:12px;text-decoration:none;margin-top:8px}
</style>
</head>
<body>

<div id="hdr" style="display:none">
  <div class="hr">
    <div class="hb">CTI</div>
    <div><div class="ht">Vestibulinho 2020</div><div class="hs" id="hs">Prova 2020</div></div>
  </div>
  <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
</div>

<!-- INTRO -->
<div id="t-intro" class="tela ativa">
  <div class="hero">
    <h1>📚 Prova 2020</h1>
    <p>Vestibulinho Unificado CTI — Colégio Técnico Industrial</p>
    <div class="hstats">
      <div class="hst"><div class="hst-n">50</div><div class="hst-l">questões</div></div>
      <div class="hst"><div class="hst-n">5</div><div class="hst-l">matérias</div></div>
      <div class="hst"><div class="hst-n">4h</div><div class="hst-l">duração</div></div>
    </div>
  </div>
  <div class="slbl">Modo de estudo</div>
  <div class="mgrid">
    <button class="mb sel" onclick="selModo('feedback',this)">
      <span class="mi">⚡</span>
      <div><div class="mn">Feedback imediato</div><div class="md">Veja se acertou logo após responder</div></div>
    </button>
    <button class="mb" onclick="selModo('simulado',this)">
      <span class="mi">🎯</span>
      <div><div class="mn">Modo simulado</div><div class="md">Responda tudo e veja resultado no final</div></div>
    </button>
  </div>
  <button class="btn-in" onclick="iniciar()">Iniciar prova 2020 →</button>
  <a href="index.html" class="idx-link">← Voltar para todas as provas</a>
</div>

<!-- QUIZ -->
<div id="t-quiz" class="tela">
  <div class="nav" id="nav"></div>
  <div class="qwrap" id="qcon"></div>
</div>

<!-- GABARITO -->
<div id="t-gab" class="tela">
  <div class="gbtop">
    <div class="slbl" style="margin:0">Gabarito Oficial 2020</div>
    <div class="gbpl" id="gbpl"></div>
  </div>
  <div class="gbgrid" id="gbgrid"></div>
</div>

<!-- RESULTADO -->
<div id="t-res" class="tela">
  <div class="rhero">
    <div class="rde">Você acertou</div>
    <div class="rsc" id="rsc">0</div>
    <div class="rpt" id="rpt">de 50 questões</div>
    <div class="rmsg" id="rmsg"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stn cv" id="rce">0</div><div class="stl">✅ Certas</div></div>
    <div class="stat"><div class="stn cm" id="rer">0</div><div class="stl">❌ Erradas</div></div>
    <div class="stat"><div class="stn ca" id="rnr">0</div><div class="stl">⬜ Não respondidas</div></div>
    <div class="stat"><div class="stn caz" id="rpct">0%</div><div class="stl">📊 Aproveitamento</div></div>
  </div>
  <button class="bref p" onclick="refazer()">🔄 Refazer esta prova</button>
  <button class="bref s" onclick="voltarIntro()">🏠 Menu inicial</button>
</div>

<div id="bbar">
  <div class="bbi">
    <button class="tab at" id="tab-quiz" onclick="aba('quiz')"><span class="tabi">📝</span>Quiz</button>
    <button class="tab" id="tab-gab" onclick="aba('gab')"><span class="tabi">📋</span>Gabarito</button>
    <button class="tab" id="tab-res" onclick="aba('res')"><span class="tabi">🏆</span>Resultado</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const QS=[{"num": 1, "mat": "Língua Portuguesa", "enunciado": "[Tira: Recruta Zero — Sargento levou Otto à exposição de cães e ele venceu. Otto diz que 'Não... O sargento tirou.']\n\nO efeito de humor da tira ocorre com a interpretação equivocada que o segundo personagem faz do termo", "A": "sargento.", "B": "exposição.", "C": "ele.", "D": "venceu."}, {"num": 2, "mat": "Língua Portuguesa", "enunciado": "Texto 'O mundo dos selos raros' (Vicente Vilardaga, IstoÉ, 2019): relato sobre selos raros e valiosos, como o Erro de impressão Baden (€1,26 milhão) e o Black on Magenta (US$ 9,5 milhões).\n\nAs informações textuais permitem concluir que", "A": "os selos estão sendo cada vez menos usados, mas ainda podem ser negócios muito rentáveis.", "B": "os leilões de selos têm levado a população a mandar mais cartas do que em outros tempos.", "C": "a inexistência de selos hoje em dia tem feito o comércio desse produto ficar menos rentável.", "D": "os países estão produzindo mais selos, empolgados com os valores que estes têm obtido em leilões."}, {"num": 3, "mat": "Língua Portuguesa", "enunciado": "De acordo com o segundo parágrafo do texto, no leilão na Alemanha, o valor pago ao selo 'Erro de impressão Baden' foi determinado", "A": "pelo seu tamanho reduzido.", "B": "pelo defeito que o torna raro.", "C": "pela data estampada no envelope.", "D": "pelo preço pago originalmente por ele."}, {"num": 4, "mat": "Língua Portuguesa", "enunciado": "Na frase 'Se for considerado pelo seu peso, é um dos objetos mais valiosos que existem.', a conjunção 'Se' expressa sentido de", "A": "condição, sugerindo que o valor de um selo pode ser extremamente alto em comparação ao seu peso.", "B": "causa, sugerindo que a avaliação de um selo deve ignorar o peso que ele possa ter de fato.", "C": "conclusão, sugerindo que o selo, como os demais objetos valiosos do mundo, é avaliado pelo peso.", "D": "comparação, sugerindo que o valor comercial de um selo é compatível com o seu peso físico."}, {"num": 5, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que o predicado nominal descreve uma relação positiva das pessoas com os selos.", "A": "Selos parecem coisas ultrapassadas e fora de moda.", "B": "... receber um envelope com selo bonito era uma alegria...", "C": "O outro está na coleção do Museu Postal de Berlim.", "D": "... e o único magenta de um penny que sobreviveu foi esse."}, {"num": 6, "mat": "Língua Portuguesa", "enunciado": "Os termos 'ultrapassadas' e 'escassez' são antônimos, respectivamente, de", "A": "promissoras; diminuição.", "B": "conservadoras; exagero.", "C": "desinteressantes; falta.", "D": "inovadoras; abundância."}, {"num": 7, "mat": "Língua Portuguesa", "enunciado": "Na passagem 'David Redden, classificou-o como um objeto mágico', o pronome 'o' refere-se ao", "A": "Black on Magenta.", "B": "Three Skilling Yellow.", "C": "Erro de impressão Baden.", "D": "ao selo do Museu Postal de Berlim."}, {"num": 8, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que o enunciado atende à norma-padrão de concordância.", "A": "Foi impresso uma pequena tiragem de selos na gráfica de um jornal, já que estava escasso os selos vindos da Inglaterra.", "B": "Como se escreve poucas cartas hoje em dia, certamente deve existir muitas crianças que nem sabem o que é um selo.", "C": "Pagaram-se 1,26 milhão de euros pelo Erro de impressão Baden, mas houveram outros casos de selos vendidos por valores maior.", "D": "9,5 milhões de dólares foram pagos em 2014 pelo Black on Magenta, o único magenta de um penny que sobreviveu."}, {"num": 9, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que o emprego do acento indicativo da crase está em conformidade com a norma-padrão.", "A": "Colocados lado à lado, Three Skilling e Black on Magenta são selos valiosos, cobiçados no mundo inteiro.", "B": "Para David Redden, o selo mais caro do mundo chega à ser 'um objeto mágico, a definição própria de raridade'.", "C": "Quem foi à Alemanha para participar do leilão do Erro de impressão Baden, viu-o ser arrebatado por 1,26 milhão de euros.", "D": "Devido à certo controle dos selos que viriam da Inglaterra, as reservas postais da Guiana Francesa ficaram ameaçadas."}, {"num": 10, "mat": "Língua Portuguesa", "enunciado": "[Tira Chico Bento: Os hóspedes — a mãe chama Chico: o tio Tenório trouxe a família para passar uns dias. Chico está feliz, mas a mãe exclama: 'Essa vida da cidade acaba com a gente!']\n\nObservando-se a fisionomia de Chico Bento e de sua mãe, eles expressam, correta e respectivamente,", "A": "raiva e felicidade.", "B": "perplexidade e alegria.", "C": "contentamento e indiferença.", "D": "tristeza e confusão."}, {"num": 11, "mat": "Língua Portuguesa", "enunciado": "Analisando-se a fala da mãe de Chico Bento, é correto afirmar que ela", "A": "cria uma forma de expressão verbal de difícil entendimento ao leitor.", "B": "expressa uma forma de comunicação que não ocorre no mundo real.", "C": "altera a forma de representar a fala, usando uma linguagem formal.", "D": "reproduz o modo como as pessoas do campo falam no cotidiano."}, {"num": 12, "mat": "Língua Portuguesa", "enunciado": "Texto 'Vocês conhecem Ibaté?' (Orlando de Miranda): criança que mora em Ibaté com avós vai morar em São Paulo com tios. A avó contraria a filha e decide levar o neto.\n\nA interpretação correta do texto em um enunciado que atende à norma-padrão de acentuação e de ortografia é:", "A": "A avó discordou da filha Frozina, por que esta não queria a viagem, parecendo ter ciume da mãe andando com o neto por São Paulo.", "B": "A avó acreditava que Ibaté era um lugar perigoso para o neto morar, porisso optou por deixa-lo sob os cuidados do tio.", "C": "A avó estava para realizar sozinha uma viagem, depois que se tornou viúva e decidiu levar o neto para viver com os tios em São Paulo.", "D": "A avó queria manter os mesmos hábitos que tinha antes da viuvez, razão pela qual contrariou a filha e levou o neto para uma cidade maior."}, {"num": 13, "mat": "Língua Portuguesa", "enunciado": "Quanto à predicação, o verbo que não precisa de complemento está corretamente destacado em:", "A": "Vocês conhecem Ibaté?", "B": "Foi lá que nasci e morei com meus avós...", "C": "... vovó resolveu me mandar para São Paulo...", "D": "... disse vovó, sem permitir nenhuma outra discussão."}, {"num": 14, "mat": "Língua Portuguesa", "enunciado": "No trecho 'quando ela anunciou que embarcaríamos', o sentido expresso pela forma verbal 'embarcaríamos' e o sujeito composto que pratica a ação são, correta e respectivamente:", "A": "ação futura no passado; eu e ela.", "B": "pedido; vovó e vovô.", "C": "dúvida; tio Dagoberto e tia Eva.", "D": "certeza; eu e tia Frozina."}, {"num": 15, "mat": "Língua Portuguesa", "enunciado": "Nas passagens 'É uma cidade pequenina' e '– Bobagens! – disse vovó', as palavras destacadas expressam, respectivamente, sentido de", "A": "lugar muito acolhedor; algo meio confuso.", "B": "lugar pouco agradável; algo preocupante.", "C": "lugar de pequena extensão; algo perigoso.", "D": "lugar muito pequeno; algo sem importância."}, {"num": 16, "mat": "Matemática", "enunciado": "João ganhou R$ 300,00 e comprou camiseta (1/6 do valor + R$ 10,00) e calça (1/3 do valor + R$ 20,00). Com o restante comprou bermuda e sobraram R$ 45,00.\n\nO valor da bermuda foi", "A": "R$ 60,00.", "B": "R$ 75,00.", "C": "R$ 90,00.", "D": "R$ 105,00."}, {"num": 17, "mat": "Matemática", "enunciado": "[Tabela: Time A sofridos=3; Time B saldo=–2; Time C sofridos=1, saldo=0. Time C sofreu 3 gols a menos que o B. Saldo do A = nº de gols marcados pelo C]\n\nA soma dos gols marcados pelos três times juntos foi", "A": "5.", "B": "6.", "C": "7.", "D": "8."}, {"num": 18, "mat": "Matemática", "enunciado": "3 músicas: 1ª = 3min48s, 2ª = 2min52s, soma total = 9min15s.\n\nA duração da 3ª música era de", "A": "2 minutos e 35 segundos.", "B": "2 minutos e 45 segundos.", "C": "2 minutos e 55 segundos.", "D": "3 minutos e 05 segundos."}, {"num": 19, "mat": "Matemática", "enunciado": "Um recipiente tem 20 litros de detergente. Foi possível encher 15 frascos de 800 mL e mais alguns de 600 mL. Ainda restaram 3,2 litros.\n\nO número de frascos de 600 mL enchidos foi", "A": "5.", "B": "6.", "C": "7.", "D": "8."}, {"num": 20, "mat": "Matemática", "enunciado": "Um reservatório vazio tem capacidade de 2400 litros. Uma mangueira despeja 16 litros a cada 3 minutos. Depois de 3 horas, o número de litros que ainda faltam para encher o reservatório é", "A": "960.", "B": "1 150.", "C": "1 280.", "D": "1 440."}, {"num": 21, "mat": "Matemática", "enunciado": "Pedro utilizou 30% das folhas de sulfite no primeiro trabalho e ainda restaram 84 folhas.\n\nO número de folhas utilizadas no primeiro trabalho foi", "A": "30.", "B": "36.", "C": "42.", "D": "48."}, {"num": 22, "mat": "Matemática", "enunciado": "Bruno comprou uma bicicleta pagando 2 parcelas mensais de R$ 972,00. O preço à vista era R$ 1.800,00.\n\nA taxa mensal de juro simples cobrada foi de", "A": "2%.", "B": "3%.", "C": "4%.", "D": "5%."}, {"num": 23, "mat": "Matemática", "enunciado": "Carol tem um pacote de balas. Com 8 balas por pacotinho, faz N pacotinhos sem sobra. Com 5 balas, faz N + 3 pacotinhos sem sobra.\n\nO número total de balas era", "A": "40.", "B": "45.", "C": "50.", "D": "55."}, {"num": 24, "mat": "Matemática", "enunciado": "Márcia tem apenas notas de R$ 2,00 e de R$ 5,00, no total de 9 notas e R$ 36,00 no total.\n\nO número de notas de R$ 5,00 é", "A": "3.", "B": "4.", "C": "5.", "D": "6."}, {"num": 25, "mat": "Matemática", "enunciado": "Um professor pediu para resolver x² – 16x + 63 = 0. Pedro percebeu que as raízes eram iguais às idades dos seus dois irmãos mais novos, André e Caio. Sabendo que André é mais velho que Caio, a idade de Caio é", "A": "6 anos.", "B": "7 anos.", "C": "8 anos.", "D": "9 anos."}, {"num": 26, "mat": "Matemática", "enunciado": "[Figura: Três quadrados Q1, Q2, Q3. O perímetro de Q2 é 32 cm e a área de Q1 é 4 cm²]\n\nA área do quadrado Q3 é", "A": "9 cm².", "B": "16 cm².", "C": "25 cm².", "D": "36 cm²."}, {"num": 27, "mat": "Matemática", "enunciado": "[Figura: Avenida reta com banco (B), farmácia (F), mercearia (M), padaria (P) e igreja (I). BM=x+100m, MI=x, PI=1,0 km, BF=1,2 km, BI=2,9 km]\n\nA distância entre o banco (B) e a farmácia (F) é igual a", "A": "400 m.", "B": "500 m.", "C": "600 m.", "D": "700 m."}, {"num": 28, "mat": "Matemática", "enunciado": "[Figura: Terreno retangular 15m×8m. Canteiro triangular no canto com base 9m]\n\nO comprimento da cerca DE que separa o canteiro do resto do terreno é igual a", "A": "6 m.", "B": "8 m.", "C": "10 m.", "D": "12 m."}, {"num": 29, "mat": "Matemática", "enunciado": "Uma caminhonete transportará 16 caixas com 12 melões de 2 kg cada. Cada caixa vazia tem 400 g de massa.\n\nA massa total (caixas + melões) será de, aproximadamente,", "A": "376,4 kg.", "B": "388,2 kg.", "C": "390,4 kg.", "D": "394,8 kg."}, {"num": 30, "mat": "Matemática", "enunciado": "A forma simplificada de (a² + 4a + 4) · (a – 2) / (a² – 4), para a ≠ 2 e a ≠ –2, é igual a", "A": "a + 2", "B": "8a · (a – 2)", "C": "8a + 2", "D": "8a² + 16"}, {"num": 31, "mat": "Ciências Naturais", "enunciado": "Em estudo sobre solo, 100 mL de areia seca foram colocados em uma coluna de vidro. Acrescentou-se água até atingir 100 mL (medição 1). A torneira foi aberta e medido o tempo para escoar toda a água (medição 2).\n\nAs propriedades do solo medidas em 1 e 2 foram, respectivamente,", "A": "drenagem e filtração.", "B": "porosidade e permeabilidade.", "C": "densidade e drenagem.", "D": "filtração e estrutura."}, {"num": 32, "mat": "Ciências Naturais", "enunciado": "Uma rocha se formou pelo resfriamento do magma, aflorou à superfície, sofreu intemperismo, seus constituintes foram depositados em um lago e depois compactados e cimentados. Ao pesquisar essa rocha, foi verificada a presença de ouro. O ouro foi", "A": "encontrado em uma rocha sedimentar.", "B": "formado pelo intemperismo.", "C": "cimentado pelo magma.", "D": "formado em uma rocha metamórfica."}, {"num": 33, "mat": "Ciências Naturais", "enunciado": "[Figura: Jardim filtrante — água de pias passa por 1 (caixa de gordura) e 2 (areia/brita com plantas) antes de sair tratada]\n\nAo passar pelos recipientes 1 e 2, a água é submetida, respectivamente, aos processos de", "A": "floculação e desinfecção.", "B": "decomposição e decantação.", "C": "filtração e peneiração.", "D": "decantação e filtração."}, {"num": 34, "mat": "Ciências Naturais", "enunciado": "Aterro sanitário com 4 etapas: 1-manta impermeável na base; 2-drenos para coleta do chorume; 3-drenos para coleta do biogás; 4-camadas de resíduos cobertas por argila.\n\nO aterro sanitário produz materiais que podem ser utilizados, como é o caso do que ocorre em", "A": "1 e 2.", "B": "2 e 3.", "C": "3 e 4.", "D": "4 e 1."}, {"num": 35, "mat": "Ciências Naturais", "enunciado": "[Figura: Circuito elétrico com 3 pilhas de 1,5 V e 4 lâmpadas (L1 a L4) com ponto X entre L3 e L4]\n\nDa forma como está montado, verifica-se que", "A": "a interrupção do circuito em P não afeta o brilho das lâmpadas.", "B": "se o circuito for interrompido em X, a lâmpada L1 ficará acesa.", "C": "a voltagem a ser distribuída no circuito é de 4,5 v.", "D": "o brilho da lâmpada L1 é maior do que o das demais lâmpadas."}, {"num": 36, "mat": "Ciências Naturais", "enunciado": "[Figura: 1=painéis solares (luminosa→elétrica), 2=aquecimento de água (luminosa→térmica), 3=fotossíntese (luminosa→química)]\n\nCom relação às transformações de energia, é correto afirmar que a energia", "A": "térmica do sol é transformada em calor em 1, e, em eletricidade, em 2.", "B": "radiante do sol é transformada em energia elétrica em 2, e, em química, em 3.", "C": "luminosa do sol é transformada em energia térmica em 1, e, em química, em 2.", "D": "solar é transformada em energia cinética em 1, e, em térmica, em 3."}, {"num": 37, "mat": "Ciências Naturais", "enunciado": "Escola com 4 ações: 1-copos não descartáveis; 2-vidros de alimentos para acondicionar produtos; 3-papel sulfite com dois lados disponíveis; 4-recipientes para descarte de garrafas Pet e latas.\n\nCorresponde às atividades de Reduzir, Reutilizar e Reciclar, respectivamente, as ações", "A": "1, 2 e 3.", "B": "1, 2 e 4.", "C": "2, 4 e 3.", "D": "3, 4 e 1."}, {"num": 38, "mat": "Ciências Naturais", "enunciado": "Relato sobre drogas: 'Utilizava quando ia para as baladas. Sensação de euforia e perda de inibições. Depois, desânimo e ânsia de vômito. No fim de semana, voltava a utilizar. Com o uso contínuo, aumentei as doses e, um dia, quase morri. Minha temperatura aumentou e eu desmaiei.'\n\nO relato trata do consumo de", "A": "maconha.", "B": "crack.", "C": "anabolizante.", "D": "ecstasy."}, {"num": 39, "mat": "Ciências Naturais", "enunciado": "[Figura: Processo imunológico — célula 1 produz anticorpos e célula 2 realiza fagocitose após ferimento com objeto perfurocortante]\n\nAs ações de defesa realizadas pelas células 1 e 2 são, respectivamente:", "A": "produção de anticorpos e fagocitose.", "B": "produção de antígenos e de anticorpos.", "C": "produção de antígenos e fagocitose.", "D": "produção de anticorpos e de antígenos."}, {"num": 40, "mat": "Ciências Naturais", "enunciado": "Em 2016, João Victor de Andrade dos Santos desenvolveu método para conservar caldo de cana. Descobriu-se que essa técnica pode ser capaz de inativar um protozoário nas fezes de um inseto presente em locais onde a cana é armazenada.\n\nO estudo apresentou método eficaz para", "A": "o tratamento da malária.", "B": "o desenvolvimento da vacina da dengue.", "C": "a prevenção da doença de Chagas.", "D": "a forma de repelir o mosquito da febre amarela."}, {"num": 41, "mat": "Ciências Naturais", "enunciado": "[Mapa do Brasil com regiões. Bioma com árvores de galhos tortuosos, casca grossa, queimadas recorrentes, 67 espécies de mamíferos, 837 de aves]\n\nA maior parte desse bioma encontra-se nas regiões", "A": "1, 2 e 3.", "B": "1, 4 e 5.", "C": "2, 4 e 5.", "D": "4, 3 e 5."}, {"num": 42, "mat": "Ciências Naturais", "enunciado": "Aves e mamíferos apresentam temperatura do corpo constante. Reações químicas em suas células produzem energia suficiente para produção de calor. Esse processo, responsável pela produção de energia no organismo, é denominado", "A": "circulação sanguínea.", "B": "movimento muscular.", "C": "isolamento térmico.", "D": "respiração celular."}, {"num": 43, "mat": "Ciências Naturais", "enunciado": "[Gráfico: desmatamento na Amazônia 2017/2018 e 2018/2019, com forte aumento em junho/julho de 2018/2019 chegando a 2003,7 km²]\n\nSe o ritmo de desmatamento continuar, isso trará consequências como o", "A": "aumento da poluição do ar devido à falta de oxigênio.", "B": "alagamento dessa região devido ao aumento das chuvas.", "C": "desenvolvimento de solo fértil e protegido para o plantio.", "D": "desaparecimento de espécies vegetais e animais típicos."}, {"num": 44, "mat": "Ciências Naturais", "enunciado": "O etanol celulósico é obtido por meio do aproveitamento do bagaço de cana-de-açúcar. Primeiro, realiza-se a quebra dos polissacarídeos; em seguida, os açúcares são submetidos a processos biológicos e químicos.\n\nEsses processos que levam à produção do álcool são, respectivamente:", "A": "solidificação e evaporação.", "B": "coagulação e decantação.", "C": "fermentação e destilação.", "D": "digestão e dissolução."}, {"num": 45, "mat": "Ciências Naturais", "enunciado": "A compostagem resulta na produção de adubo orgânico, misturando resíduos da cozinha e jardim. Após algumas semanas, os resíduos transformam-se em fertilizante natural.\n\nEsse processo ocorre devido à ação de organismos que atuam como", "A": "decompositor.", "B": "herbívoro.", "C": "predador.", "D": "produtor."}, {"num": 46, "mat": "Ciências Humanas", "enunciado": "[Mapa mundi: áreas destacadas em laranja próximas ao Equador na África, América do Sul e sudeste asiático]\n\nAs áreas destacadas no mapa", "A": "têm como características comuns a presença de grande número de árvores e arbustos com folhas largas e sempre verdes que refletem o ambiente com predomínio de forte umidade e de altas temperaturas.", "B": "apresentam alternância entre estações secas e chuvosas; a vegetação é constituída, principalmente, por arbustos e árvores de pequeno porte com raízes profundas, folhas grossas e troncos retorcidos.", "C": "caracterizam-se pelo clima tropical de altitude com verões quentes e úmidos e invernos secos; as espécies vegetais predominantes são do tipo gramíneas com arbustos que perdem as folhas na estação seca.", "D": "apresentam grande biodiversidade, devido, principalmente, à presença de solos com grande umidade que garantem árvores de grande porte e inúmeras espécies de mamíferos, insetos e aves."}, {"num": 47, "mat": "Ciências Humanas", "enunciado": "[Mapa da Ásia com focos de tensão: I=Turquia/Iraque, II=Irã, III=Cachemira, IV=Coreia do Norte]\n\nAssinale a alternativa que identifica corretamente um dos focos de tensão.", "A": "I – Turquia e Iraque estão em conflito há quase uma década com o objetivo de estabelecer o domínio econômico sobre parte do Oriente Médio.", "B": "II – Irã é o maior produtor de petróleo da região e tem pretensões de produzir armas nucleares e tornar-se a maior potência militar do Oriente Médio.", "C": "III – Cachemira é um território em permanente disputa entre a Índia, de religião predominantemente hindu, e o Paquistão, de religião muçulmana.", "D": "IV – Coreia do Norte e Coreia do Sul mantêm conflitos há décadas devido à disputa de territórios ricos em urânio, matéria-prima para armamentos nucleares."}, {"num": 48, "mat": "Ciências Humanas", "enunciado": "[Gráfico: Pessoal ocupado na agropecuária brasileira: 2006 (~16,5 milhões) e 2017 (~14,9 milhões)]\n\nA evolução do número de trabalhadores na agropecuária deveu-se, entre outros fatores,", "A": "à substituição de áreas de lavouras pela pecuária que utiliza menos mão de obra.", "B": "ao aumento das áreas destinadas à agricultura familiar, poupadora de mão de obra.", "C": "ao término da expansão das fronteiras agrícolas nas regiões Norte e Centro-Oeste.", "D": "à modernização das atividades agropecuárias e à consequente ampliação da mecanização."}, {"num": 49, "mat": "Ciências Humanas", "enunciado": "[Ilustração de Rugendas: 'Festa de Santa Rosália, padroeira dos negros' — escravos em celebração religiosa com música e dança]\n\nA ilustração mostra que", "A": "o culto religioso contribuiu para a união dos negros nos quilombos.", "B": "a vida dos escravos incluiu momentos de lazer, além do trabalho.", "C": "a diversidade cultural impediu a integração entre brancos e negros.", "D": "o politeísmo dos povos africanos foi preservado nesse ritual religioso."}, {"num": 50, "mat": "Ciências Humanas", "enunciado": "Texto sobre a Guerra Fria: o planeta como tabuleiro de xadrez entre dois jogadores (superpotências), onde qualquer confronto aberto poderia destruir tudo.\n\nO texto refere-se", "A": "às disputas por colônias na África e na Ásia, nas quais as potências europeias conseguiram mercados consumidores e fornecedores.", "B": "ao período conhecido como Paz Armada, que provocou as tensões responsáveis pela eclosão da Primeira Guerra Mundial.", "C": "à bipolarização do mundo após a Segunda Guerra Mundial, em que os países líderes dos blocos capitalista e socialista queriam a hegemonia.", "D": "aos combates diretos entre forças militares norte-americanas e soviéticas na Guerra Fria, que usaram armas químicas e nucleares."}];

let modo='feedback',resp={},qat=0;

function selModo(m,b){modo=m;document.querySelectorAll('.mb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');}
function iniciar(){
  resp={};qat=0;
  document.getElementById('t-intro').classList.remove('ativa');
  document.getElementById('hdr').style.display='block';
  document.getElementById('bbar').style.display='block';
  aba('quiz');renderQ();renderNav();renderGab();
}
function aba(t){
  ['quiz','gab','res'].forEach(x=>{document.getElementById('t-'+x).classList.remove('ativa');document.getElementById('tab-'+x).classList.remove('at');});
  document.getElementById('t-'+t).classList.add('ativa');
  document.getElementById('tab-'+t).classList.add('at');
  window.scrollTo({top:0,behavior:'smooth'});
  if(t==='res')renderRes();
  if(t==='gab')renderGab();
}
function matName(n){
  if(n<=10)return'Língua Portuguesa';
  if(n<=15)return'Literatura';
  if(n<=20)return'História';
  if(n<=25)return'Geografia';
  if(n<=30)return'Ciências/Biologia';
  if(n<=40)return'Matemática';
  if(n<=45)return'Física/Química';
  return'Ciências Humanas';
}
function renderQ(){
  const q=QS[qat];
  if(!q)return;
  const tot=QS.length;
  document.getElementById('pf').style.width=(((qat+1)/tot)*100).toFixed(0)+'%';
  document.getElementById('hs').textContent='Questão '+(qat+1)+' de '+tot;
  
  const corr=GAB[String(q.num)];
  const ru=resp[q.num];
  const res=ru!==undefined;
  const fb=modo==='feedback';
  
  // Get image for this question - prefer cropped, fallback to full page
  let imgsHtml='';
  const cropImg=QIMGS[String(q.num)];
  if(cropImg){
    imgsHtml='<div class="pimg"><img src="data:image/jpeg;base64,'+cropImg+'" style="width:100%;display:block;border-radius:8px" loading="lazy"></div>';

  }
  
  const alts=['A','B','C','D'].map(l=>{
    let cls='alt';
    if(res&&fb){if(l===corr)cls+=' ok';else if(l===ru)cls+=' er';}
    else if(res&&l===ru)cls+=' sel';
    return`<button class="${cls}" ${res?'disabled':''} onclick="answer(${q.num},'${l}')">
      <span class="altl">${l}</span><span class="altt">${q[l]}</span>
    </button>`;
  }).join('');
  
  let fbHtml='';
  if(res&&fb){
    const ok=ru===corr;
    fbHtml=`<div class="fb ${ok?'ok':'er'}">${ok?'✅ Resposta correta!':'❌ Gabarito: <strong>'+corr+'</strong>'}</div>`;
  }
  
  document.getElementById('qcon').innerHTML=`
    ${imgsHtml}
    <div class="qcard">
      <div class="qhdr">
        <span class="qbadge">Q${String(q.num).padStart(2,'0')}</span>
        <span class="qmat">${q.mat||matName(q.num)}</span>
      </div>
      <div class="qbody">
        <div class="qen">${q.enunciado}</div>
        <div class="alts">${alts}</div>
        ${fbHtml}
        <div class="qac" style="display:${res?'flex':'none'}">
          <button class="bant" onclick="goQ(${qat-1})" ${qat===0?'disabled':''}>← Anterior</button>
          <button class="bprx" onclick="next()">${qat<QS.length-1?'Próxima →':'🏆 Resultado'}</button>
        </div>
      </div>
    </div>`;
  
  // Scroll nav dot into view
  const dot=document.getElementById('nd-'+qat);
  if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderNav(){
  document.getElementById('nav').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num];
    let cls='nd';
    if(i===qat)cls+=' at';
    else if(r!==undefined)cls+=r===GAB[String(q.num)]?' ok':' er';
    return`<button class="${cls}" id="nd-${i}" onclick="goQ(${i})">${q.num}</button>`;
  }).join('');
}

function renderGab(){
  let ce=0,er=0;
  document.getElementById('gbgrid').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num],c=GAB[String(q.num)];
    let cls='gi';
    if(r!==undefined){if(r===c){cls+=' ok';ce++;}else{cls+=' er';er++;}}
    return`<div class="${cls}" onclick="goQ(${i});aba('quiz')">
      <span class="giq">${String(q.num).padStart(2,'0')}</span>
      <span class="gil">${c}</span>
    </div>`;
  }).join('');
  document.getElementById('gbpl').textContent=ce+' ✅  '+er+' ❌';
}

function renderRes(){
  let ce=0,er=0,nr=0;
  QS.forEach(q=>{const r=resp[q.num];if(r===undefined)nr++;else if(r===GAB[String(q.num)])ce++;else er++;});
  const tot=QS.length,pct=Math.round(ce/tot*100);
  document.getElementById('rsc').textContent=ce;
  document.getElementById('rpt').textContent='de '+tot+' questões';
  document.getElementById('rce').textContent=ce;
  document.getElementById('rer').textContent=er;
  document.getElementById('rnr').textContent=nr;
  document.getElementById('rpct').textContent=pct+'%';
  const msgs=['🔥 Não desista! Pratique mais com outras provas.','📖 Continue estudando! Revise as questões erradas.','💪 Bom resultado! Continue praticando!','🎉 Excelente! Você está muito bem preparado!'];
  document.getElementById('rmsg').textContent=msgs[pct>=80?3:pct>=60?2:pct>=40?1:0];
}

function answer(num,l){
  if(resp[num]!==undefined)return;
  resp[num]=l;
  renderQ();renderNav();renderGab();
}
function goQ(i){
  if(i<0||i>=QS.length)return;
  qat=i;renderQ();renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){if(qat<QS.length-1)goQ(qat+1);else aba('res');}
function refazer(){resp={};qat=0;aba('quiz');renderQ();renderNav();renderGab();}
function voltarIntro(){
  document.getElementById('bbar').style.display='none';
  document.getElementById('hdr').style.display='none';
  ['quiz','gab','res'].forEach(x=>document.getElementById('t-'+x).classList.remove('ativa'));
  document.getElementById('t-intro').classList.add('ativa');
  resp={};qat=0;
}
</script>
</body>
