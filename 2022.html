<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CTI 2022 – Vestibulinho</title>
<style>
:root{--az:#1a3a6b;--az2:#2563eb;--az3:#eff6ff;--ve:#16a34a;--ve2:#dcfce7;--vm:#dc2626;--vm2:#fee2e2;--am:#d97706;--am2:#fef3c7;--bg:#f1f5f9;--cd:#fff;--bd:#e2e8f0;--tx:#1e293b;--t2:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
/* HEADER */
#hdr{background:var(--az);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hb{background:#fff;color:var(--az);font-weight:800;font-size:14px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:14px;font-weight:700}.hs{font-size:11px;color:#93c5fd}
.prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.pf{height:100%;background:#60a5fa;border-radius:2px;transition:width .4s}
/* NAV DOTS */
.nav{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;background:var(--cd);border-bottom:1px solid var(--bd);scrollbar-width:none;position:sticky;top:62px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nd{min-width:28px;height:28px;border-radius:7px;border:2px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;font-family:monospace;transition:all .15s}
.nd.at{border-color:var(--az2);background:var(--az2);color:#fff}
.nd.ok{border-color:var(--ve);background:var(--ve2);color:var(--ve)}
.nd.er{border-color:var(--vm);background:var(--vm2);color:var(--vm)}
/* SCREENS */
.tela{display:none}.ativa{display:block}
/* INTRO */
#t-intro{padding:20px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:20px;padding:24px 20px;margin-bottom:20px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;color:#bfdbfe;line-height:1.5}
.hstats{display:flex;gap:10px;margin-top:12px}
.hst{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hst-n{font-size:18px;font-weight:800}.hst-l{font-size:10px;color:#93c5fd}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mgrid{display:grid;gap:9px;margin-bottom:20px}
.mb{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.mb.sel{border-color:var(--az2);background:var(--az3)}
.mi{font-size:22px;flex-shrink:0}.mn{font-size:14px;font-weight:700}.md{font-size:11px;color:var(--t2)}
.btn-in{width:100%;padding:14px;border:none;border-radius:14px;background:var(--az2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);font-family:inherit}
.btn-in:active{transform:scale(.97)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--az2);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 16px;font-family:inherit}
/* QUIZ */
#t-quiz{padding-bottom:90px}
.qwrap{max-width:600px;margin:0 auto;padding:14px 14px 0}
/* PAGE IMAGE */
.pimg{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pimg img{width:100%;display:block}
.pimg-lbl{background:var(--az);color:#fff;font-size:11px;font-weight:700;padding:6px 12px;display:flex;align-items:center;gap:6px}
/* QUESTION CARD */
.qcard{background:var(--cd);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;animation:fu .2s ease;margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qhdr{background:var(--az);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.qbadge{background:rgba(255,255,255,.18);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;font-family:monospace}
.qmat{font-size:11px;color:#93c5fd}
.qbody{padding:14px}
.qen{font-size:13.5px;line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.alts{display:flex;flex-direction:column;gap:7px}
.alt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s;text-align:left;width:100%;-webkit-user-select:none}
.alt:active{transform:scale(.98)}
.altl{min-width:26px;height:26px;border-radius:7px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;transition:all .15s}
.altt{font-size:13px;line-height:1.5;padding-top:3px}
.alt.sel{border-color:var(--az2);background:var(--az3)}.alt.sel .altl{background:var(--az2);color:#fff}
.alt.ok{border-color:var(--ve);background:var(--ve2)}.alt.ok .altl{background:var(--ve);color:#fff}
.alt.er{border-color:var(--vm);background:var(--vm2)}.alt.er .altl{background:var(--vm);color:#fff}
.alt:disabled{cursor:default}
.fb{margin:10px 0 0;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px}
.fb.ok{background:var(--ve2);color:var(--ve);display:flex}
.fb.er{background:var(--vm2);color:var(--vm);display:flex}
.qac{padding:10px 0 4px;display:flex;gap:8px}
.bant,.bprx{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.bant:active,.bprx:active{transform:scale(.97)}
.bant{background:var(--bg);border:2px solid var(--bd);color:var(--tx)}
.bprx{background:var(--az2);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3)}
/* GAB */
#t-gab{padding:14px 14px 90px;max-width:600px;margin:0 auto}
.gbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbpl{font-size:13px;font-weight:700;color:var(--az)}
.gbgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--cd);border-radius:16px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gi{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:9px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s}
.gi.ok{border-color:var(--ve);background:var(--ve2)}.gi.er{border-color:var(--vm);background:var(--vm2)}
.giq{font-size:10px;font-weight:700;color:var(--t2);font-family:monospace}
.gil{font-size:15px;font-weight:800;color:var(--az);font-family:monospace}
.gi.ok .giq,.gi.ok .gil{color:var(--ve)}.gi.er .giq,.gi.er .gil{color:var(--vm)}
/* RES */
#t-res{padding:14px 14px 90px;max-width:480px;margin:0 auto}
.rhero{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
.rsc{font-size:52px;font-weight:800;line-height:1}.rde{font-size:14px;color:#93c5fd;margin-bottom:4px}
.rpt{font-size:22px;font-weight:700;color:#60a5fa}.rmsg{font-size:13px;color:#bfdbfe;margin-top:8px;line-height:1.4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--cd);border-radius:13px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stn{font-size:26px;font-weight:800}.stl{font-size:11px;color:var(--t2);font-weight:600}
.cv{color:var(--ve)}.cm{color:var(--vm)}.ca{color:var(--am)}.caz{color:var(--az)}
.bref{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;transition:all .15s}
.bref:active{transform:scale(.97)}
.bref.p{background:var(--az2);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bref.s{background:var(--bg);color:var(--az);border:2px solid var(--az2)}
/* BOTTOM */
#bbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-top:1px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 10px rgba(0,0,0,.07);z-index:100}
.bbi{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0;font-size:10px;font-weight:600;color:var(--t2);font-family:inherit}
.tab.at{color:var(--az2)}.tabi{font-size:19px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}
/* INDEX LINK */
.idx-link{display:block;text-align:center;padding:10px;color:var(--t2);font-size:12px;text-decoration:none;margin-top:8px}
</style>
</head>
<body>

<div id="hdr" style="display:none">
  <div class="hr">
    <div class="hb">CTI</div>
    <div><div class="ht">Vestibulinho 2022</div><div class="hs" id="hs">Prova 2022</div></div>
  </div>
  <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
</div>

<!-- INTRO -->
<div id="t-intro" class="tela ativa">
  <div class="hero">
    <h1>📚 Prova 2022</h1>
    <p>Vestibulinho Unificado CTI — Colégio Técnico Industrial</p>
    <div class="hstats">
      <div class="hst"><div class="hst-n">50</div><div class="hst-l">questões</div></div>
      <div class="hst"><div class="hst-n">5</div><div class="hst-l">matérias</div></div>
      <div class="hst"><div class="hst-n">4h</div><div class="hst-l">duração</div></div>
    </div>
  </div>
  <div class="slbl">Modo de estudo</div>
  <div class="mgrid">
    <button class="mb sel" onclick="selModo('feedback',this)">
      <span class="mi">⚡</span>
      <div><div class="mn">Feedback imediato</div><div class="md">Veja se acertou logo após responder</div></div>
    </button>
    <button class="mb" onclick="selModo('simulado',this)">
      <span class="mi">🎯</span>
      <div><div class="mn">Modo simulado</div><div class="md">Responda tudo e veja resultado no final</div></div>
    </button>
  </div>
  <button class="btn-in" onclick="iniciar()">Iniciar prova 2022 →</button>
  <a href="index.html" class="idx-link">← Voltar para todas as provas</a>
</div>

<!-- QUIZ -->
<div id="t-quiz" class="tela">
  <div class="nav" id="nav"></div>
  <div class="qwrap" id="qcon"></div>
</div>

<!-- GABARITO -->
<div id="t-gab" class="tela">
  <div class="gbtop">
    <div class="slbl" style="margin:0">Gabarito Oficial 2022</div>
    <div class="gbpl" id="gbpl"></div>
  </div>
  <div class="gbgrid" id="gbgrid"></div>
</div>

<!-- RESULTADO -->
<div id="t-res" class="tela">
  <div class="rhero">
    <div class="rde">Você acertou</div>
    <div class="rsc" id="rsc">0</div>
    <div class="rpt" id="rpt">de 50 questões</div>
    <div class="rmsg" id="rmsg"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stn cv" id="rce">0</div><div class="stl">✅ Certas</div></div>
    <div class="stat"><div class="stn cm" id="rer">0</div><div class="stl">❌ Erradas</div></div>
    <div class="stat"><div class="stn ca" id="rnr">0</div><div class="stl">⬜ Não respondidas</div></div>
    <div class="stat"><div class="stn caz" id="rpct">0%</div><div class="stl">📊 Aproveitamento</div></div>
  </div>
  <button class="bref p" onclick="refazer()">🔄 Refazer esta prova</button>
  <button class="bref s" onclick="voltarIntro()">🏠 Menu inicial</button>
</div>

<div id="bbar">
  <div class="bbi">
    <button class="tab at" id="tab-quiz" onclick="aba('quiz')"><span class="tabi">📝</span>Quiz</button>
    <button class="tab" id="tab-gab" onclick="aba('gab')"><span class="tabi">📋</span>Gabarito</button>
    <button class="tab" id="tab-res" onclick="aba('res')"><span class="tabi">🏆</span>Resultado</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const QS=[{"num": 1, "mat": "Língua Portuguesa", "enunciado": "[Tira Calvin e Haroldo: Calvin (6 anos) não pode votar. Haroldo diz que é um cidadão sem poder escolher seu governo. Calvin responde: 'Não. Só queria um pedaço maior do bolo.']\n\nColabora com o efeito de humor da tira a ideia de que Calvin, o menino,", "A": "confunde o seu amigo com os absurdos da vida.", "B": "tem uma preocupação legítima com a vida social.", "C": "pensa em política para ajudar os seus semelhantes.", "D": "quer ter direito de votar para ter benefício próprio."}, {"num": 2, "mat": "Língua Portuguesa", "enunciado": "No contexto e de acordo com a norma-padrão, a frase do 3º quadrinho – Você está preocupado com os rumos do nosso país? – pode ser substituída por", "A": "Lhe causam preocupação os rumos do nosso país?", "B": "Preocupa você os rumos do nosso país?", "C": "Os rumos do nosso país têm preocupado você?", "D": "Causa preocupação em você os rumos do nosso país?"}, {"num": 3, "mat": "Língua Portuguesa", "enunciado": "Texto 'A saída da estadista?' (Folha de S.Paulo, 01.09.2021): Angela Merkel descrita como líder política de reconhecimento internacional, habilidosa, que enfrentou a Covid-19 com competência.\n\nAs informações do texto revelam que Angela Merkel", "A": "ganhou a admiração das populações da União Europeia, onde existem líderes melhores que ela.", "B": "tem sido uma líder política de respeito na Alemanha, mas entrou em crise com os refugiados.", "C": "tornou-se uma líder política cujo reconhecimento ultrapassou as fronteiras da Alemanha.", "D": "tem perdido seu prestígio social na Alemanha, devido à aliança política conservadora CDU/CSU."}, {"num": 4, "mat": "Língua Portuguesa", "enunciado": "O último parágrafo do texto permite concluir que Angela Merkel", "A": "pretendia manter-se como chanceler alemã por mais tempo.", "B": "gostaria de ser substituída por um político de seu partido.", "C": "estaria entusiasmada em aposentar-se com tanto sucesso.", "D": "desconhecia que deixaria o cargo de chanceler da Alemanha."}, {"num": 5, "mat": "Língua Portuguesa", "enunciado": "Os termos 'conciliar' (1º parágrafo) e 'capitalizar' (3º parágrafo) são sinônimos, correta e respectivamente, de:", "A": "harmonizar; aproveitar.", "B": "ajustar; empreender.", "C": "juntar; ignorar.", "D": "melhorar; acumular."}, {"num": 6, "mat": "Língua Portuguesa", "enunciado": "A metáfora que sugere algo malsucedido está corretamente destacada em:", "A": "Se há um líder político que se consagrou como estadista nos últimos anos, esse líder é a chanceler alemã Angela Merkel.", "B": "Enfrentou a Covid-19 com competência e transparência, recorrendo sempre à abordagem científica...", "C": "Trata-se de uma política incomumente popular, não apenas na Alemanha como em vários outros países europeus.", "D": "... ver sua aliança política conservadora CDU/CSU naufragar nas eleições marcadas para o próximo dia 26."}, {"num": 7, "mat": "Língua Portuguesa", "enunciado": "[Charge: Mulher frente ao armário cheio de camisetas pretas pensa: 'Lembro AQUELA camiseta preta entre as camisetas pretas']\n\nO destaque na palavra 'Aquela' sugere que a personagem", "A": "pretende achar entre as camisetas pretas do armário uma qualquer para vestir após o banho.", "B": "procura por uma camiseta preta específica dentre as muitas pretas que estão no armário.", "C": "prefere buscar uma camiseta preta porque as de outra cor não estão guardadas no armário.", "D": "busca uma camiseta preta no armário sem saber exatamente qual delas pretende vestir."}, {"num": 8, "mat": "Língua Portuguesa", "enunciado": "Na frase da charge, tem-se um predicado", "A": "verbal, expressando uma conversa da personagem consigo mesma, sugerindo uma ação.", "B": "nominal, expressando a descrição que a personagem faz para si sobre o que há no armário.", "C": "verbal, expressando um pedido da personagem para alguém realizar por ela uma ação.", "D": "nominal, expressando a caracterização que a personagem faz do seu armário para alguém."}, {"num": 9, "mat": "Língua Portuguesa", "enunciado": "Texto 'A polícia suburbana' (Lima Barreto, 1914): narrador irônico mora nos subúrbios e descreve a situação tranquila da vida nos arredores, contrastando com as reclamações dos jornais.\n\nEm conformidade com a norma-padrão, as lacunas do texto devem ser preenchidas, respectivamente, com:", "A": "quê ... à ... decendentes ... trás ... a", "B": "que ... à ... descendentes ... tras ... a", "C": "quê ... a ... descendentes ... traz ... à", "D": "que ... a ... decendentes ... tráz ... à"}, {"num": 10, "mat": "Língua Portuguesa", "enunciado": "O texto foi escrito em 1914. Nele, o autor enfatiza que", "A": "os jornais reclamam da falta de policiamento nos subúrbios, porque constantemente noticiam graves crimes ali cometidos.", "B": "os subúrbios são tranquilos e têm uma rotina diferente daquela que aparecem nas reclamações dos jornais.", "C": "a segurança dos subúrbios é bastante precária, apesar dos bons sentimentos dos moradores.", "D": "o sono de comissários e soldados suburbanos põe muitas vidas em perigo, por isso eles deveriam deixar de dormir e zelar pelo povo."}, {"num": 11, "mat": "Língua Portuguesa", "enunciado": "No 4º parágrafo, o autor afirma: 'Leio sempre essas reclamações e pasmo.' Nesse sentido, conclui-se que ele", "A": "se refere com ironia ao bom senso dos jornais, pois considera exageradas as reclamações.", "B": "se identifica com o ponto de vista dos jornais, pois considera legítimas as reclamações.", "C": "se emociona com as informações dos jornais, pois considera relevantes as reclamações.", "D": "se irrita com o posicionamento dos jornais, pois considera supérfluas as reclamações."}, {"num": 12, "mat": "Língua Portuguesa", "enunciado": "As expressões destacadas das passagens ('para pôr mais à mostra', 'para a casa alta noite', 'se as coisas não passassem assim') estabelecem, correta e respectivamente, relações de sentido de", "A": "finalidade, finalidade e causa.", "B": "causa, finalidade e conclusão.", "C": "causa, lugar e consequência.", "D": "finalidade, direção e condição."}, {"num": 13, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que os verbos destacados estão corretamente flexionados.", "A": "O Estado interveio nos subúrbios e conteve a violência dali?", "B": "Nos subúrbios, o Estado intervia se fosse necessário?", "C": "Se o Estado se propor a agir, será que conteria a violência?", "D": "Haverá melhorias, se os policiais intervirem nos subúrbios?"}, {"num": 14, "mat": "Língua Portuguesa", "enunciado": "Os substantivos que fazem o plural da mesma forma que 'pobres-diabos' são:", "A": "beija-flor e abaixo-assinado.", "B": "pé-de-vento e bomba-relógio.", "C": "recém-nascido e guarda-louça.", "D": "guarda-noturno e couve-flor."}, {"num": 15, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que a oração tem o mesmo tipo de sujeito e o verbo do predicado tem a mesma predicação que 'Os jornais [...] aproveitaram a oportunidade...'", "A": "... para pôr mais à mostra o descaso dos seus subordinados.", "B": "... a vida e a propriedade daquelas paragens estão entregues aos bons sentimentos dos outros...", "C": "Uma vez ou outra eu encontro um vigilante noturno...", "D": "... o Estado não precisa intervir corretamente..."}, {"num": 16, "mat": "Matemática", "enunciado": "Um profissional levou 5 horas e 15 minutos na edição de um vídeo promocional. O tratamento das imagens ocupou um terço do tempo da edição, o que correspondeu a 1 hora e", "A": "35 minutos.", "B": "40 minutos.", "C": "45 minutos.", "D": "50 minutos."}, {"num": 17, "mat": "Matemática", "enunciado": "O valor total das dívidas de Ana correspondeu a 2/5 do salário líquido. Ela depositou R$ 250,00 na poupança, que correspondeu à oitava parte do salário líquido. O valor total das dívidas de Ana foi de", "A": "R$ 850,00.", "B": "R$ 800,00.", "C": "R$ 750,00.", "D": "R$ 700,00."}, {"num": 18, "mat": "Matemática", "enunciado": "Há 6 meses, o preço de um produto correspondia a 80% do valor atual de R$ 120,00. O preço de venda desse produto aumentou em", "A": "R$ 24,00.", "B": "R$ 25,00.", "C": "R$ 26,00.", "D": "R$ 27,00."}, {"num": 19, "mat": "Matemática", "enunciado": "Um quadro com formato quadrado ocupa uma área de 6400 cm². O perímetro desse quadro é de", "A": "320 cm.", "B": "340 cm.", "C": "360 cm.", "D": "380 cm."}, {"num": 20, "mat": "Matemática", "enunciado": "Com R$ 200,00, Camila compra 8 unidades de um produto e sobram R$ 12,00 de troco. Se ela tivesse R$ 300,00, o troco que receberia ao comprar a maior quantidade possível seria de", "A": "R$ 14,00.", "B": "R$ 16,00.", "C": "R$ 18,00.", "D": "R$ 20,00."}, {"num": 21, "mat": "Matemática", "enunciado": "Nos últimos 4 dias, Carlos atendeu 122 clientes. No 2º dia, 13 a mais que o 1º; no 3º, 10 a menos que o dobro do 1º; no último, metade do 2º.\n\nO número de clientes atendidos no 3º dia foi", "A": "35.", "B": "40.", "C": "45.", "D": "50."}, {"num": 22, "mat": "Matemática", "enunciado": "Com 300 mL de suco concentrado faz-se 1,5 L de suco. Para fazer 5 L do suco, são necessários, de água,", "A": "2,5 L.", "B": "3,0 L.", "C": "3,5 L.", "D": "4,0 L."}, {"num": 23, "mat": "Matemática", "enunciado": "Se eu tivesse nascido um ano antes, teria o dobro da idade atual do meu irmão. A soma das nossas idades atuais é 35 anos. Meu irmão é", "A": "9 anos mais novo que eu.", "B": "10 anos mais novo que eu.", "C": "11 anos mais novo que eu.", "D": "12 anos mais novo que eu."}, {"num": 24, "mat": "Matemática", "enunciado": "Mário aplicou um capital por 1 ano, com taxa de 5% ao ano, e resgatou R$ 1.365,00. Se tivesse aplicado R$ 200,00 a mais, os juros teriam sido de", "A": "R$ 67,50.", "B": "R$ 70,00.", "C": "R$ 72,50.", "D": "R$ 75,00."}, {"num": 25, "mat": "Matemática", "enunciado": "[Figura: Pentágono regular com ângulo interno indicado em verde]\n\nA medida do ângulo formado entre dois lados, com um vértice em comum, mede", "A": "120°.", "B": "116°.", "C": "108°.", "D": "94°."}, {"num": 26, "mat": "Matemática", "enunciado": "Uma região em forma de triângulo retângulo tem hipotenusa de 100 m e soma dos catetos de 140 m. O menor cateto mede", "A": "60 m.", "B": "70 m.", "C": "80 m.", "D": "90 m."}, {"num": 27, "mat": "Matemática", "enunciado": "Um hexágono regular tem perímetro de 12 cm. Aproximando √3 por 1,7, a área aproximada é", "A": "9,8 cm².", "B": "10,2 cm².", "C": "10,6 cm².", "D": "11,0 cm²."}, {"num": 28, "mat": "Matemática", "enunciado": "Se 1 m³ corresponde a 1000 L, então 10 cm³ correspondem a", "A": "0,01 mL.", "B": "0,1 mL.", "C": "1 mL.", "D": "10 mL."}, {"num": 29, "mat": "Matemática", "enunciado": "Saquei 10% do saldo ontem e, do restante, saquei 20% hoje. O saque de hoje foi R$ 270,00. O saque de ontem foi de", "A": "R$ 90,00.", "B": "R$ 110,00.", "C": "R$ 130,00.", "D": "R$ 150,00."}, {"num": 30, "mat": "Matemática", "enunciado": "O valor numérico da expressão (x³ – 8x² + 16x) / (x³ – 16x) quando x = 1000 é", "A": "249/251", "B": "261/235", "C": "350", "D": "500"}, {"num": 31, "mat": "Ciências Naturais", "enunciado": "Pesquisadores brasileiros desenvolveram um soro contra a Covid-19, produzido por cavalos nos quais foi inoculada a proteína spike. A vacina Pfizer contém fragmentos de RNA. A vacina Novavax contém a própria proteína spike produzida sinteticamente.\n\nÉ correto afirmar:", "A": "a proteína spike funciona como um antibiótico contra o coronavírus.", "B": "o soro produzido pelo cavalo contém antígenos do coronavírus.", "C": "na produção do soro pelo cavalo, a proteína spike funciona como um antígeno.", "D": "a vacina Novavax provoca a formação de proteínas spike pelas células humanas."}, {"num": 32, "mat": "Ciências Naturais", "enunciado": "[Fotografia: Animal do Cerrado — raposa do campo]\n\nSobre esse ecossistema, é correto afirmar que", "A": "tem sofrido desmatamento bastante intenso, devido ao cultivo de café e trigo.", "B": "é encontrado em grande parte do estado de Goiás e Distrito Federal.", "C": "sua vegetação apresenta grande resistência ao excesso de sal do solo.", "D": "o solo permanece encharcado ao longo do ano, devido às chuvas abundantes."}, {"num": 33, "mat": "Ciências Naturais", "enunciado": "[Figura: Qualidade do ar em São Paulo — O3 (Ozônio) = 58 μg/m³, acima do máximo permitido de 56,6]\n\nA qualidade do ar foi considerada moderada devido à presença do poluente", "A": "SO₂, que interfere no transporte de O₂ pelo sangue.", "B": "NO₂, eliminado na queima de óleo diesel e gasolina.", "C": "material particulado que pode penetrar pela pele.", "D": "O₃, que causa problema aos pulmões."}, {"num": 34, "mat": "Ciências Naturais", "enunciado": "[Figura: Diagrama dos 5 Reinos]\n\nSabendo-se que todos os seres vivos são formados por células, é correto afirmar que os seres dos reinos", "A": "1 e 2 são formados por células procariotas e são autotróficos.", "B": "2 e 3 apresentam células capazes de realizar a fotossíntese.", "C": "4 e 5 são pluricelulares com células eucariotas e mitocôndria.", "D": "3 e 4 apresentam células desprovidas de carioteca e membrana plasmática."}, {"num": 35, "mat": "Ciências Naturais", "enunciado": "[Imagem: Cartaz de doação de sangue — 'A pandemia parou o mundo. Mas a esperança não pode parar. Doe Sangue. Salve Vidas!']\n\nCom a queda de 20% nas doações em 2020, quem está impedido de ser doador permanente adquiriu", "A": "doença de Chagas e AIDs.", "B": "febre amarela e doença de Chagas.", "C": "dengue e AIDs.", "D": "febre amarela e dengue."}, {"num": 36, "mat": "Ciências Naturais", "enunciado": "[Figuras 1 a 4: preservativo masculino, DIU, vaginal e diafragma]\n\nA respeito dos métodos apresentados, é correto afirmar que", "A": "1 é um método comportamental que impede a chegada do espermatozoide ao útero.", "B": "2 é um método hormonal que impede que o óvulo seja transportado na tuba uterina.", "C": "3 é um método natural que impede a produção de espermatozoides no testículo.", "D": "4 é um método de barreira que impede o encontro do espermatozoide com o óvulo."}, {"num": 37, "mat": "Ciências Naturais", "enunciado": "[Figura: Cadeias alimentares em lago — 1=algas, 2=crustáceos, 3=peixes, 4=bactérias, 5=protozoários]\n\nÉ correto afirmar que os organismos indicados pelo(s) número(s)", "A": "2 e 4 são fotossintetizantes.", "B": "1 ocupam o primeiro nível trófico.", "C": "4 e 5 são decompositores.", "D": "3 são consumidores primários."}, {"num": 38, "mat": "Ciências Naturais", "enunciado": "O Brasil é 'medalha de ouro' no combate ao tabagismo, segundo a Dra. Jaqueline Scholz. Segundo a OMS, o Brasil reduziu em 40% o número de fumantes, contribuindo para a diminuição de problemas de saúde causados pelo hábito de fumar, como", "A": "câncer de pulmão.", "B": "diabete.", "C": "anemia.", "D": "cirrose hepática."}, {"num": 39, "mat": "Ciências Naturais", "enunciado": "Texto sobre supercondutores: materiais que, abaixo de certa temperatura, não apresentam resistência elétrica.\n\nDentre os citados, aqueles supercondutores compostos por metais puros são os de", "A": "ligas nióbio-titânio.", "B": "mercúrio ou de chumbo.", "C": "materiais cerâmicos.", "D": "nanotubos de carbono."}, {"num": 40, "mat": "Ciências Naturais", "enunciado": "O trem Maglev utiliza o efeito da levitação magnética presente nos supercondutores para flutuar, desenvolvendo alta velocidade. Essa alta velocidade é alcançada devido", "A": "ao tipo de material que compõe suas rodas.", "B": "ao aumento da condutividade elétrica dos motores.", "C": "à falta de atrito do trem com os trilhos.", "D": "à diminuição de temperatura de sua parte elétrica."}, {"num": 41, "mat": "Ciências Naturais", "enunciado": "Agressão ambiental descrita: morador quebrava corais com martelo para usar como cimento. A similaridade com o cimento comercial está relacionada ao fato de", "A": "o recife ser formado por carapaças de coral, ricas em carbonato de cálcio.", "B": "o recife e o calcário serem rochas sedimentares ricas em carbonato de cálcio.", "C": "a rocha calcária ser originada por corais após aquecimento e fusão.", "D": "os corais serem formados a partir da decomposição de rochas calcárias."}, {"num": 42, "mat": "Ciências Naturais", "enunciado": "[Figura: Três modelos atômicos do hidrogênio — Prótio (¹H), Deutério (²H), Trítio (³H)]\n\nPor meio dos modelos atômicos apresentados, é possível concluir que", "A": "cada um deles representa um elemento químico diferente.", "B": "o número de partículas neutras e negativas neles é sempre o mesmo.", "C": "a soma de partículas de carga positiva e neutras neles é constante.", "D": "o número de cargas positivas é sempre o mesmo nos três modelos."}, {"num": 43, "mat": "Ciências Naturais", "enunciado": "[Figura: Formação do carvão mineral por soterramento de florestas ao longo de 300 milhões de anos]\n\nÉ correto afirmar que o carvão mineral é", "A": "um biocombustível, pois utiliza matéria orgânica vegetal.", "B": "similar ao petróleo, embora seja uma fonte renovável de energia.", "C": "um combustível fóssil e um dos responsáveis pelo efeito estufa.", "D": "importante fonte energética, pois substitui com vantagens ambientais o gás natural."}, {"num": 44, "mat": "Ciências Naturais", "enunciado": "[Figura: Dínamo conectado à roda de uma bicicleta, gerando eletricidade para o farol]\n\nNesse exemplo, o dínamo", "A": "atua como uma bateria de automóvel, transformando energia química em luz.", "B": "transforma energia elétrica em energia mecânica, que é transferida pela roda.", "C": "atua sobre a roda transformando energia cinética em energia potencial elétrica.", "D": "transforma energia mecânica em energia elétrica, que é transferida pelo fio."}, {"num": 45, "mat": "Ciências Naturais", "enunciado": "[Figura: Homem sob macieira com maçã caindo]\n\nO deslocamento da maçã pode ser explicado da seguinte forma:", "A": "a toda força de ação corresponde uma força de reação de igual intensidade e em sentido contrário.", "B": "o estado de repouso ou movimento de um corpo é alterado independentemente da aplicação de uma força externa.", "C": "os corpos na Terra estão sujeitos à ação de uma força que os atrai em direção ao centro da Terra.", "D": "a mudança de movimento de um corpo é produzida na direção contrária à força que foi aplicada nesse corpo."}, {"num": 46, "mat": "Ciências Humanas", "enunciado": "[Mapa dos biomas brasileiros: 1=Cerrado, 2=Pantanal, 3=Mata Atlântica, 4=Amazônia]\n\nO bioma descrito no texto, insubstituível para a distribuição de água no Brasil, está indicado no mapa pelo número", "A": "1, o Cerrado, que apresenta nascentes de rios pertencentes a várias bacias hidrográficas, como São Francisco e Paraná.", "B": "2, o Pantanal, considerado uma das áreas mais preservadas do Brasil.", "C": "3, a Mata Atlântica, pouco preservada, principalmente nas áreas mais onduladas das serras e dos mares de morros.", "D": "4, Amazônico, em fase de desmatamento que interfere na hidrografia regional e nas grandes usinas hidrelétricas do país."}, {"num": 47, "mat": "Ciências Humanas", "enunciado": "Em 2020, o número de refugiados e deslocados subiu para quase 82,4 milhões, um recorde histórico.\n\nSobre esse intenso movimento, é correto afirmar que", "A": "mais da metade dos refugiados e deslocados tem origem na América Latina, em países como Venezuela, Colômbia e Cuba.", "B": "neste início de século XXI, os problemas ambientais pelo aquecimento global tornaram-se a principal causa dos movimentos.", "C": "as guerras, os conflitos étnicos e as violações aos direitos humanos são os principais fatores responsáveis pelos movimentos.", "D": "a pandemia e a fraca atuação de organizações como a OMS e a ONU contribuíram para o forte aumento dos movimentos."}, {"num": 48, "mat": "Ciências Humanas", "enunciado": "[Gráfico: Exportações mundiais 2000-2019 — Manufaturas dominantes, Combustíveis e Produtos agrícolas em declínio]\n\nA leitura do gráfico permite afirmar que", "A": "os novos países industrializados da Europa Oriental e da América têm dinamizado as exportações de manufaturados.", "B": "as ações da OPEP têm ampliado a comercialização de combustíveis.", "C": "a partir dos anos de 2010, o comércio mundial e as exportações mantiveram-se em forte estabilidade.", "D": "embora sejam fundamentais para a economia, as commodities têm menor valorização que os artigos manufaturados."}, {"num": 49, "mat": "Ciências Humanas", "enunciado": "O movimento de independência da América espanhola relacionou-se intimamente aos acontecimentos internacionais.\n\nEntre tais 'acontecimentos internacionais', é correto citar", "A": "a Unificação da Itália.", "B": "o fim da União Ibérica.", "C": "as Guerras Napoleônicas.", "D": "a Guerra dos Trinta Anos."}, {"num": 50, "mat": "Ciências Humanas", "enunciado": "O governo incentivou a produção de automóveis com capitais privados. As multinacionais, como Willys Overland, Ford, Volkswagen e General Motors, concentraram-se no ABC paulista.\n\nO texto faz referência ao governo do presidente", "A": "Getúlio Vargas.", "B": "Juscelino Kubitschek.", "C": "Jânio Quadros.", "D": "João Goulart."}];

let modo='feedback',resp={},qat=0;

function selModo(m,b){modo=m;document.querySelectorAll('.mb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');}
function iniciar(){
  resp={};qat=0;
  document.getElementById('t-intro').classList.remove('ativa');
  document.getElementById('hdr').style.display='block';
  document.getElementById('bbar').style.display='block';
  aba('quiz');renderQ();renderNav();renderGab();
}
function aba(t){
  ['quiz','gab','res'].forEach(x=>{document.getElementById('t-'+x).classList.remove('ativa');document.getElementById('tab-'+x).classList.remove('at');});
  document.getElementById('t-'+t).classList.add('ativa');
  document.getElementById('tab-'+t).classList.add('at');
  window.scrollTo({top:0,behavior:'smooth'});
  if(t==='res')renderRes();
  if(t==='gab')renderGab();
}
function matName(n){
  if(n<=10)return'Língua Portuguesa';
  if(n<=15)return'Literatura';
  if(n<=20)return'História';
  if(n<=25)return'Geografia';
  if(n<=30)return'Ciências/Biologia';
  if(n<=40)return'Matemática';
  if(n<=45)return'Física/Química';
  return'Ciências Humanas';
}
function renderQ(){
  const q=QS[qat];
  if(!q)return;
  const tot=QS.length;
  document.getElementById('pf').style.width=(((qat+1)/tot)*100).toFixed(0)+'%';
  document.getElementById('hs').textContent='Questão '+(qat+1)+' de '+tot;
  
  const corr=GAB[String(q.num)];
  const ru=resp[q.num];
  const res=ru!==undefined;
  const fb=modo==='feedback';
  
  // Get image for this question - prefer cropped, fallback to full page
  let imgsHtml='';
  const cropImg=QIMGS[String(q.num)];
  if(cropImg){
    imgsHtml='<div class="pimg"><img src="data:image/jpeg;base64,'+cropImg+'" style="width:100%;display:block;border-radius:8px" loading="lazy"></div>';

  }
  
  const alts=['A','B','C','D'].map(l=>{
    let cls='alt';
    if(res&&fb){if(l===corr)cls+=' ok';else if(l===ru)cls+=' er';}
    else if(res&&l===ru)cls+=' sel';
    return`<button class="${cls}" ${res?'disabled':''} onclick="answer(${q.num},'${l}')">
      <span class="altl">${l}</span><span class="altt">${q[l]}</span>
    </button>`;
  }).join('');
  
  let fbHtml='';
  if(res&&fb){
    const ok=ru===corr;
    fbHtml=`<div class="fb ${ok?'ok':'er'}">${ok?'✅ Resposta correta!':'❌ Gabarito: <strong>'+corr+'</strong>'}</div>`;
  }
  
  document.getElementById('qcon').innerHTML=`
    ${imgsHtml}
    <div class="qcard">
      <div class="qhdr">
        <span class="qbadge">Q${String(q.num).padStart(2,'0')}</span>
        <span class="qmat">${q.mat||matName(q.num)}</span>
      </div>
      <div class="qbody">
        <div class="qen">${q.enunciado}</div>
        <div class="alts">${alts}</div>
        ${fbHtml}
        <div class="qac" style="display:${res?'flex':'none'}">
          <button class="bant" onclick="goQ(${qat-1})" ${qat===0?'disabled':''}>← Anterior</button>
          <button class="bprx" onclick="next()">${qat<QS.length-1?'Próxima →':'🏆 Resultado'}</button>
        </div>
      </div>
    </div>`;
  
  // Scroll nav dot into view
  const dot=document.getElementById('nd-'+qat);
  if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderNav(){
  document.getElementById('nav').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num];
    let cls='nd';
    if(i===qat)cls+=' at';
    else if(r!==undefined)cls+=r===GAB[String(q.num)]?' ok':' er';
    return`<button class="${cls}" id="nd-${i}" onclick="goQ(${i})">${q.num}</button>`;
  }).join('');
}

function renderGab(){
  let ce=0,er=0;
  document.getElementById('gbgrid').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num],c=GAB[String(q.num)];
    let cls='gi';
    if(r!==undefined){if(r===c){cls+=' ok';ce++;}else{cls+=' er';er++;}}
    return`<div class="${cls}" onclick="goQ(${i});aba('quiz')">
      <span class="giq">${String(q.num).padStart(2,'0')}</span>
      <span class="gil">${c}</span>
    </div>`;
  }).join('');
  document.getElementById('gbpl').textContent=ce+' ✅  '+er+' ❌';
}

function renderRes(){
  let ce=0,er=0,nr=0;
  QS.forEach(q=>{const r=resp[q.num];if(r===undefined)nr++;else if(r===GAB[String(q.num)])ce++;else er++;});
  const tot=QS.length,pct=Math.round(ce/tot*100);
  document.getElementById('rsc').textContent=ce;
  document.getElementById('rpt').textContent='de '+tot+' questões';
  document.getElementById('rce').textContent=ce;
  document.getElementById('rer').textContent=er;
  document.getElementById('rnr').textContent=nr;
  document.getElementById('rpct').textContent=pct+'%';
  const msgs=['🔥 Não desista! Pratique mais com outras provas.','📖 Continue estudando! Revise as questões erradas.','💪 Bom resultado! Continue praticando!','🎉 Excelente! Você está muito bem preparado!'];
  document.getElementById('rmsg').textContent=msgs[pct>=80?3:pct>=60?2:pct>=40?1:0];
}

function answer(num,l){
  if(resp[num]!==undefined)return;
  resp[num]=l;
  renderQ();renderNav();renderGab();
}
function goQ(i){
  if(i<0||i>=QS.length)return;
  qat=i;renderQ();renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){if(qat<QS.length-1)goQ(qat+1);else aba('res');}
function refazer(){resp={};qat=0;aba('quiz');renderQ();renderNav();renderGab();}
function voltarIntro(){
  document.getElementById('bbar').style.display='none';
  document.getElementById('hdr').style.display='none';
  ['quiz','gab','res'].forEach(x=>document.getElementById('t-'+x).classList.remove('ativa'));
  document.getElementById('t-intro').classList.add('ativa');
  resp={};qat=0;
}
</script>
