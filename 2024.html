<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CTI 2024 – Vestibulinho</title>
<style>
:root{--az:#1a3a6b;--az2:#2563eb;--az3:#eff6ff;--ve:#16a34a;--ve2:#dcfce7;--vm:#dc2626;--vm2:#fee2e2;--am:#d97706;--am2:#fef3c7;--bg:#f1f5f9;--cd:#fff;--bd:#e2e8f0;--tx:#1e293b;--t2:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
/* HEADER */
#hdr{background:var(--az);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hb{background:#fff;color:var(--az);font-weight:800;font-size:14px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:14px;font-weight:700}.hs{font-size:11px;color:#93c5fd}
.prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.pf{height:100%;background:#60a5fa;border-radius:2px;transition:width .4s}
/* NAV DOTS */
.nav{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;background:var(--cd);border-bottom:1px solid var(--bd);scrollbar-width:none;position:sticky;top:62px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nd{min-width:28px;height:28px;border-radius:7px;border:2px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;font-family:monospace;transition:all .15s}
.nd.at{border-color:var(--az2);background:var(--az2);color:#fff}
.nd.ok{border-color:var(--ve);background:var(--ve2);color:var(--ve)}
.nd.er{border-color:var(--vm);background:var(--vm2);color:var(--vm)}
/* SCREENS */
.tela{display:none}.ativa{display:block}
/* INTRO */
#t-intro{padding:20px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:20px;padding:24px 20px;margin-bottom:20px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;color:#bfdbfe;line-height:1.5}
.hstats{display:flex;gap:10px;margin-top:12px}
.hst{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hst-n{font-size:18px;font-weight:800}.hst-l{font-size:10px;color:#93c5fd}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mgrid{display:grid;gap:9px;margin-bottom:20px}
.mb{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.mb.sel{border-color:var(--az2);background:var(--az3)}
.mi{font-size:22px;flex-shrink:0}.mn{font-size:14px;font-weight:700}.md{font-size:11px;color:var(--t2)}
.btn-in{width:100%;padding:14px;border:none;border-radius:14px;background:var(--az2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);font-family:inherit}
.btn-in:active{transform:scale(.97)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--az2);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 16px;font-family:inherit}
/* QUIZ */
#t-quiz{padding-bottom:90px}
.qwrap{max-width:600px;margin:0 auto;padding:14px 14px 0}
/* PAGE IMAGE */
.pimg{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pimg img{width:100%;display:block}
.pimg-lbl{background:var(--az);color:#fff;font-size:11px;font-weight:700;padding:6px 12px;display:flex;align-items:center;gap:6px}
/* QUESTION CARD */
.qcard{background:var(--cd);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;animation:fu .2s ease;margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qhdr{background:var(--az);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.qbadge{background:rgba(255,255,255,.18);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;font-family:monospace}
.qmat{font-size:11px;color:#93c5fd}
.qbody{padding:14px}
.qen{font-size:13.5px;line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.alts{display:flex;flex-direction:column;gap:7px}
.alt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s;text-align:left;width:100%;-webkit-user-select:none}
.alt:active{transform:scale(.98)}
.altl{min-width:26px;height:26px;border-radius:7px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;transition:all .15s}
.altt{font-size:13px;line-height:1.5;padding-top:3px}
.alt.sel{border-color:var(--az2);background:var(--az3)}.alt.sel .altl{background:var(--az2);color:#fff}
.alt.ok{border-color:var(--ve);background:var(--ve2)}.alt.ok .altl{background:var(--ve);color:#fff}
.alt.er{border-color:var(--vm);background:var(--vm2)}.alt.er .altl{background:var(--vm);color:#fff}
.alt:disabled{cursor:default}
.fb{margin:10px 0 0;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px}
.fb.ok{background:var(--ve2);color:var(--ve);display:flex}
.fb.er{background:var(--vm2);color:var(--vm);display:flex}
.qac{padding:10px 0 4px;display:flex;gap:8px}
.bant,.bprx{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.bant:active,.bprx:active{transform:scale(.97)}
.bant{background:var(--bg);border:2px solid var(--bd);color:var(--tx)}
.bprx{background:var(--az2);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3)}
/* GAB */
#t-gab{padding:14px 14px 90px;max-width:600px;margin:0 auto}
.gbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbpl{font-size:13px;font-weight:700;color:var(--az)}
.gbgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--cd);border-radius:16px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gi{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:9px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s}
.gi.ok{border-color:var(--ve);background:var(--ve2)}.gi.er{border-color:var(--vm);background:var(--vm2)}
.giq{font-size:10px;font-weight:700;color:var(--t2);font-family:monospace}
.gil{font-size:15px;font-weight:800;color:var(--az);font-family:monospace}
.gi.ok .giq,.gi.ok .gil{color:var(--ve)}.gi.er .giq,.gi.er .gil{color:var(--vm)}
/* RES */
#t-res{padding:14px 14px 90px;max-width:480px;margin:0 auto}
.rhero{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
.rsc{font-size:52px;font-weight:800;line-height:1}.rde{font-size:14px;color:#93c5fd;margin-bottom:4px}
.rpt{font-size:22px;font-weight:700;color:#60a5fa}.rmsg{font-size:13px;color:#bfdbfe;margin-top:8px;line-height:1.4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--cd);border-radius:13px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stn{font-size:26px;font-weight:800}.stl{font-size:11px;color:var(--t2);font-weight:600}
.cv{color:var(--ve)}.cm{color:var(--vm)}.ca{color:var(--am)}.caz{color:var(--az)}
.bref{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;transition:all .15s}
.bref:active{transform:scale(.97)}
.bref.p{background:var(--az2);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bref.s{background:var(--bg);color:var(--az);border:2px solid var(--az2)}
/* BOTTOM */
#bbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-top:1px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 10px rgba(0,0,0,.07);z-index:100}
.bbi{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0;font-size:10px;font-weight:600;color:var(--t2);font-family:inherit}
.tab.at{color:var(--az2)}.tabi{font-size:19px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}
/* INDEX LINK */
.idx-link{display:block;text-align:center;padding:10px;color:var(--t2);font-size:12px;text-decoration:none;margin-top:8px}
</style>
</head>
<body>

<div id="hdr" style="display:none">
  <div class="hr">
    <div class="hb">CTI</div>
    <div><div class="ht">Vestibulinho 2024</div><div class="hs" id="hs">Prova 2024</div></div>
  </div>
  <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
</div>

<!-- INTRO -->
<div id="t-intro" class="tela ativa">
  <div class="hero">
    <h1>📚 Prova 2024</h1>
    <p>Vestibulinho Unificado CTI — Colégio Técnico Industrial</p>
    <div class="hstats">
      <div class="hst"><div class="hst-n">50</div><div class="hst-l">questões</div></div>
      <div class="hst"><div class="hst-n">5</div><div class="hst-l">matérias</div></div>
      <div class="hst"><div class="hst-n">4h</div><div class="hst-l">duração</div></div>
    </div>
  </div>
  <div class="slbl">Modo de estudo</div>
  <div class="mgrid">
    <button class="mb sel" onclick="selModo('feedback',this)">
      <span class="mi">⚡</span>
      <div><div class="mn">Feedback imediato</div><div class="md">Veja se acertou logo após responder</div></div>
    </button>
    <button class="mb" onclick="selModo('simulado',this)">
      <span class="mi">🎯</span>
      <div><div class="mn">Modo simulado</div><div class="md">Responda tudo e veja resultado no final</div></div>
    </button>
  </div>
  <button class="btn-in" onclick="iniciar()">Iniciar prova 2024 →</button>
  <a href="index.html" class="idx-link">← Voltar para todas as provas</a>
</div>

<!-- QUIZ -->
<div id="t-quiz" class="tela">
  <div class="nav" id="nav"></div>
  <div class="qwrap" id="qcon"></div>
</div>

<!-- GABARITO -->
<div id="t-gab" class="tela">
  <div class="gbtop">
    <div class="slbl" style="margin:0">Gabarito Oficial 2024</div>
    <div class="gbpl" id="gbpl"></div>
  </div>
  <div class="gbgrid" id="gbgrid"></div>
</div>

<!-- RESULTADO -->
<div id="t-res" class="tela">
  <div class="rhero">
    <div class="rde">Você acertou</div>
    <div class="rsc" id="rsc">0</div>
    <div class="rpt" id="rpt">de 50 questões</div>
    <div class="rmsg" id="rmsg"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stn cv" id="rce">0</div><div class="stl">✅ Certas</div></div>
    <div class="stat"><div class="stn cm" id="rer">0</div><div class="stl">❌ Erradas</div></div>
    <div class="stat"><div class="stn ca" id="rnr">0</div><div class="stl">⬜ Não respondidas</div></div>
    <div class="stat"><div class="stn caz" id="rpct">0%</div><div class="stl">📊 Aproveitamento</div></div>
  </div>
  <button class="bref p" onclick="refazer()">🔄 Refazer esta prova</button>
  <button class="bref s" onclick="voltarIntro()">🏠 Menu inicial</button>
</div>

<div id="bbar">
  <div class="bbi">
    <button class="tab at" id="tab-quiz" onclick="aba('quiz')"><span class="tabi">📝</span>Quiz</button>
    <button class="tab" id="tab-gab" onclick="aba('gab')"><span class="tabi">📋</span>Gabarito</button>
    <button class="tab" id="tab-res" onclick="aba('res')"><span class="tabi">🏆</span>Resultado</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const QS=[{"num": 1, "mat": "Língua Portuguesa", "enunciado": "[Imagem: Cartaz 'Quem ama, vacina' — incentivo à vacinação de crianças e adolescentes menores de 15 anos]\n\nO objetivo da campanha é", "A": "convocar as crianças e adolescentes a buscarem novas cadernetas de vacinação.", "B": "patrocinar um programa de televisão sobre saúde de crianças e adolescentes.", "C": "incentivar a vacinação de crianças e adolescentes com menos de 15 anos.", "D": "incentivar a interação entre crianças e adolescentes, promovendo a amizade."}, {"num": 2, "mat": "Língua Portuguesa", "enunciado": "Texto 'A cidade voraz' (Pepetela): relato sobre o amanhecer agitado de uma cidade africana, com pessoas se deslocando dos bairros periféricos ao centro.\n\nAo relatar o amanhecer na cidade, o narrador enfatiza", "A": "as dificuldades que impossibilitam muitas pessoas de saírem de suas casas.", "B": "a dinamicidade desse momento, que integra rapidamente pessoas e lugares.", "C": "a preocupação das autoridades governamentais com o transporte público.", "D": "as distrações humanas no percurso feito de suas casas até chegarem ao centro."}, {"num": 3, "mat": "Língua Portuguesa", "enunciado": "[Texto 'A cidade voraz']\n\nAs passagens do texto permitem, correta e respectivamente, as seguintes interpretações:", "A": "Os moradores de Viana são felizes por poderem usar o trem. A cidade desperta como um bicho frágil e desprotegido.", "B": "Os moradores de Viana têm pouco interesse pelo trem. A cidade acorda lentamente, como um animal preguiçoso.", "C": "Os moradores de Viana sofrem bastante ao usarem o trem. A cidade torna-se perigosa depois que começa a despertar.", "D": "Os moradores de Viana têm o privilégio de usar o trem. A cidade vive a agitação de seus cidadãos ao amanhecer."}, {"num": 4, "mat": "Língua Portuguesa", "enunciado": "A preposição destacada expressa sentido de causa em:", "A": "As pessoas, estremunhadas, muitas sem a cara lavada por falta de água nas casas...", "B": "... convergindo para o centro, onde há trabalho ou possibilidade de um negócio.", "C": "Vêm muitos a pé, de carro individual ou, sobretudo, de candongueiro, os táxis coletivos...", "D": "Gente com dinheiro para ter carro e talvez uma vivenda, mas sem tempo para viver..."}, {"num": 5, "mat": "Língua Portuguesa", "enunciado": "Emprega-se uma hipérbole para caracterizar a cidade na seguinte passagem:", "A": "A cidade fervilha, mesmo antes de o dia nascer.", "B": "... avançam dos bairros periféricos, das novas urbanizações...", "C": "... mas sem tempo para viver, perdida no trânsito.", "D": "A cidade é um bicho vivo, cada vez mais desperto."}, {"num": 6, "mat": "Língua Portuguesa", "enunciado": "Nos textos literários, a inversão entre sujeito simples e verbo é comum. No primeiro parágrafo, em oração com verbo intransitivo, ocorre em:", "A": "As pessoas, estremunhadas, [...] avançam dos bairros periféricos...", "B": "... onde há trabalho ou possibilidade de um negócio.", "C": "Vêm muitos a pé, de carro individual ou, sobretudo, de candongueiro...", "D": "... as mulheres tentam disfarçar outros odores."}, {"num": 7, "mat": "Língua Portuguesa", "enunciado": "[Tira: Professor Rocha diz que virou hipster e acabou com crise de autoestima. Aluno responde: 'Só que pintou a maior crise de identidade!']\n\nNa frase do último quadro, o termo 'pintou' significa", "A": "escondeu, confere contradição ao diálogo e permite concluir que o professor tinha medo de conversas.", "B": "aconteceu, confere seriedade ao diálogo e permite concluir que o professor tinha crises de identidade.", "C": "flagrou, confere duplo sentido ao diálogo e permite concluir que o professor tinha orgulho exagerado.", "D": "surgiu, confere informalidade ao diálogo e permite concluir que o professor tinha baixa autoestima."}, {"num": 8, "mat": "Língua Portuguesa", "enunciado": "A palavra que flexiona no feminino e no plural seguindo as mesmas regras do substantivo 'professor' é:", "A": "ator.", "B": "senador.", "C": "arrumador.", "D": "imperador."}, {"num": 9, "mat": "Língua Portuguesa", "enunciado": "Texto 'Amazônia vive seca devastadora: Natureza não tem tempo de se adaptar' — sobre a seca na Amazônia causada pelo aquecimento do Atlântico Tropical Norte.\n\nO objetivo do texto é", "A": "informar a atual situação climática na Amazônia devido ao aquecimento excessivo do oceano Atlântico Tropical Norte.", "B": "apresentar a opinião do coordenador-geral de Ciências da Terra do Inpe, que prevê desastres ambientais na Amazônia.", "C": "alertar a população sobre a possibilidade de haver uma seca severa na Amazônia, devido ao fenômeno El Niño.", "D": "relatar a recuperação da Amazônia depois de uma seca histórica e devastadora, decorrente do aquecimento oceânico."}, {"num": 10, "mat": "Língua Portuguesa", "enunciado": "[Charge: Sol escaldante no Rio Amazonas com peixes pedindo 'Água... água...']\n\nComparando a charge às informações do texto, conclui-se que ela", "A": "contradiz a ideia nele exposta.", "B": "ameniza a situação nele tratada.", "C": "confirma o fato nele noticiado.", "D": "expõe ideias incoerentes com ele."}, {"num": 11, "mat": "Língua Portuguesa", "enunciado": "No título – Amazônia vive seca devastadora: 'Natureza não tem tempo de se adaptar' –, as formas verbais destacadas retratam uma situação", "A": "do tempo passado, já concluída.", "B": "do tempo presente, em processo.", "C": "do futuro próximo, hipotética.", "D": "do tempo passado, inconclusa."}, {"num": 12, "mat": "Língua Portuguesa", "enunciado": "Na passagem – O El Niño, porém, tende a ganhar mais intensidade, com pico em dezembro... –, a conjunção destacada pode ser substituída por", "A": "pois.", "B": "também.", "C": "portanto.", "D": "entretanto."}, {"num": 13, "mat": "Língua Portuguesa", "enunciado": "A concordância nominal e a concordância verbal atendem à norma-padrão em:", "A": "O pico de intensidade do El Niño será em dezembro, e poderá haver impactos preocupantes para além da região Norte.", "B": "Ocorre impactos ambientais a leste e norte da região amazônica por influência do El Niño, não ao sul e sudoeste.", "C": "No estado do Amazonas, soma-se 24 municípios que estão em situação de emergência, e outros 34 estão alertas.", "D": "O aquecimento do Atlântico e o El Niño corresponde a uma combinação indesejáveis para o semiárido nordestino."}, {"num": 14, "mat": "Língua Portuguesa", "enunciado": "A quem se _____ a entender a seca na Amazônia, convém ouvir as explicações de Gilvan Sampaio e _____, chegando _____ própria conclusão sobre a situação e tendo _____ mais complexas sobre ela.\n\nAs lacunas devem ser preenchidas, respectivamente, com:", "A": "dispor ... analisar elas ... a ... idéias", "B": "dispuser ... analisá-las ... à ... ideias", "C": "dispôr ... analisá-las ... a ... ideias", "D": "dispuzer ... analisar-lhes ... à ... idéias"}, {"num": 15, "mat": "Língua Portuguesa", "enunciado": "O predicado nominal apresenta descrição de uma situação em", "A": "... há um aquecimento elevado das águas do oceano Atlântico Tropical Norte...", "B": "O fenômeno causa impactos a leste e norte da região amazônica, não ao sul e sudoeste...", "C": "O El Niño, porém, tende a ganhar mais intensidade, com pico em dezembro...", "D": "... 'essa também é a pior combinação para o semiárido nordestino'..."}, {"num": 16, "mat": "Matemática", "enunciado": "Um número inteiro adicionado ao seu consecutivo e ao quádruplo desse número tem como resultado 181. O dobro desse número é", "A": "60.", "B": "70.", "C": "80.", "D": "90."}, {"num": 17, "mat": "Matemática", "enunciado": "De uma prova, 1/4 das questões foram classificadas como difíceis, 1/3 de nível médio e as restantes fáceis. Havia 4 questões de nível médio a mais que difíceis. O número de questões difíceis era", "A": "10.", "B": "12.", "C": "14.", "D": "16."}, {"num": 18, "mat": "Matemática", "enunciado": "Um veículo de entregas foi carregado com 300 caixas. 72 foram entregues ao cliente Alfa, e as restantes repartidas entre Beta e Gama. Beta ficou com 16 caixas a mais que Gama.\n\nBeta recebeu", "A": "106 caixas.", "B": "112 caixas.", "C": "118 caixas.", "D": "122 caixas."}, {"num": 19, "mat": "Matemática", "enunciado": "Em uma folha quadrada de 24 cm de lado, foram desenhados quadradinhos de 6 cm de lado que preencheram 25% da área total da folha.\n\nO número de quadradinhos desenhados foi", "A": "6.", "B": "5.", "C": "4.", "D": "3."}, {"num": 20, "mat": "Matemática", "enunciado": "30% da capacidade do tanque do veículo X corresponde a 40% da capacidade do tanque do veículo Y. A capacidade do tanque do veículo Y corresponde, da capacidade do tanque do veículo X, a", "A": "80%.", "B": "75%.", "C": "70%.", "D": "65%."}, {"num": 21, "mat": "Matemática", "enunciado": "5 máquinas de mesmo rendimento trabalham simultaneamente. Cada máquina demora 2 minutos e 30 segundos para produzir uma unidade. Para produzir um lote com 900 unidades, as máquinas devem trabalhar durante", "A": "7 horas e 30 minutos.", "B": "6 horas e 40 minutos.", "C": "6 horas e 20 minutos.", "D": "5 horas e 30 minutos."}, {"num": 22, "mat": "Matemática", "enunciado": "O preço de um produto na loja A era 12% menor que na loja B e 10% maior que na loja C. Se o preço na loja C era R$ 600,00, então o preço na loja B era igual a", "A": "R$ 650,00.", "B": "R$ 700,00.", "C": "R$ 750,00.", "D": "R$ 800,00."}, {"num": 23, "mat": "Matemática", "enunciado": "Se x, y e z são números racionais tais que z = (xy + 2y + 3x + 6) / (x² – 4), sendo x ≠ ±2, o valor de z para x = 12 e y = –8 é", "A": "+1,2.", "B": "+0,5.", "C": "–0,5.", "D": "–1,2."}, {"num": 24, "mat": "Matemática", "enunciado": "Tabela: R1 = x litros, R2 = triplo de R1, R3 = dobro de R2. Capacidade total = 5400 litros. A diferença entre R3 e R1 é", "A": "2 100 litros.", "B": "2 300 litros.", "C": "2 500 litros.", "D": "2 700 litros."}, {"num": 25, "mat": "Matemática", "enunciado": "Simplificando (x² – y²)/(x + y) · y/(x + y), sendo x = 1300 e y = 1200, o valor numérico é", "A": "12.", "B": "18.", "C": "36.", "D": "48."}, {"num": 26, "mat": "Matemática", "enunciado": "[Figura: Hexágono regular ABCDEF com triângulo ABF, ângulos f e b]\n\nSabe-se que a soma dos ângulos internos de um polígono com n lados é (n–2)·180°. A soma dos ângulos f e b do triângulo AFB é", "A": "80°.", "B": "60°.", "C": "50°.", "D": "40°."}, {"num": 27, "mat": "Matemática", "enunciado": "Considere A = (–1–0,5)/(1–0,5) e B = (0,2+1)/(1–0,2). O quociente A/B é igual a", "A": "–2.", "B": "–1.", "C": "+ 1.", "D": "+ 2."}, {"num": 28, "mat": "Matemática", "enunciado": "A fração x/y é equivalente a 3/5. Subtraindo 5 do denominador, ela se torna equivalente a 3/4. Desse modo, x + y é igual a", "A": "25.", "B": "30.", "C": "35.", "D": "40."}, {"num": 29, "mat": "Matemática", "enunciado": "[Figura: Retângulo ABCD de área 192 cm², comprimento supera largura em 4 cm. Pontos médios dos lados formam o quadrilátero EFGH]\n\nO perímetro do quadrilátero EFGH é", "A": "48 cm.", "B": "45 cm.", "C": "40 cm.", "D": "30 cm."}, {"num": 30, "mat": "Matemática", "enunciado": "Capital C1 aplicado por 7 meses a 0,65% a.m. de juros simples, rendeu R$ 910,00 de juros. C1 é igual a", "A": "R$ 18.000,00.", "B": "R$ 20.000,00.", "C": "R$ 22.000,00.", "D": "R$ 24.000,00."}, {"num": 31, "mat": "Ciências Naturais", "enunciado": "O Ministério da Saúde estabelece um calendário de vacinações. Quando uma pessoa toma a vacina contra a", "A": "AIDS, o seu organismo produz antibióticos contra a bactéria responsável pela doença.", "B": "doença de Chagas, o seu organismo produz antígenos contra o verme responsável pela doença.", "C": "febre amarela, o seu organismo produz anticorpos contra o vírus responsável pela doença.", "D": "dengue, o seu organismo produz toxinas contra o protozoário responsável pela doença."}, {"num": 32, "mat": "Ciências Naturais", "enunciado": "[Gráfico climático: temperatura estável (~25°C) e precipitação elevada o ano todo, sem estação seca]\n\nDe acordo com os dados, essa cidade se localiza em região onde é encontrada", "A": "a floresta amazônica.", "B": "a floresta de araucária.", "C": "o cerrado.", "D": "a caatinga."}, {"num": 33, "mat": "Ciências Naturais", "enunciado": "[Figuras 1 e 2: DIU e diafragma]\n\nConsiderando o modo de ação dos métodos contraceptivos apresentados, é correto afirmar que", "A": "1 e 2 protegem contra ISTs.", "B": "2 é um método de barreira.", "C": "2 é um método comportamental.", "D": "1 é um método definitivo."}, {"num": 34, "mat": "Ciências Naturais", "enunciado": "[Figura: Diagrama dos 5 Reinos com seres vivos numerados 1 a 5]\n\nÉ correto afirmar que os seres vivos classificados em", "A": "1 e 2 podem atuar como consumidores.", "B": "2 e 4 podem atuar como herbívoros.", "C": "2 e 3 podem atuar como produtores.", "D": "3 e 5 podem atuar como decompositores."}, {"num": 35, "mat": "Ciências Naturais", "enunciado": "[Gráfico: internações por doenças respiratórias em Cubatão 2010-2020, com pico em 2014 e queda em 2015-2016]\n\nA quantidade de material particulado na atmosfera de Cubatão", "A": "aumentou entre 2012 e 2013.", "B": "diminuiu entre 2014 e 2016.", "C": "aumentou entre 2015 e 2016.", "D": "ficou inalterado entre 2017 e 2020."}, {"num": 36, "mat": "Ciências Naturais", "enunciado": "[Figura: Intestino delgado com microvilosidades]\n\nAs microvilosidades são modificações de uma estrutura celular denominada", "A": "membrana plasmática, e possibilitam a absorção de substâncias.", "B": "parede celular, e impedem a passagem de determinadas substâncias.", "C": "membrana nuclear, e apresentam permeabilidade seletiva.", "D": "retículo endoplasmático, e fazem a distribuição de substâncias no citoplasma."}, {"num": 37, "mat": "Ciências Naturais", "enunciado": "Segundo a Secretaria do Meio Ambiente do Estado de SP, 1 tonelada de papel reciclado evita o corte de 15 a 20 árvores e economiza 50% de energia elétrica. No caso do papel, é possível reciclar", "A": "jornais e etiquetas adesivas.", "B": "envelopes e guardanapos.", "C": "folhas de caderno e revistas.", "D": "caixas de papelão e fita crepe."}, {"num": 38, "mat": "Ciências Naturais", "enunciado": "Uma das etapas da produção do etanol a partir da cana é a fermentação: microrganismos fermentam o açúcar do melaço, originando o mosto (mistura de álcool e diversas substâncias). O processo de separação do álcool é", "A": "filtração.", "B": "destilação.", "C": "centrifugação.", "D": "decantação."}, {"num": 39, "mat": "Ciências Naturais", "enunciado": "As cerâmicas porosas apresentam alta permeabilidade, baixa densidade e grande área superficial interna. Um uso de cerâmica porosa no cotidiano tem como exemplo", "A": "o piso utilizado nas residências.", "B": "o azulejo de revestimento de paredes.", "C": "a peça utilizada para filtrar água.", "D": "a xícara onde é servido o café."}, {"num": 40, "mat": "Ciências Naturais", "enunciado": "Um relatório da ONU em 2022 destaca o papel da poluição do solo por resíduos eletrônicos. Para evitar maior contaminação do solo de acordo com os ODS, é a prática de", "A": "reduzir, doando o aparelho que funciona para outra pessoa.", "B": "reciclar, vendendo o aparelho para lojas que irão fazer a sua revenda.", "C": "reutilizar, eliminando pequenas peças do aparelho em locais diferentes.", "D": "restaurar, utilizando o aparelho para uma outra finalidade."}, {"num": 41, "mat": "Ciências Naturais", "enunciado": "Querosenes utilizados em aviação são obtidos a partir de óleos vegetais, fermentação de açúcares e tratamento químico de álcoois. Esse tipo de querosene é considerado", "A": "um combustível obtido a partir de fontes não renováveis.", "B": "uma forma poluente de obtenção de energia renovável.", "C": "uma biomassa produzida com matéria prima não renovável.", "D": "um biocombustível obtido a partir de fonte renovável."}, {"num": 42, "mat": "Ciências Naturais", "enunciado": "[Figura: Energia solar atingindo a atmosfera e superfície da Terra, com processos numerados 1 a 7]\n\nOs processos de transformação da energia solar em calor na superfície da Terra, transferência de calor para a superfície e para a atmosfera estão indicados, respectivamente, pelos números", "A": "4, 1 e 7.", "B": "2, 4 e 6.", "C": "7, 3 e 5.", "D": "3, 6 e 1."}, {"num": 43, "mat": "Ciências Naturais", "enunciado": "Sobre as experiências com misturas: 1–ácido clorídrico + hidróxido de sódio → cloreto de sódio; 2–água + açúcar → solução aquosa; 3–iodeto de potássio + nitrato de chumbo → nitrato de potássio + iodeto de chumbo sólido; 4–limalha de ferro + água → limalha depositada no fundo.\n\nÉ correto afirmar que em", "A": "1 ocorreu reação química que originou uma mistura homogênea.", "B": "2 ocorreu reação química que originou uma mistura heterogênea.", "C": "3 não ocorreu reação química e a mistura formada é homogênea.", "D": "4 ocorreu reação química que originou uma mistura heterogênea."}, {"num": 44, "mat": "Ciências Naturais", "enunciado": "Um veículo se desloca com velocidade constante de 40 km/h entre os pontos A e B. Demorou 30 minutos para percorrer essa distância.\n\nEssa distância, em km, é igual a", "A": "12.", "B": "20.", "C": "30.", "D": "60."}, {"num": 45, "mat": "Ciências Naturais", "enunciado": "[Figura: Veículo deslocando-se de A a B a v=40 km/h]\n\nConforme as experiências descritas na questão anterior (44), é correto afirmar que em", "A": "1 ocorreu reação química que originou uma mistura homogênea.", "B": "2 ocorreu reação química que originou uma mistura heterogênea.", "C": "3 não ocorreu reação química e a mistura formada é homogênea.", "D": "4 ocorreu reação química que originou uma mistura heterogênea."}, {"num": 46, "mat": "Ciências Humanas", "enunciado": "[Mapa: Anamorfose geográfica mostrando países com tamanho proporcional ao PIB — EUA, China e países europeus são os maiores]\n\nA anamorfose mostra o tamanho", "A": "do contingente de trabalhadores da zona rural de cada país.", "B": "da população adulta de cada país.", "C": "do produto interno bruto (PIB), ou seja, da riqueza econômica de cada país, com maior destaque nos países que lideram a globalização econômica.", "D": "da população imigrante acolhida em cada país."}, {"num": 47, "mat": "Ciências Humanas", "enunciado": "[Gráfico: 10 principais estados produtores do agronegócio brasileiro em 2022, com MT, PR e SP no topo]\n\nDa leitura do gráfico, é correto concluir que", "A": "a soja e a cana-de-açúcar são os produtos mais rentáveis do agronegócio.", "B": "as limitações climáticas impedem o Norte de desenvolver o agronegócio.", "C": "a principal atividade econômica na região Sudeste é o agronegócio.", "D": "o agronegócio é mais concentrado no Centro-Oeste e no Sul."}, {"num": 48, "mat": "Ciências Humanas", "enunciado": "A NASA divulgou imagens (22.06.2023) mostrando o retorno do El Niño.\n\nSobre o El Niño, é correto afirmar que é um fenômeno", "A": "temporário que caracteriza-se pelo rápido resfriamento das águas do oceano Atlântico e gera aumento das secas no semiárido nordestino.", "B": "que tem origem no aquecimento das águas do Pacífico e provoca alterações climáticas no Brasil, dentre as quais o aumento das chuvas na região Sul.", "C": "frequente na primavera e verão que gera aquecimento das águas do oceano Atlântico e influencia nas condições de pluviosidade do Sudeste.", "D": "com origem nas baixas latitudes do oceano Pacífico que tem suas águas aquecidas provocando a redução das chuvas nas regiões Sul e Centro-Oeste."}, {"num": 49, "mat": "Ciências Humanas", "enunciado": "A República Jacobina (02.06.1793/27.07.1794), com Robespierre à frente, instaurou um governo 'revolucionário até a paz'. Nesse contexto da Revolução Francesa, é correto afirmar que", "A": "os revolucionários tornaram-se, gradativamente, mais moderados e houve uma forte defesa dos interesses da burguesia.", "B": "o acordo político entre forças aristocráticas e democráticas foi rompido e o direito ao voto seria apenas dos proprietários.", "C": "o processo revolucionário foi radicalizado, com a abolição da escravidão nas colônias e o fim da obrigatoriedade de indenizar antigos senhores.", "D": "medidas legais foram tomadas para restaurar a sociedade do Antigo Regime, com o reestabelecimento dos Três Estados."}, {"num": 50, "mat": "Ciências Humanas", "enunciado": "O Ato Institucional nº 5 (AI-5), baixado em dezembro de 1968, durou até o início de 1979.\n\nO AI-5, imposto durante a Ditadura Militar no Brasil,", "A": "ampliou as atribuições do Poder Legislativo e limitou as ações do Poder Executivo.", "B": "estabelecia poderes ao Presidente da República para cassar mandatos e suspender direitos políticos.", "C": "extinguiu os tribunais superiores, como o Supremo Tribunal Federal.", "D": "garantiu o aumento de direitos políticos aos analfabetos e às mulheres."}];

let modo='feedback',resp={},qat=0;

function selModo(m,b){modo=m;document.querySelectorAll('.mb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');}
function iniciar(){
  resp={};qat=0;
  document.getElementById('t-intro').classList.remove('ativa');
  document.getElementById('hdr').style.display='block';
  document.getElementById('bbar').style.display='block';
  aba('quiz');renderQ();renderNav();renderGab();
}
function aba(t){
  ['quiz','gab','res'].forEach(x=>{document.getElementById('t-'+x).classList.remove('ativa');document.getElementById('tab-'+x).classList.remove('at');});
  document.getElementById('t-'+t).classList.add('ativa');
  document.getElementById('tab-'+t).classList.add('at');
  window.scrollTo({top:0,behavior:'smooth'});
  if(t==='res')renderRes();
  if(t==='gab')renderGab();
}
function matName(n){
  if(n<=10)return'Língua Portuguesa';
  if(n<=15)return'Literatura';
  if(n<=20)return'História';
  if(n<=25)return'Geografia';
  if(n<=30)return'Ciências/Biologia';
  if(n<=40)return'Matemática';
  if(n<=45)return'Física/Química';
  return'Ciências Humanas';
}
function renderQ(){
  const q=QS[qat];
  if(!q)return;
  const tot=QS.length;
  document.getElementById('pf').style.width=(((qat+1)/tot)*100).toFixed(0)+'%';
  document.getElementById('hs').textContent='Questão '+(qat+1)+' de '+tot;
  
  const corr=GAB[String(q.num)];
  const ru=resp[q.num];
  const res=ru!==undefined;
  const fb=modo==='feedback';
  
  // Get image for this question - prefer cropped, fallback to full page
  let imgsHtml='';
  const cropImg=QIMGS[String(q.num)];
  if(cropImg){
    imgsHtml='<div class="pimg"><img src="data:image/jpeg;base64,'+cropImg+'" style="width:100%;display:block;border-radius:8px" loading="lazy"></div>';

  }
  
  const alts=['A','B','C','D'].map(l=>{
    let cls='alt';
    if(res&&fb){if(l===corr)cls+=' ok';else if(l===ru)cls+=' er';}
    else if(res&&l===ru)cls+=' sel';
    return`<button class="${cls}" ${res?'disabled':''} onclick="answer(${q.num},'${l}')">
      <span class="altl">${l}</span><span class="altt">${q[l]}</span>
    </button>`;
  }).join('');
  
  let fbHtml='';
  if(res&&fb){
    const ok=ru===corr;
    fbHtml=`<div class="fb ${ok?'ok':'er'}">${ok?'✅ Resposta correta!':'❌ Gabarito: <strong>'+corr+'</strong>'}</div>`;
  }
  
  document.getElementById('qcon').innerHTML=`
    ${imgsHtml}
    <div class="qcard">
      <div class="qhdr">
        <span class="qbadge">Q${String(q.num).padStart(2,'0')}</span>
        <span class="qmat">${q.mat||matName(q.num)}</span>
      </div>
      <div class="qbody">
        <div class="qen">${q.enunciado}</div>
        <div class="alts">${alts}</div>
        ${fbHtml}
        <div class="qac" style="display:${res?'flex':'none'}">
          <button class="bant" onclick="goQ(${qat-1})" ${qat===0?'disabled':''}>← Anterior</button>
          <button class="bprx" onclick="next()">${qat<QS.length-1?'Próxima →':'🏆 Resultado'}</button>
        </div>
      </div>
    </div>`;
  
  // Scroll nav dot into view
  const dot=document.getElementById('nd-'+qat);
  if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderNav(){
  document.getElementById('nav').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num];
    let cls='nd';
    if(i===qat)cls+=' at';
    else if(r!==undefined)cls+=r===GAB[String(q.num)]?' ok':' er';
    return`<button class="${cls}" id="nd-${i}" onclick="goQ(${i})">${q.num}</button>`;
  }).join('');
}

function renderGab(){
  let ce=0,er=0;
  document.getElementById('gbgrid').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num],c=GAB[String(q.num)];
    let cls='gi';
    if(r!==undefined){if(r===c){cls+=' ok';ce++;}else{cls+=' er';er++;}}
    return`<div class="${cls}" onclick="goQ(${i});aba('quiz')">
      <span class="giq">${String(q.num).padStart(2,'0')}</span>
      <span class="gil">${c}</span>
    </div>`;
  }).join('');
  document.getElementById('gbpl').textContent=ce+' ✅  '+er+' ❌';
}

function renderRes(){
  let ce=0,er=0,nr=0;
  QS.forEach(q=>{const r=resp[q.num];if(r===undefined)nr++;else if(r===GAB[String(q.num)])ce++;else er++;});
  const tot=QS.length,pct=Math.round(ce/tot*100);
  document.getElementById('rsc').textContent=ce;
  document.getElementById('rpt').textContent='de '+tot+' questões';
  document.getElementById('rce').textContent=ce;
  document.getElementById('rer').textContent=er;
  document.getElementById('rnr').textContent=nr;
  document.getElementById('rpct').textContent=pct+'%';
  const msgs=['🔥 Não desista! Pratique mais com outras provas.','📖 Continue estudando! Revise as questões erradas.','💪 Bom resultado! Continue praticando!','🎉 Excelente! Você está muito bem preparado!'];
  document.getElementById('rmsg').textContent=msgs[pct>=80?3:pct>=60?2:pct>=40?1:0];
}

function answer(num,l){
  if(resp[num]!==undefined)return;
  resp[num]=l;
  renderQ();renderNav();renderGab();
}
function goQ(i){
  if(i<0||i>=QS.length)return;
  qat=i;renderQ();renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){if(qat<QS.length-1)goQ(qat+1);else aba('res');}
function refazer(){resp={};qat=0;aba('quiz');renderQ();renderNav();renderGab();}
function voltarIntro(){
  document.getElementById('bbar').style.display='none';
  document.getElementById('hdr').style.display='none';
  ['quiz','gab','res'].forEach(x=>document.getElementById('t-'+x).classList.remove('ativa'));
  document.getElementById('t-intro').classList.add('ativa');
  resp={};qat=0;
}
</script>
</body>
</html>
