<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CTI 2025 – Vestibulinho</title>
<style>
:root{--az:#1a3a6b;--az2:#2563eb;--az3:#eff6ff;--ve:#16a34a;--ve2:#dcfce7;--vm:#dc2626;--vm2:#fee2e2;--am:#d97706;--am2:#fef3c7;--bg:#f1f5f9;--cd:#fff;--bd:#e2e8f0;--tx:#1e293b;--t2:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
/* HEADER */
#hdr{background:var(--az);color:#fff;padding:12px 16px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hb{background:#fff;color:var(--az);font-weight:800;font-size:14px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ht{font-size:14px;font-weight:700}.hs{font-size:11px;color:#93c5fd}
.prog{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.pf{height:100%;background:#60a5fa;border-radius:2px;transition:width .4s}
/* NAV DOTS */
.nav{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;background:var(--cd);border-bottom:1px solid var(--bd);scrollbar-width:none;position:sticky;top:62px;z-index:90}
.nav::-webkit-scrollbar{display:none}
.nd{min-width:28px;height:28px;border-radius:7px;border:2px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);cursor:pointer;flex-shrink:0;font-family:monospace;transition:all .15s}
.nd.at{border-color:var(--az2);background:var(--az2);color:#fff}
.nd.ok{border-color:var(--ve);background:var(--ve2);color:var(--ve)}
.nd.er{border-color:var(--vm);background:var(--vm2);color:var(--vm)}
/* SCREENS */
.tela{display:none}.ativa{display:block}
/* INTRO */
#t-intro{padding:20px;max-width:480px;margin:0 auto}
.hero{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:20px;padding:24px 20px;margin-bottom:20px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;color:#bfdbfe;line-height:1.5}
.hstats{display:flex;gap:10px;margin-top:12px}
.hst{background:rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;text-align:center;flex:1}
.hst-n{font-size:18px;font-weight:800}.hst-l{font-size:10px;color:#93c5fd}
.slbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.mgrid{display:grid;gap:9px;margin-bottom:20px}
.mb{background:var(--cd);border:2px solid var(--bd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.mb.sel{border-color:var(--az2);background:var(--az3)}
.mi{font-size:22px;flex-shrink:0}.mn{font-size:14px;font-weight:700}.md{font-size:11px;color:var(--t2)}
.btn-in{width:100%;padding:14px;border:none;border-radius:14px;background:var(--az2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.35);font-family:inherit}
.btn-in:active{transform:scale(.97)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--az2);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 16px;font-family:inherit}
/* QUIZ */
#t-quiz{padding-bottom:90px}
.qwrap{max-width:600px;margin:0 auto;padding:14px 14px 0}
/* PAGE IMAGE */
.pimg{margin-bottom:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pimg img{width:100%;display:block}
.pimg-lbl{background:var(--az);color:#fff;font-size:11px;font-weight:700;padding:6px 12px;display:flex;align-items:center;gap:6px}
/* QUESTION CARD */
.qcard{background:var(--cd);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;animation:fu .2s ease;margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.qhdr{background:var(--az);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.qbadge{background:rgba(255,255,255,.18);border-radius:7px;padding:3px 9px;font-size:12px;font-weight:700;font-family:monospace}
.qmat{font-size:11px;color:#93c5fd}
.qbody{padding:14px}
.qen{font-size:13.5px;line-height:1.7;margin-bottom:12px;white-space:pre-wrap}
.alts{display:flex;flex-direction:column;gap:7px}
.alt{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:11px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s;text-align:left;width:100%;-webkit-user-select:none}
.alt:active{transform:scale(.98)}
.altl{min-width:26px;height:26px;border-radius:7px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;transition:all .15s}
.altt{font-size:13px;line-height:1.5;padding-top:3px}
.alt.sel{border-color:var(--az2);background:var(--az3)}.alt.sel .altl{background:var(--az2);color:#fff}
.alt.ok{border-color:var(--ve);background:var(--ve2)}.alt.ok .altl{background:var(--ve);color:#fff}
.alt.er{border-color:var(--vm);background:var(--vm2)}.alt.er .altl{background:var(--vm);color:#fff}
.alt:disabled{cursor:default}
.fb{margin:10px 0 0;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px}
.fb.ok{background:var(--ve2);color:var(--ve);display:flex}
.fb.er{background:var(--vm2);color:var(--vm);display:flex}
.qac{padding:10px 0 4px;display:flex;gap:8px}
.bant,.bprx{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.bant:active,.bprx:active{transform:scale(.97)}
.bant{background:var(--bg);border:2px solid var(--bd);color:var(--tx)}
.bprx{background:var(--az2);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3)}
/* GAB */
#t-gab{padding:14px 14px 90px;max-width:600px;margin:0 auto}
.gbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbpl{font-size:13px;font-weight:700;color:var(--az)}
.gbgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--cd);border-radius:16px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.gi{display:flex;flex-direction:column;align-items:center;padding:7px 4px;border-radius:9px;border:2px solid var(--bd);background:var(--bg);cursor:pointer;transition:all .15s}
.gi.ok{border-color:var(--ve);background:var(--ve2)}.gi.er{border-color:var(--vm);background:var(--vm2)}
.giq{font-size:10px;font-weight:700;color:var(--t2);font-family:monospace}
.gil{font-size:15px;font-weight:800;color:var(--az);font-family:monospace}
.gi.ok .giq,.gi.ok .gil{color:var(--ve)}.gi.er .giq,.gi.er .gil{color:var(--vm)}
/* RES */
#t-res{padding:14px 14px 90px;max-width:480px;margin:0 auto}
.rhero{background:linear-gradient(135deg,#1a3a6b,#2563eb);color:#fff;border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
.rsc{font-size:52px;font-weight:800;line-height:1}.rde{font-size:14px;color:#93c5fd;margin-bottom:4px}
.rpt{font-size:22px;font-weight:700;color:#60a5fa}.rmsg{font-size:13px;color:#bfdbfe;margin-top:8px;line-height:1.4}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--cd);border-radius:13px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stn{font-size:26px;font-weight:800}.stl{font-size:11px;color:var(--t2);font-weight:600}
.cv{color:var(--ve)}.cm{color:var(--vm)}.ca{color:var(--am)}.caz{color:var(--az)}
.bref{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;transition:all .15s}
.bref:active{transform:scale(.97)}
.bref.p{background:var(--az2);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bref.s{background:var(--bg);color:var(--az);border:2px solid var(--az2)}
/* BOTTOM */
#bbar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-top:1px solid var(--bd);padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 10px rgba(0,0,0,.07);z-index:100}
.bbi{display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;padding:4px 0;font-size:10px;font-weight:600;color:var(--t2);font-family:inherit}
.tab.at{color:var(--az2)}.tabi{font-size:19px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.sh{opacity:1;transform:translateX(-50%) translateY(0)}
/* INDEX LINK */
.idx-link{display:block;text-align:center;padding:10px;color:var(--t2);font-size:12px;text-decoration:none;margin-top:8px}
</style>
</head>
<body>

<div id="hdr" style="display:none">
  <div class="hr">
    <div class="hb">CTI</div>
    <div><div class="ht">Vestibulinho 2025</div><div class="hs" id="hs">Prova 2025</div></div>
  </div>
  <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
</div>

<!-- INTRO -->
<div id="t-intro" class="tela ativa">
  <div class="hero">
    <h1>📚 Prova 2025</h1>
    <p>Vestibulinho Unificado CTI — Colégio Técnico Industrial</p>
    <div class="hstats">
      <div class="hst"><div class="hst-n">50</div><div class="hst-l">questões</div></div>
      <div class="hst"><div class="hst-n">5</div><div class="hst-l">matérias</div></div>
      <div class="hst"><div class="hst-n">4h</div><div class="hst-l">duração</div></div>
    </div>
  </div>
  <div class="slbl">Modo de estudo</div>
  <div class="mgrid">
    <button class="mb sel" onclick="selModo('feedback',this)">
      <span class="mi">⚡</span>
      <div><div class="mn">Feedback imediato</div><div class="md">Veja se acertou logo após responder</div></div>
    </button>
    <button class="mb" onclick="selModo('simulado',this)">
      <span class="mi">🎯</span>
      <div><div class="mn">Modo simulado</div><div class="md">Responda tudo e veja resultado no final</div></div>
    </button>
  </div>
  <button class="btn-in" onclick="iniciar()">Iniciar prova 2025 →</button>
  <a href="index.html" class="idx-link">← Voltar para todas as provas</a>
</div>

<!-- QUIZ -->
<div id="t-quiz" class="tela">
  <div class="nav" id="nav"></div>
  <div class="qwrap" id="qcon"></div>
</div>

<!-- GABARITO -->
<div id="t-gab" class="tela">
  <div class="gbtop">
    <div class="slbl" style="margin:0">Gabarito Oficial 2025</div>
    <div class="gbpl" id="gbpl"></div>
  </div>
  <div class="gbgrid" id="gbgrid"></div>
</div>

<!-- RESULTADO -->
<div id="t-res" class="tela">
  <div class="rhero">
    <div class="rde">Você acertou</div>
    <div class="rsc" id="rsc">0</div>
    <div class="rpt" id="rpt">de 50 questões</div>
    <div class="rmsg" id="rmsg"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stn cv" id="rce">0</div><div class="stl">✅ Certas</div></div>
    <div class="stat"><div class="stn cm" id="rer">0</div><div class="stl">❌ Erradas</div></div>
    <div class="stat"><div class="stn ca" id="rnr">0</div><div class="stl">⬜ Não respondidas</div></div>
    <div class="stat"><div class="stn caz" id="rpct">0%</div><div class="stl">📊 Aproveitamento</div></div>
  </div>
  <button class="bref p" onclick="refazer()">🔄 Refazer esta prova</button>
  <button class="bref s" onclick="voltarIntro()">🏠 Menu inicial</button>
</div>

<div id="bbar">
  <div class="bbi">
    <button class="tab at" id="tab-quiz" onclick="aba('quiz')"><span class="tabi">📝</span>Quiz</button>
    <button class="tab" id="tab-gab" onclick="aba('gab')"><span class="tabi">📋</span>Gabarito</button>
    <button class="tab" id="tab-res" onclick="aba('res')"><span class="tabi">🏆</span>Resultado</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const QS=[{"num": 1, "mat": "Língua Portuguesa", "enunciado": "[Tira Calvin e Haroldo: Calvin liga pontos numerados mas só aparecem rabiscos. Haroldo diz que sempre tem que ter regras]\n\nA partir da leitura da tira, é correto afirmar que", "A": "as instruções para a solução do jogo, no 1º quadro, estavam incorretas.", "B": "Calvin não conseguiu formar a imagem porque não ligou todos os pontos.", "C": "Calvin aprecia regras, conforme se percebe na fala dele no último quadro.", "D": "o tigre demonstra melhor entendimento que Calvin para a resolução do jogo."}, {"num": 2, "mat": "Língua Portuguesa", "enunciado": "No trecho – Aqui diz que se a gente ligar os pontos aparece uma imagem, mas eu liguei e só apareceu um monte de rabiscos! – as palavras destacadas estabelecem relação de sentido de", "A": "conclusão, condição e adição.", "B": "conformidade, conclusão e alternância.", "C": "condição, oposição e adição.", "D": "oposição, adição e alternância."}, {"num": 3, "mat": "Língua Portuguesa", "enunciado": "Texto 'A IA te dirá quem és': relato sobre algoritmos de redes sociais que moldam interesses e identidade pessoal.\n\nAo se lembrar de um texto que ela escreveu sobre ser guiada pelo Waze em vez de usar o Waze como fonte de informação, a autora", "A": "esclarece que o Waze, para as viagens, apresenta tanta segurança quanto as informações da IA.", "B": "sugere que é preciso autonomia tanto no uso do Waze quanto no das informações da IA.", "C": "compara as informações do Waze, que são totalmente confiáveis, com as apresentadas pela IA.", "D": "defende que o uso do Waze pode ser mais arriscado que o uso da IA."}, {"num": 4, "mat": "Língua Portuguesa", "enunciado": "[Texto 'A IA te dirá quem és']\n\nA mensagem principal do texto pode assim ser resumida:", "A": "são importantes as escolhas que a IA faz para a nossa vida, pois ela ajuda a formar o nosso caráter.", "B": "é importante visitar os variados assuntos da internet, mesmo sem serem de nosso interesse.", "C": "há perigo que pode ser causado pela internet, se não houver discernimento sobre o seu uso.", "D": "ocupam muito espaço na internet assuntos desinteressantes, como fotos de gatinhos e de bebês."}, {"num": 5, "mat": "Língua Portuguesa", "enunciado": "Uma das frases prediletas da mãe da autora – 'diz-me com quem andas e te direi quem és' – pode assim ser entendida:", "A": "as pessoas com quem convivemos dizem muito sobre quem somos nós.", "B": "somos influenciáveis, mas nossas companhias em nada interferem em nossa vida.", "C": "as más companhias são nocivas, mas não têm o poder de mudar nossos costumes.", "D": "seremos sempre os mesmos, independentemente de nossas boas ou más companhias."}, {"num": 6, "mat": "Língua Portuguesa", "enunciado": "Alterando-se o tratamento para 'você', a frase – diz-me com quem andas e te direi quem és – estará redigida de acordo com a norma-padrão em:", "A": "dize-me com quem anda e te direi quem é.", "B": "diga-me com quem anda e lhe direi quem é.", "C": "dize-me com quem andas e lhe direi quem és.", "D": "diga-me com quem andas e te direi quem és."}, {"num": 7, "mat": "Língua Portuguesa", "enunciado": "Na passagem – Sei que, sem consciência e um olhar atento, posso ser levada pelo mar revolto da internet. –, sobressai a figura de linguagem", "A": "antítese, que indica que, sem consciência, mas com olhar atento, a pessoa não será enganada pela internet.", "B": "pleonasmo, que indica que um mar revolto pode provocar acidentes, bem como a internet.", "C": "hipérbole, que indica que desatenção na internet e mar agitado podem exercer influência benéfica à pessoa.", "D": "metáfora, que indica que um mar agitado pode ocasionar grandes prejuízos à pessoa desatenta, assim como a internet."}, {"num": 8, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que a expressão em destaque, em frase do texto ou reescrita, está substituída, nos parênteses, de acordo com a norma-padrão.", "A": "... um aviso diário para ajudar a guiar os passos... (guiar-lhes).", "B": "... guiar os passos e evitar possíveis fraquezas... (evitar-las).", "C": "... fraquezas de uma jovem descobrindo o mundo. (descobrindo-o).", "D": "... piadas sem graça faziam a autora rir... (faziam-a)."}, {"num": 9, "mat": "Língua Portuguesa", "enunciado": "Na frase – Uma das frases favoritas da minha mãe era 'diz-me com quem andas e te direi quem és'... –, um antônimo da palavra em destaque é", "A": "desprezadas.", "B": "admiradas.", "C": "prediletas.", "D": "consultadas."}, {"num": 10, "mat": "Língua Portuguesa", "enunciado": "[Charge: Circo das Pulgas — pulga diz que corda bamba não era lugar para se ficar com a pulga atrás da orelha]\n\nOs sujeitos de 'Disseram' e 'se ficar' são classificados, correta e respectivamente, como", "A": "simples e inexistente.", "B": "indeterminado e indeterminado.", "C": "composto e indeterminado.", "D": "inexistente e inexistente."}, {"num": 11, "mat": "Língua Portuguesa", "enunciado": "Assinale a alternativa em que há atendimento à norma-padrão em relação às concordâncias verbal e nominal e ao emprego do acento indicativo de crase.", "A": "O uso de aparelhos celulares serão permitidos em sala de aula desde que com à permissão dos professores.", "B": "Não será permitido manifestações excessivamente agressiva à times adversários durante o campeonato escolar.", "C": "O aluno que estiver sem o uniforme e com materiais incompleto será convidado à rever seu comportamento.", "D": "Os alunos que se envolverem em atos violentos e desobedecerem às normas estabelecidas serão penalizados."}, {"num": 12, "mat": "Língua Portuguesa", "enunciado": "Leia o trecho da obra A revolução dos bichos, de George Orwell:\n\nA verdade é que nem os porcos nem os cachorros produziam _____ só grama de alimento com seu trabalho [...] Os bichos consideravam o problema insolúvel; de qualquer maneira, _____ muito pouco tempo para essas especulações [...] as coisas nunca _____ estado e nunca _____ de ficar nem muito melhor nem muito pior...\n\nAs lacunas devem ser preenchidas, respectivamente, com:", "A": "um ... dispunham de ... haviam ... haveriam", "B": "uma ... dispunham ... haviam ... haveriam", "C": "um ... dispunham ... havia ... haveria", "D": "uma ... dispunham de ... havia ... haveria"}, {"num": 13, "mat": "Língua Portuguesa", "enunciado": "Em – Os bichos consideravam o problema insolúvel –, a palavra destacada está acentuada por ser paroxítona com ditongo. Assinale a alternativa em que as duas palavras seguem a mesma regra.", "A": "Atrás e indesejável.", "B": "Louvável e caráter.", "C": "Saúde e estimável.", "D": "Inteligência e estúpido."}, {"num": 14, "mat": "Literatura", "enunciado": "Leia o poema Vício na fala, de Oswald de Andrade:\nPara dizerem milho dizem mio / Para melhor dizem mió / Para pior pió / Para telha dizem teia / Para telhado dizem teiado / E vão fazendo telhados.\n\nNo fim dos cinco primeiros versos, o poeta trabalha com palavras", "A": "da linguagem formal, evidenciando a norma culta.", "B": "do linguajar caipira, evidenciando o emprego de gírias.", "C": "da linguagem formal, evidenciando a língua do dia a dia.", "D": "do linguajar caipira, evidenciando a marca de regionalismo."}, {"num": 15, "mat": "Literatura", "enunciado": "[Tira: Homem chora 'Pobrezinho!! Meu canário morreu!'. Depois o canário está vivo e o gato pensa: 'Quem ensinou o passarinho a fingir de morto?']\n\nNa frase – Meu canário morreu! –, o predicado é classificado como", "A": "nominal, com o núcleo da informação no verbo de ligação.", "B": "verbal, com o núcleo da informação no verbo transitivo direto.", "C": "verbal, com o núcleo da informação no verbo intransitivo.", "D": "verbo-nominal, com o núcleo da informação no verbo intransitivo."}, {"num": 16, "mat": "Matemática", "enunciado": "Um torneio de xadrez recebeu inscrições durante 3 dias. No 2º dia, 8 inscrições a menos que no 1º; no 3º, 3 a mais que no 2º. Total: 62 inscrições.\n\nO número de inscrições no 3º dia foi", "A": "14.", "B": "17.", "C": "20.", "D": "25."}, {"num": 17, "mat": "Matemática", "enunciado": "Uma pessoa comprou 12 m de fio. Cortou 8 pedaços de mesmo comprimento e 5 pedaços de 38 cm cada. Ainda restaram 6,5 m.\n\nO comprimento de cada um dos 8 pedaços foi", "A": "45 cm.", "B": "78 cm.", "C": "92 cm.", "D": "126 cm."}, {"num": 18, "mat": "Matemática", "enunciado": "Em um campeonato, o número de gols sofridos foi igual a 1/3 dos gols marcados. A diferença entre gols marcados e sofridos foi 24.\n\nO número de gols sofridos foi", "A": "9.", "B": "12.", "C": "15.", "D": "18."}, {"num": 19, "mat": "Matemática", "enunciado": "Em uma palestra havia 218 pessoas (alunos e professores). Após 2 professores saírem, o número de alunos ficou igual a 8 vezes o número de professores presentes.\n\nO número de alunos era", "A": "176.", "B": "192.", "C": "208.", "D": "216."}, {"num": 20, "mat": "Matemática", "enunciado": "Máquina A imprime 8 folhetos em 5 segundos; máquina B imprime 5 folhetos em 3 segundos. Trabalhando juntas durante 1h15min, o número de folhetos impressos foi", "A": "14 625.", "B": "14 650.", "C": "14 675.", "D": "14 700."}, {"num": 21, "mat": "Matemática", "enunciado": "Pesquisa com 150 estudantes: 20% tocam instrumento, 10% desses praticam esporte. Total de 39 praticam esporte. Entre os que não tocam instrumento, a percentagem que pratica esporte é", "A": "30%", "B": "26%", "C": "24%", "D": "20%"}, {"num": 22, "mat": "Matemática", "enunciado": "Em um depósito há 221 caixas organizadas em pilhas com mesmo número. O número de caixas por pilha é 4 unidades menor que o número de pilhas. A soma dos algarismos do número de caixas por pilha é", "A": "4.", "B": "5.", "C": "6.", "D": "8."}, {"num": 23, "mat": "Matemática", "enunciado": "Capital de R$ 1.800,00 aplicado a juros simples por 8 meses. Valor total resgatado: R$ 1.908,00.\n\nA taxa mensal de juros era de", "A": "0,60%", "B": "0,65%", "C": "0,70%", "D": "0,75%"}, {"num": 24, "mat": "Matemática", "enunciado": "[Figura: Quadrado ABCD com quadrado Q (área 16 cm²) no centro e 4 quadrados menores Q1-Q4 nos cantos]\n\nSabendo que o perímetro de Q1 é igual ao lado de Q, a área do quadrado ABCD é", "A": "25 cm².", "B": "36 cm².", "C": "49 cm².", "D": "64 cm²."}, {"num": 25, "mat": "Matemática", "enunciado": "[Figura: Terreno quadrado ABCD de 20 m de lado com galpão quadrado de 36% da área do terreno]\n\nO perímetro do galpão é de", "A": "36 m.", "B": "40 m.", "C": "48 m.", "D": "52 m."}, {"num": 26, "mat": "Matemática", "enunciado": "Simplificando (2x² – 2 + 2x + 2) / (2x + 2), em que x ≠ –1, obtém-se:", "A": "x", "B": "x² + 1", "C": "2x² – 2", "D": "x²"}, {"num": 27, "mat": "Matemática", "enunciado": "[Figura: Triângulos BAC (ret., BAC reto, ABC=x, ACB=x-10°) e BCD (CDB=x+5°, CBD=b, DCE=x-5°)]\n\nA soma dos ângulos internos de qualquer triângulo é 180°. O valor de b é", "A": "45°", "B": "40°", "C": "35°", "D": "30°"}, {"num": 28, "mat": "Matemática", "enunciado": "[Figura: Triângulo ret. ABC, AC=20cm, E em AB com AE=x/3, EB=x; D em BC com BD=12cm, DC=4cm]\n\nA medida do segmento ED é", "A": "18 cm.", "B": "17 cm.", "C": "15 cm.", "D": "13 cm."}, {"num": 29, "mat": "Matemática", "enunciado": "Considere A = (–2 + 3/2) / (–1/2 + 1) e B = 5 / (2 – 1/3).\n\nO valor de A² – B² é", "A": "16.", "B": "4.", "C": "–8.", "D": "–10."}, {"num": 30, "mat": "Matemática", "enunciado": "Três ligações: 1ª = 1h42min, 2ª = 1h25min, soma total = 4h12min.\n\nO tempo da 3ª ligação foi", "A": "2 horas e 55 minutos.", "B": "2 horas e 5 minutos.", "C": "1 hora e 45 minutos.", "D": "1 hora e 5 minutos."}, {"num": 31, "mat": "Ciências Naturais", "enunciado": "As doenças infecciosas podem ser causadas por bactérias, vírus e protozoários. No caso da", "A": "doença de Chagas, o agente causador é um protozoário, e uma das formas de prevenir é tomar o antibiótico adequado.", "B": "dengue, o agente causador é uma bactéria, e uma das formas de prevenir é evitar a ingestão de água contaminada.", "C": "febre amarela, o agente causador é um vírus, e uma das formas de prevenir é tomar a vacina específica.", "D": "AIDS, o agente causador é um vírus, e uma das formas de prevenir é evitar contato com as roupas e as mãos da pessoa doente."}, {"num": 32, "mat": "Ciências Naturais", "enunciado": "[Imagem: Bioma com cactáceas e árvores tortuosas — Caatinga]\n\nSobre a localização e características, esse bioma é encontrado", "A": "nos estados do Pará, Santa Catarina e Rio Grande do Sul, com grande diversidade animal e vegetal.", "B": "em regiões litorâneas com solo lamacento, rico em nutrientes, pouco pedregoso e muito profundo.", "C": "na região central do Brasil com temperatura estável (~20°C) e chuva acima de 2000 mm.", "D": "no nordeste brasileiro, com árvores baixas, troncos tortuosos, espinhos e folhas que caem na seca."}, {"num": 33, "mat": "Ciências Naturais", "enunciado": "A eritroblastose fetal ocorre quando uma imunoglobulina específica (1), produzida pela mãe, atravessa a placenta e reage com o fator Rh (2), uma proteína nas hemácias do feto.\n\nAs substâncias 1 e 2 atuam, respectivamente, como", "A": "anticorpo e antígeno.", "B": "antígeno e soro.", "C": "soro e anticorpo.", "D": "vacina e soro."}, {"num": 34, "mat": "Ciências Naturais", "enunciado": "[Figura: Aparelho reprodutor masculino com 'Local do corte' — vasectomia]\n\nO método evita a gravidez porque impede", "A": "a maturação e o desenvolvimento do testículo.", "B": "o funcionamento dos canais seminíferos.", "C": "a produção de espermatozoides pela próstata.", "D": "a passagem dos espermatozoides pela uretra."}, {"num": 35, "mat": "Ciências Naturais", "enunciado": "[Figura: Pirâmide de energia — 1=base/produtores, 2=intermediário, 3=topo]\n\nOs tipos de energia 1, 2 e 3, respectivamente, são", "A": "térmica, química, radiante.", "B": "radiante, química, térmica.", "C": "química, radiante, térmica.", "D": "radiante, térmica, química."}, {"num": 36, "mat": "Ciências Naturais", "enunciado": "Unicelulares: levedura de cerveja (1), lactobacilo (2), cianobactéria (3) e ameba (4). É correto afirmar que", "A": "1 apresenta retículo endoplasmático e cloroplastos.", "B": "2 apresenta membrana plasmática e ribossomos.", "C": "3 apresenta núcleo e mitocôndria.", "D": "4 apresenta vacúolo e parede celular."}, {"num": 37, "mat": "Ciências Naturais", "enunciado": "O álcool é a droga lícita mais consumida no Brasil. Seu uso abusivo provoca graves acidentes e violência. Isso ocorre porque o álcool", "A": "diminui a atividade do cérebro, reduzindo a atenção, a concentração, a coordenação motora e a capacidade intelectual.", "B": "produz estados de excitação, aumento da ansiedade, inibe a sensação de fome e causa alucinações.", "C": "provoca modificações no sistema nervoso, alterando a percepção e o pensamento e provocando delírios.", "D": "estimula a atividade do cérebro, provoca hipertensão, tumores no fígado e ataque cardíaco."}, {"num": 38, "mat": "Ciências Naturais", "enunciado": "[Figura: Circuito elétrico com bateria, chave e 3 lâmpadas em série]\n\nAo ligar a chave, após a retirada da lâmpada", "A": "1, as demais lâmpadas irão acender.", "B": "2, as lâmpadas 1 e 3 irão acender.", "C": "3, as lâmpadas 1 e 2 ficarão apagadas.", "D": "2, a lâmpada 1 irá acender e a 3 ficará apagada."}, {"num": 39, "mat": "Ciências Naturais", "enunciado": "[Figura: Dois ímãs com polos N e S representados pelos números 1, 2, 3 e 4]\n\nOs números 1, 2, 3 e 4 representam, na ordem, os polos", "A": "norte, sul, sul e norte.", "B": "norte, sul, norte e sul.", "C": "sul, norte, norte e sul.", "D": "sul, norte, sul e norte."}, {"num": 40, "mat": "Ciências Naturais", "enunciado": "Blocos de concreto com microfissuras aumentam a permeabilidade das ruas, permitindo absorção de água. A consequência ambiental é", "A": "evitar o escoamento da água na superfície das ruas.", "B": "permitir o acúmulo da água em um único local da cidade.", "C": "aumentar o nível de água dos rios durante as chuvas.", "D": "facilitar o encharcamento de água no solo e no ambiente."}, {"num": 41, "mat": "Ciências Naturais", "enunciado": "A energia nunca se perde, apenas se transforma. Um exemplo de transformação de energia é a", "A": "térmica do forno de micro-ondas em energia mecânica.", "B": "elétrica do fogão a gás em energia química.", "C": "mecânica das baterias de um carro em energia potencial.", "D": "química de uma pilha em energia elétrica."}, {"num": 42, "mat": "Ciências Naturais", "enunciado": "[Figura: Aterro sanitário com estruturas 1 a 4]\n\nNa ilustração, o número", "A": "1, representa a manta de PVC e argila que impermeabilizam o solo evitando a infiltração de poluentes.", "B": "2, representa o lençol subterrâneo que transporta todos os poluentes que chegam até ele.", "C": "3, representa o local da queima do lixo que evita que os resíduos no aterro não se acumulem.", "D": "4, representa o local onde o chorume é armazenado para ser levado a um local distante."}, {"num": 43, "mat": "Ciências Naturais", "enunciado": "A segunda lei de Newton afirma que para alterar o estado inicial do movimento de um corpo é necessário aplicar uma força. A afirmação que corresponde à 2ª Lei é:", "A": "um corpo pode mudar sozinho o seu estado de movimento a qualquer momento.", "B": "o estado de repouso ou de movimento de um corpo depende do observador.", "C": "ao ser aplicada uma força sobre um corpo ele se desloca e entra em movimento.", "D": "sem a ação de forças externas, um corpo tende a continuar em movimento."}, {"num": 44, "mat": "Ciências Naturais", "enunciado": "Óxido de cálcio (56g) + Ácido sulfúrico (98g) → Sulfato de cálcio (136g) + Água (18g).\nSe o ácido sulfúrico disponível era 49 g, as quantidades de sulfato de cálcio e água obtidas seriam:", "A": "136 e 18.", "B": "68 e 9.", "C": "56 e 18.", "D": "98 e 9."}, {"num": 45, "mat": "Ciências Naturais", "enunciado": "Modelo de Rutherford: 'O núcleo é denso e tem carga _____, ou seja, é constituído de _____. A eletrosfera é uma grande região vazia onde os _____, de carga _____ ficam girando ao redor do núcleo.'\n\nAs lacunas são preenchidas, respectivamente, por:", "A": "positiva ... elétrons ... prótons ... negativa", "B": "negativa ... prótons ... elétrons ... positiva", "C": "negativa ... elétrons ... prótons ... positiva", "D": "positiva ... prótons ... elétrons ... negativa"}, {"num": 46, "mat": "Ciências Humanas", "enunciado": "Determinada a partir do nível médio do mar com base em medidas do litoral brasileiro. Nos mapas é representada por escala de cores do verde ao marrom, com curvas de nível em metros.\n\nO texto apresenta o conceito de", "A": "latitude.", "B": "longitude.", "C": "altitude.", "D": "orientação."}, {"num": 47, "mat": "Ciências Humanas", "enunciado": "[Figuras: Diagramas de brisa marítima (diurna e noturna) com setas indicando alta e baixa pressão]\n\nO processo a que o texto e as figuras se referem é a", "A": "brisa marítima e terrestre.", "B": "circulação global e regional da atmosfera.", "C": "circulação com variação sazonal, como as monções.", "D": "influência da orografia e monção."}, {"num": 48, "mat": "Ciências Humanas", "enunciado": "Uma das grandes unidades do relevo brasileiro ocupa a maior parte das regiões Sul e Sudeste, com altitudes variáveis acima de 800 metros, e superfícies irregulares desgastadas pela erosão.\n\nO texto refere-se à unidade", "A": "planície.", "B": "planalto.", "C": "depressão.", "D": "cordilheira."}, {"num": 49, "mat": "Ciências Humanas", "enunciado": "O Iluminismo foi um movimento de renovação filosófica e intelectual que atingiu sua maturidade na França do século XVIII. O citado movimento tinha como fundamentos", "A": "o reconhecimento da importância do misticismo religioso e os limites do conhecimento científico.", "B": "a valorização do uso da razão e a ideia de que o progresso do ser humano pode ser infinito.", "C": "a defesa da existência de autoridades intelectuais e o combate às religiões de origem não europeia.", "D": "a justificativa do poder absoluto dos monarcas e o apoio ao controle do Estado sobre a atividade econômica."}, {"num": 50, "mat": "Ciências Humanas", "enunciado": "[Trecho da canção 'Apesar de Você', Chico Buarque, 1970: 'Hoje você é quem manda / Falou, tá falado / Não tem discussão...']\n\nEsta canção", "A": "trata da superioridade cultural dos brasileiros.", "B": "aponta para a ignorância política dos brasileiros.", "C": "mostra um país preocupado com o desenvolvimento.", "D": "critica o regime autoritário então presente no Brasil."}];

let modo='feedback',resp={},qat=0;

function selModo(m,b){modo=m;document.querySelectorAll('.mb').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');}
function iniciar(){
  resp={};qat=0;
  document.getElementById('t-intro').classList.remove('ativa');
  document.getElementById('hdr').style.display='block';
  document.getElementById('bbar').style.display='block';
  aba('quiz');renderQ();renderNav();renderGab();
}
function aba(t){
  ['quiz','gab','res'].forEach(x=>{document.getElementById('t-'+x).classList.remove('ativa');document.getElementById('tab-'+x).classList.remove('at');});
  document.getElementById('t-'+t).classList.add('ativa');
  document.getElementById('tab-'+t).classList.add('at');
  window.scrollTo({top:0,behavior:'smooth'});
  if(t==='res')renderRes();
  if(t==='gab')renderGab();
}
function matName(n){
  if(n<=10)return'Língua Portuguesa';
  if(n<=15)return'Literatura';
  if(n<=20)return'História';
  if(n<=25)return'Geografia';
  if(n<=30)return'Ciências/Biologia';
  if(n<=40)return'Matemática';
  if(n<=45)return'Física/Química';
  return'Ciências Humanas';
}
function renderQ(){
  const q=QS[qat];
  if(!q)return;
  const tot=QS.length;
  document.getElementById('pf').style.width=(((qat+1)/tot)*100).toFixed(0)+'%';
  document.getElementById('hs').textContent='Questão '+(qat+1)+' de '+tot;
  
  const corr=GAB[String(q.num)];
  const ru=resp[q.num];
  const res=ru!==undefined;
  const fb=modo==='feedback';
  
  // Get image for this question - prefer cropped, fallback to full page
  let imgsHtml='';
  const cropImg=QIMGS[String(q.num)];
  if(cropImg){
    imgsHtml='<div class="pimg"><img src="data:image/jpeg;base64,'+cropImg+'" style="width:100%;display:block;border-radius:8px" loading="lazy"></div>';

  }
  
  const alts=['A','B','C','D'].map(l=>{
    let cls='alt';
    if(res&&fb){if(l===corr)cls+=' ok';else if(l===ru)cls+=' er';}
    else if(res&&l===ru)cls+=' sel';
    return`<button class="${cls}" ${res?'disabled':''} onclick="answer(${q.num},'${l}')">
      <span class="altl">${l}</span><span class="altt">${q[l]}</span>
    </button>`;
  }).join('');
  
  let fbHtml='';
  if(res&&fb){
    const ok=ru===corr;
    fbHtml=`<div class="fb ${ok?'ok':'er'}">${ok?'✅ Resposta correta!':'❌ Gabarito: <strong>'+corr+'</strong>'}</div>`;
  }
  
  document.getElementById('qcon').innerHTML=`
    ${imgsHtml}
    <div class="qcard">
      <div class="qhdr">
        <span class="qbadge">Q${String(q.num).padStart(2,'0')}</span>
        <span class="qmat">${q.mat||matName(q.num)}</span>
      </div>
      <div class="qbody">
        <div class="qen">${q.enunciado}</div>
        <div class="alts">${alts}</div>
        ${fbHtml}
        <div class="qac" style="display:${res?'flex':'none'}">
          <button class="bant" onclick="goQ(${qat-1})" ${qat===0?'disabled':''}>← Anterior</button>
          <button class="bprx" onclick="next()">${qat<QS.length-1?'Próxima →':'🏆 Resultado'}</button>
        </div>
      </div>
    </div>`;
  
  // Scroll nav dot into view
  const dot=document.getElementById('nd-'+qat);
  if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderNav(){
  document.getElementById('nav').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num];
    let cls='nd';
    if(i===qat)cls+=' at';
    else if(r!==undefined)cls+=r===GAB[String(q.num)]?' ok':' er';
    return`<button class="${cls}" id="nd-${i}" onclick="goQ(${i})">${q.num}</button>`;
  }).join('');
}

function renderGab(){
  let ce=0,er=0;
  document.getElementById('gbgrid').innerHTML=QS.map((q,i)=>{
    const r=resp[q.num],c=GAB[String(q.num)];
    let cls='gi';
    if(r!==undefined){if(r===c){cls+=' ok';ce++;}else{cls+=' er';er++;}}
    return`<div class="${cls}" onclick="goQ(${i});aba('quiz')">
      <span class="giq">${String(q.num).padStart(2,'0')}</span>
      <span class="gil">${c}</span>
    </div>`;
  }).join('');
  document.getElementById('gbpl').textContent=ce+' ✅  '+er+' ❌';
}

function renderRes(){
  let ce=0,er=0,nr=0;
  QS.forEach(q=>{const r=resp[q.num];if(r===undefined)nr++;else if(r===GAB[String(q.num)])ce++;else er++;});
  const tot=QS.length,pct=Math.round(ce/tot*100);
  document.getElementById('rsc').textContent=ce;
  document.getElementById('rpt').textContent='de '+tot+' questões';
  document.getElementById('rce').textContent=ce;
  document.getElementById('rer').textContent=er;
  document.getElementById('rnr').textContent=nr;
  document.getElementById('rpct').textContent=pct+'%';
  const msgs=['🔥 Não desista! Pratique mais com outras provas.','📖 Continue estudando! Revise as questões erradas.','💪 Bom resultado! Continue praticando!','🎉 Excelente! Você está muito bem preparado!'];
  document.getElementById('rmsg').textContent=msgs[pct>=80?3:pct>=60?2:pct>=40?1:0];
}

function answer(num,l){
  if(resp[num]!==undefined)return;
  resp[num]=l;
  renderQ();renderNav();renderGab();
}
function goQ(i){
  if(i<0||i>=QS.length)return;
  qat=i;renderQ();renderNav();
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(){if(qat<QS.length-1)goQ(qat+1);else aba('res');}
function refazer(){resp={};qat=0;aba('quiz');renderQ();renderNav();renderGab();}
function voltarIntro(){
  document.getElementById('bbar').style.display='none';
  document.getElementById('hdr').style.display='none';
  ['quiz','gab','res'].forEach(x=>document.getElementById('t-'+x).classList.remove('ativa'));
  document.getElementById('t-intro').classList.add('ativa');
  resp={};qat=0;
}
</script>
